<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Generator 3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0f;
    color: #c8c8d4;
    overflow: hidden;
    height: 100vh;
  }

  header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(18, 18, 26, 0.95);
    backdrop-filter: blur(8px);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 10;
    border-bottom: 1px solid #1e1e2e;
  }

  header h1 {
    color: #4ade80;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  
.stats {
    font-size: 12px;
    color: #6e6e82;
  }

  .version {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-size: 10px;
    color: #333;
  }
  .controls {
    position: absolute;
    left: 0;
    top: 60px;
    bottom: 0;
    width: 320px;
    padding: 12px;
    background: rgba(18, 18, 26, 0.92);
    backdrop-filter: blur(8px);
    overflow-y: auto;
    z-index: 10;
    border-right: 1px solid #1e1e2e;
  }

  @media (max-width: 767px) {
    .controls {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      width: 100%;
      border-right: none;
      border-bottom: 1px solid #1e1e2e;
      padding: 0;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      overflow: hidden;
      max-height: 500px;
      opacity: 1;
      background: rgba(18, 18, 26, 0.98);
    }

    .controls.collapsed {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    #tab-layers {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
    }

    .tab-section-title {
      width: 100%;
      color: #4ade80;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 4px 0 8px 0;
      padding-bottom: 2px;
      border-bottom: 1px solid #1e1e2e;
    }

    .control-group {
      flex: 1 1 100%;
      min-width: 100%;
    }

    .control-group label {
      font-size: 9px;
    }

    .control-group .value {
      font-size: 9px;
    }

    .control-group input[type="range"] {
      height: 4px;
    }

    .buttons {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid #1e1e2e;
      margin-top: 0;
      width: 100%;
    }

    button {
      padding: 7px;
      font-size: 10px;
    }

    .buttons button {
      background: #1e1e2e;
      color: #4ade80;
      border: 1px solid #4ade80;
      border-radius: 5px;
    }

    .info {
      display: none;
    }

    .hint {
      bottom: 8px;
      font-size: 9px;
    }
  }

  .toggle-btn {
    display: none;
  }

  @media (max-width: 767px) {
    .toggle-btn {
      display: block;
      position: fixed;
      top: 52px;
      right: 8px;
      z-index: 20;
      background: rgba(18, 18, 26, 0.95);
      border: 1px solid #1e1e2e;
      color: #4ade80;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background: #4ade80;
      color: #0a0a0f;
    }
  }
  
  .controls h2 {
    color: #4ade80;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1e1e2e;
  }
  
  .control-group {
    margin-bottom: 12px;
  }
  
  .control-group label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #6e6e82;
    margin-bottom: 5px;
  }

  .control-group .value {
    color: #4ade80;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .control-group input[type="range"] {
    width: 100%;
    height: 5px;
    -webkit-appearance: none;
    background: #1e1e2e;
    border-radius: 3px;
  }
  
  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #4ade80;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(74, 222, 128, 0.4);
  }

  .buttons {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    width: 100%;
    flex-shrink: 0;
  }

  button {
    flex: 1;
    padding: 9px;
    background: rgba(74, 222, 128, 0.1);
    color: #4ade80;
    border: 1px solid #4ade80;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
  }

  button:hover {
    background: #4ade80;
    color: #0a0a0f;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(74, 222, 128, 0.25);
  }

  .info {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #1e1e2e;
    font-size: 10px;
    color: #666;
    line-height: 1.5;
  }
  
  canvas { 
    display: block;
    width: 100%;
    height: 100%;
  }
  
  .hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #555;
    pointer-events: none;
    z-index: 5;
  }

.layer-item {
    background: #12121a;
    border: 1px solid #1e1e2e;
    margin-bottom: 6px;
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .layer-item:hover {
    border-color: #6e6e82;
  }

  .layer-item.expanded {
    border-color: #4ade80;
  }

  .layer-header {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    background: rgba(18, 18, 26, 0.95);
    cursor: pointer;
  }

  .layer-header:active {
    background: rgba(74, 222, 128, 0.08);
  }

.expand-arrow {
    color: #4ade80;
    font-size: 10px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .layer-item.expanded .expand-arrow {
    transform: rotate(90deg);
  }

  .layer-header:hover {
    background: rgba(74, 222, 128, 0.08);
  }

  .layer-archetype-select {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: 1px solid #1e1e2e;
    color: #4ade80;
    padding: 2px 4px;
    border-radius: 3px;
    font-size: 9px;
    cursor: pointer;
  }

  .layer-archetype-select option {
    background: #12121a;
    color: #c8c8d4;
  }

  .layer-yoffset {
    width: 50px;
    background: transparent;
    border: 1px solid #1e1e2e;
    color: #38bdf8;
    padding: 2px 3px;
    border-radius: 3px;
    font-size: 9px;
    text-align: center;
  }

  .layer-remove-btn {
    background: transparent;
    border: 1px solid #f87171;
    color: #f87171;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    cursor: pointer;
    flex: 0 0 auto;
  }

  .layer-remove-btn:hover {
    background: #f87171;
    color: #0a0a0f;
  }

  .layer-params {
    padding: 10px 12px;
    display: none;
    max-height: 55vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #4ade80 #1e1e2e;
  }

  .layer-params::-webkit-scrollbar {
    width: 4px;
  }

  .layer-params::-webkit-scrollbar-track {
    background: #1e1e2e;
    border-radius: 2px;
  }

  .layer-params::-webkit-scrollbar-thumb {
    background: #4ade80;
    border-radius: 2px;
  }

  .layer-item.expanded .layer-params {
    display: block;
  }

  .layer-params .control-group {
    margin-bottom: 6px;
  }

  .layer-params .control-group label {
    font-size: 9px;
    margin-bottom: 2px;
  }

  .layer-params .control-group input[type="range"] {
    height: 3px;
  }

  .add-layer-btn {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px dashed #4ade80;
    color: #4ade80;
    border-radius: 6px;
    font-size: 10px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .add-layer-btn:hover {
    background: rgba(74, 222, 128, 0.1);
  }

  .add-layer-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .parent-layer-btn {
    padding: 8px;
    background: transparent;
    border: 1px solid #f87171;
    color: #f87171;
    border-radius: 6px;
    font-size: 10px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .parent-layer-btn:hover {
    background: rgba(248, 113, 113, 0.1);
  }

  .parent-layer-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .merge-layer-btn {
    padding: 8px;
    background: transparent;
    border: 1px solid #38bdf8;
    color: #38bdf8;
    border-radius: 6px;
    font-size: 10px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .merge-layer-btn:hover {
    background: rgba(56, 189, 248, 0.1);
  }

  .merge-layer-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .undo-redo-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
    align-items: center;
  }

  .undo-redo-btn {
    padding: 4px 8px;
    font-size: 14px;
    background: transparent;
    border: 1px solid #1e1e2e;
    color: #4ade80;
    border-radius: 4px;
    cursor: pointer;
  }

  .undo-redo-btn:hover:not(:disabled) {
    background: rgba(74, 222, 128, 0.1);
    border-color: #4ade80;
  }

  .undo-redo-btn:disabled {
    color: #333;
    border-color: #222;
    cursor: not-allowed;
  }

  .history-info {
    font-size: 9px;
    color: #6e6e82;
    margin-left: auto;
  }

  .drag-handle {
    cursor: grab;
    color: #6e6e82;
    font-size: 12px;
    padding: 0 4px;
    user-select: none;
  }

  .drag-handle:active {
    cursor: grabbing;
  }

  .layer-item.dragging {
    opacity: 0.5;
    border-style: dashed;
  }

  .layer-item.drag-over {
    border-color: #4ade80;
    border-style: solid;
  }

  .clone-btn {
    background: transparent;
    border: 1px solid #38bdf8;
    color: #38bdf8;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 9px;
    cursor: pointer;
    flex: 0 0 auto;
  }

  .clone-btn:hover {
    background: rgba(56, 189, 248, 0.1);
  }

  .archetype-params {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(30, 30, 46, 0.8);
  }

  .archetype-params-title {
    font-size: 9px;
    color: #6e6e82;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .section-title {
    font-size: 9px;
    color: #4ade80;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 10px 0 6px 0;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(30, 30, 46, 0.8);
  }
.layer-item.is-parent {
    border-color: #f87171;
  }

  .layer-item.is-parent .layer-header {
    background: rgba(248, 113, 113, 0.15);
  }

  .parent-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    background: #f87171;
    color: #0a0a0f;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    margin-right: 4px;
  }

  .visibility-btn {
    background: transparent;
    border: 1px solid #4ade80;
    color: #4ade80;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 10px;
    cursor: pointer;
    flex: 0 0 auto;
    line-height: 1;
  }

  .visibility-btn.hidden {
    border-color: #6e6e82;
    color: #6e6e82;
  }

  .visibility-btn:hover {
    background: rgba(74, 222, 128, 0.1);
  }

  .visibility-btn.hidden:hover {
    background: rgba(110, 110, 130, 0.1);
  }

  .layer-item.dimmed {
    opacity: 0.5;
  }

  .layer-item.dimmed .layer-header {
    background: rgba(30, 30, 46, 0.5) !important;
  }
</style>
</head>
<body>

<header>
  <h1>CLOUD GENERATOR 3D</h1>
  <span class="stats" id="stats">0 spheres</span>
  <span class="version">v8.2</span>
</header>

<button class="toggle-btn" onclick="toggleControls()">Parameters</button>

<div class="controls">
  <div id="tab-layers" class="tab-content active">
    <h2 class="tab-section-title">Layer Stack</h2>
    <div class="undo-redo-bar">
      <button id="undo-btn" class="undo-redo-btn" onclick="undo()" disabled>&#8630;</button>
      <button id="redo-btn" class="undo-redo-btn" onclick="redo()" disabled>&#8631;</button>
      <span class="history-info" id="history-info"></span>
    </div>
    <button onclick="loadParentMesh()" style="width:100%;margin-bottom:8px;padding:8px;background:rgba(192,132,252,0.15);border:1px solid #c084fc;color:#c084fc;border-radius:6px;font-size:10px;cursor:pointer;text-transform:uppercase;font-weight:600;">Load Parent Mesh</button>
    <div id="parent-mesh-section" style="margin-bottom:8px;padding:8px;background:rgba(192,132,252,0.1);border:1px solid #c084fc;border-radius:6px;display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:10px;color:#c084fc;font-weight:bold;">Parent Mesh</span>
        <div style="display:flex;gap:4px;">
          <button onclick="toggleParentMeshVisibility()" id="btn-toggle-parent-mesh" style="padding:3px 8px;background:transparent;border:1px solid #6e6e82;color:#6e6e82;border-radius:4px;font-size:9px;cursor:pointer;">Toggle</button>
          <button onclick="clearParentMesh()" id="btn-clear-parent-mesh" style="padding:3px 8px;background:transparent;border:1px solid #f87171;color:#f87171;border-radius:4px;font-size:9px;cursor:pointer;">Clear</button>
        </div>
      </div>
      <div style="font-size:9px;color:#c084fc;margin-bottom:6px;">File: <span id="parent-mesh-name"></span></div>
      <div style="display:flex;gap:4px;align-items:center;">
        <span style="font-size:9px;color:#6e6e82;width:40px;">Offset</span>
        <input type="number" id="pm-offset-x" value="0" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('offsetX', this.value)">
        <input type="number" id="pm-offset-y" value="0" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('offsetY', this.value)">
        <input type="number" id="pm-offset-z" value="0" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('offsetZ', this.value)">
      </div>
      <div style="display:flex;gap:4px;align-items:center;margin-top:4px;">
        <span style="font-size:9px;color:#6e6e82;width:40px;">Scale</span>
        <input type="number" id="pm-size-x" value="1" step="0.1" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('sizeX', this.value)">
        <input type="number" id="pm-size-y" value="1" step="0.1" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('sizeY', this.value)">
        <input type="number" id="pm-size-z" value="1" step="0.1" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('sizeZ', this.value)">
      </div>
      <div style="display:flex;gap:4px;align-items:center;margin-top:4px;">
        <span style="font-size:9px;color:#6e6e82;width:40px;">Rot</span>
        <input type="number" id="pm-rot-x" value="0" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('rotationX', this.value)">
        <input type="number" id="pm-rot-y" value="0" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('rotationY', this.value)">
        <input type="number" id="pm-rot-z" value="0" style="width:50px;background:#1e1e2e;border:1px solid #333;color:#38bdf8;padding:2px;font-size:9px;border-radius:3px;" onchange="updateParentMeshTransform('rotationZ', this.value)">
      </div>
    </div>
    <div id="layer-list"></div>
    <div class="add-layer-buttons">
      <button class="add-layer-btn" onclick="addLayer()">+ Add Layer</button>
      <button class="parent-layer-btn" onclick="setParentLayer()" id="btn-parent" style="background:transparent;border:1px solid #f87171;color:#f87171;padding:8px;font-size:10px;cursor:pointer;text-transform:uppercase;font-weight:600;letter-spacing:1px;border-radius:6px;">PARENT</button>
      <button class="merge-layer-btn" onclick="performMerge()" id="btn-merge">Merge Layers</button>
    </div>
  </div>

  <div class="buttons">
    <button onclick="generate()">Generate</button>
    <button onclick="showRemeshDialog()" id="btn-remesh">Remesh</button>
    <button onclick="showExportDialog()">Export</button>
  </div>
</div>
<div class="hint">Drag / swipe to orbit | Pinch to zoom | Double-tap to reset</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ============================================================
// NOISE UTILITIES
// ============================================================

const PHI = (1 + Math.sqrt(5)) / 2; // 1.618...

const hash3 = (x, y, z, seed) => {
  let n = (((x | 0) + ((y | 0) * 57) | 0) + ((z | 0) * 131) | 0) + ((seed | 0) * 123456789) | 0;
  n = (n << 13) ^ n;
  return (n * (n * n * 15731 + 789221) + 1376312589) & 0x7FFFFFFF;
};

const fade3 = t => t * t * t * (t * (t * 6 - 15) + 10);

const lerp3 = (a, b, t) => a + (b - a) * t;

const grad3 = (h, x, y, z) => {
  const g = h & 15;
  const u = g < 8 ? x : y;
  const v = g < 4 ? y : (g === 12 || g === 14 ? x : z);
  return ((g & 1) ? -u : u) + ((g & 2) ? -v : v);
};

const perlin3D = (x, y, z, seed) => {
  const xi = Math.floor(x) & 0xFF;
  const yi = Math.floor(y) & 0xFF;
  const zi = Math.floor(z) & 0xFF;
  const xf = x - Math.floor(x);
  const yf = y - Math.floor(y);
  const zf = z - Math.floor(z);
  const u = fade3(xf), v = fade3(yf), w = fade3(zf);
  const aaa = hash3(xi, yi, zi, seed) % 12;
  const aba = hash3(xi, yi + 1, zi, seed) % 12;
  const aab = hash3(xi, yi, zi + 1, seed) % 12;
  const abb = hash3(xi, yi + 1, zi + 1, seed) % 12;
  const baa = hash3(xi + 1, yi, zi, seed) % 12;
  const bba = hash3(xi + 1, yi + 1, zi, seed) % 12;
  const bab = hash3(xi + 1, yi, zi + 1, seed) % 12;
  const bbb = hash3(xi + 1, yi + 1, zi + 1, seed) % 12;
  const x1 = lerp3(grad3(aaa, xf, yf, zf), grad3(baa, xf - 1, yf, zf), u);
  const x2 = lerp3(grad3(aba, xf, yf - 1, zf), grad3(bba, xf - 1, yf - 1, zf), u);
  const y1 = lerp3(x1, x2, v);
  const x3 = lerp3(grad3(aab, xf, yf, zf - 1), grad3(bab, xf - 1, yf, zf - 1), u);
  const x4 = lerp3(grad3(abb, xf, yf - 1, zf - 1), grad3(bbb, xf - 1, yf - 1, zf - 1), u);
  const y2 = lerp3(x3, x4, v);
  return lerp3(y1, y2, w);
};

// FBM
const fbm = (x, y, z, octaves = 5, persistence = 0.5, lacunarity = 2.0, seed = 0) => {
  let value = 0, amplitude = 1, frequency = 1, maxValue = 0;
  for (let i = 0; i < octaves; i++) {
    value += amplitude * perlin3D(x * frequency, y * frequency, z * frequency, seed + i);
    maxValue += amplitude;
    amplitude *= persistence;
    frequency *= lacunarity;
  }
  return value / maxValue;
};

// Worley 3D
const worley3D = (x, y, z, freq, seed = 0) => {
  const ix = Math.floor(x * freq);
  const iy = Math.floor(y * freq);

            {
                CloudLayerConfig layer = layers[i];
                if (!layer.Enabled) continue;

                var rng = new DeterministicRandom(layer.Seed);
                List<CloudSphere> rawSpheres;

                {
                    case CloudArchetype.Sphere:

                        break;
                    case CloudArchetype.Column:
                        rawSpheres = GenerateColumnLayer(layer, ref rng);
                        break;
                    case CloudArchetype.Platform:
                        rawSpheres = GeneratePlatformLayer(layer, ref rng);
                        break;
                    case CloudArchetype.Tree:
                        rawSpheres = GenerateTreeLayer(layer, ref rng);
                        break;
                    default:
                        rawSpheres = GenerateSphereLayer(layer, ref rng);
                        break;

                double minY = double.MaxValue;
                double maxY = double.MinValue;
                for (int si = 0; si < rawSpheres.Count; si++)
                {
                    double bottom = rawSpheres[si].Y - rawSpheres[si].Radius;
                    double top = rawSpheres[si].Y + rawSpheres[si].Radius;
                    if (bottom < minY) minY = bottom;
                    if (top > maxY) maxY = top;

                const double gap = 2.0;
                double yOffset = Math.Abs(layer.YOffset) > 0.001
                    ? layer.YOffset
                    : cumulativeY - minY + gap;

                {

        {

            public double Density;

        private static List<CloudSphere> GenerateSphereLayer(CloudLayerConfig layer, ref DeterministicRandom rng)
        {

            double sizeVariation = layer.SizeVariation;
            double jitter = layer.Jitter;
            double clustering = layer.Clustering;
            int parentCount = layer.ParentCount;

                double sizeBase = minRadius + sizeNoiseBase * (sizeMax - minRadius);
                double sizeMult = (0.05 + sizeNoiseMult * sizeVariation * 2.0 + effectiveRatio) * 0.3;
                double childRadius = sizeBase * sizeMult;

                if (childRadius < minRadius * 0.1)
                {
                    frame.NextPointIdx = idx + 1;
                    if (frame.NextPointIdx < frame.BumpCount) stack.Push(frame);
                    continue;
                }

                var perturbed = CloudMath.PerturbDir(
                    nx, ny, nz, jptX, jptY, jptZ, 0.25, seed + frame.Depth);

                double posOffX = (rng.NextDouble() - 0.5) * 12.0 * frame.Radius * posVariation;
                double posOffY = (rng.NextDouble() - 0.5) * 12.0 * frame.Radius * posVariation;
                double posOffZ = (rng.NextDouble() - 0.5) * 12.0 * frame.Radius * posVariation;

                double childX = jptX + perturbed.x * frame.Radius * 0.02 + posOffX;
                double childY = jptY + perturbed.y * frame.Radius * 0.02 + posOffY;
                double childZ = jptZ + perturbed.z * frame.Radius * 0.02 + posOffZ;

                spheres.Add(new CloudSphere
                {
                    X = (float)childX, Y = (float)childY, Z = (float)childZ,
                    Radius = (float)childRadius,
                    Depth = frame.Depth + 1, Density = (float)bumpIntensity,
                    Archetype = CloudArchetype.Sphere
                });

                if (spheres.Count >= maxSphereCount) break;

                frame.NextPointIdx = idx + 1;
                if (frame.NextPointIdx < frame.BumpCount) stack.Push(frame);

                double continueChance = Math.Max(0.15, 0.8 - frame.Depth * 0.2);
                bool shouldRecurse = (rng.NextDouble() < continueChance || frame.Depth < 2)
                                     && spheres.Count < maxSphereCount;

                if (shouldRecurse)
                {
                    stack.Push(new SphereGenFrame
                    {
                        X = childX, Y = childY, Z = childZ,
                        Radius = childRadius, Depth = frame.Depth + 1, Density = bumpIntensity,
                        NextPointIdx = -1, BumpCount = 0, SurfacePoints = null
                    });
                }
            }

            return spheres;
        }

        private static List<Vector3> SampleMeshPoints(CloudLayerConfig layer, ref DeterministicRandom rng)
        {
            var meshAsset = UnityEditor.AssetDatabase.LoadAssetAtPath<UnityEngine.Mesh>(layer.ParentMeshPath);
            if (meshAsset == null) return null;

            var points = new List<Vector3>();
            var vertices = meshAsset.vertices;
            var triangles = meshAsset.triangles;

            int triCount = triangles.Length / 3;
            var triAreas = new float[triCount];
            var cumAreas = new float[triCount];

            float totalArea = 0f;
            for (int i = 0; i < triCount; i++)
            {
                int i0 = triangles[i * 3];
                int i1 = triangles[i * 3 + 1];
                int i2 = triangles[i * 3 + 2];

                Vector3 v0 = vertices[i0];
                Vector3 v1 = vertices[i1];
                Vector3 v2 = vertices[i2];

                Vector3 e1 = v1 - v0;
                Vector3 e2 = v2 - v0;
                float area = Vector3.Cross(e1, e2).magnitude * 0.5f;

                if (area > 0.0001f)
                {
                    triAreas[i] = area;
                    totalArea += area;
                    cumAreas[i] = totalArea;
                }
                else
                {
                    triAreas[i] = 0f;
                    cumAreas[i] = totalArea;
                }
            }

            if (totalArea <= 0f) return null;

            int sampleCount = 2000;
            for (int p = 0; p < sampleCount; p++)
            {
                double r = rng.NextDouble() * totalArea;

                int triIdx = Array.BinarySearch(cumAreas, (float)r);
                if (triIdx < 0) triIdx = ~triIdx;
                if (triIdx >= triCount) triIdx = triCount - 1;

                int j0 = triangles[triIdx * 3];
                int j1 = triangles[triIdx * 3 + 1];
                int j2 = triangles[triIdx * 3 + 2];

                Vector3 w0 = vertices[j0];
                Vector3 w1 = vertices[j1];
                Vector3 w2 = vertices[j2];

                double u = rng.NextDouble();
                double v = rng.NextDouble();
                double sqrtU = Math.Sqrt(u);

                double a = 1.0 - sqrtU;
                double b = sqrtU * (1.0 - v);
                double c = sqrtU * v;

                points.Add(new Vector3(
                    (float)(a * w0.x + b * w1.x + c * w2.x),
                    (float)(a * w0.y + b * w1.y + c * w2.y),
                    (float)(a * w0.z + b * w1.z + c * w2.z)
                ));
            }

            if (points.Count == 0) return null;

            float sx = layer.ParentMeshScaleX;
            float sy = layer.ParentMeshScaleY;
            float sz = layer.ParentMeshScaleZ;
            float rx = layer.ParentMeshRotX * (float)(Math.PI / 180.0);
            float ry = layer.ParentMeshRotY * (float)(Math.PI / 180.0);
            float rz = layer.ParentMeshRotZ * (float)(Math.PI / 180.0);
            float ox = layer.ParentMeshOffsetX;
            float oy = layer.ParentMeshOffsetY;
            float oz = layer.ParentMeshOffsetZ;

            float cosZ = (float)Math.Cos(rz), sinZ = (float)Math.Sin(rz);
            float cosY = (float)Math.Cos(ry), sinY = (float)Math.Sin(ry);
            float cosX = (float)Math.Cos(rx), sinX = (float)Math.Sin(rx);

            var result = new List<Vector3>(points.Count);
            foreach (var pt in points)
            {
                float tsx = pt.x * sx;
                float tsy = pt.y * sy;
                float tsz = pt.z * sz;

                float rx2 = tsx * cosZ - tsy * sinZ;
                float ry2 = tsx * sinZ + tsy * cosZ;
                float rz2 = tsz;

                float rx3 = rx2 * cosY + rz2 * sinY;
                float ry3 = ry2;
                float rz3 = -rx2 * sinY + rz2 * cosY;

                float rx4 = rx3;
                float ry4 = ry3 * cosX - rz3 * sinX;
                float rz4 = ry3 * sinX + rz3 * cosX;

                result.Add(new Vector3(rx4 + ox, ry4 + oy, rz4 + oz));
            }

            return result;
        }

        private static List<CloudSphere> GenerateColumnLayer(CloudLayerConfig layer, ref DeterministicRandom rng)
        {
            var spheres = new List<CloudSphere>();

            int seed = layer.Seed;
            double jitter = layer.Jitter;
            double posVariation = layer.PositionVariation;
            int sizeMin = layer.SizeRange.Min;
            int sizeMax = layer.SizeRange.Max;

            double height = layer.ColumnParams.Height;
            double baseRadius = layer.ColumnParams.BaseRadius;
            double topRadius = layer.ColumnParams.TopRadius;
            int floors = layer.ColumnParams.Floors;
            int ringsPerFloor = layer.ColumnParams.RingsPerFloor;
            double wobble = layer.ColumnParams.Wobble / 100.0;

            double floorSpacing = height / floors;

            for (int floor = 0; floor < floors; floor++)
            {
                double t = floor / (double)(floors - 1 <= 0 ? 1 : floors - 1);
                double floorRadius = baseRadius + (topRadius - baseRadius) * t;

                double y = floor * floorSpacing;

                double wobbleX = CloudMath.Perlin3D(floor * 0.0, 0, 0, seed)
                                 * wobble * floorRadius
                                 + jitter * baseRadius * 2.0
                                    * CloudMath.Perlin3D(floor, 0, 0, seed + 1);
                double wobbleZ = CloudMath.Perlin3D(floor * 0.7, 0, 0, seed + 100)
                                 * wobble * floorRadius
                                 + jitter * baseRadius * 2.0
                                    * CloudMath.Perlin3D(floor, 0, 0, seed + 2);

                for (int r = 0; r < ringsPerFloor; r++)
                {
                    double angle = (r / (double)ringsPerFloor) * Math.PI * 2
                                   + CloudMath.Perlin3D(floor * 0.3, r * 0.5, seed, seed)
                                     * 0.5 * (1.0 + jitter * 2.0);
                     double distNoise = CloudMath.Perlin3D(floor * 0.5, r * 0.7, seed + 50, seed);
                    double distFromCenter = floorRadius
                                            * (0.3 + (distNoise + 1.0) * 0.5 * 0.7 + 0.5)
                                            * 0.5;
                     double jitR = CloudMath.Perlin3D(floor, r, seed, seed) * jitter * 0.5;

                    double rNoiseBase = Math.Pow(
                         (CloudMath.Perlin3D(floor + r * 0.1, r + floor * 0.1, seed + 200, seed)
                          + 1.0) * 0.5, 1.8);
                    double rNoiseMult = Math.Pow(
                         (CloudMath.Perlin3D(floor + r * 0.1 + 50, r + floor * 0.1 + 50, seed + 250, seed)
                         + 1.0) * 0.5, 1.5);
                    double sizeBase = sizeMin + rNoiseBase * (sizeMax - sizeMin);
                    double sphereRadius = baseRadius * sizeBase * 0.12 * (0.1 + rNoiseMult * 0.9);

                    double colOx = (rng.NextDouble() - 0.5) * 12.0 * sphereRadius * posVariation;
                    double colOy = (rng.NextDouble() - 0.5) * 12.0 * sphereRadius * posVariation;
                    double colOz = (rng.NextDouble() - 0.5) * 12.0 * sphereRadius * posVariation;

                    spheres.Add(new CloudSphere
                    {
                        X = (float)(Math.Cos(angle) * distFromCenter + wobbleX + colOx),
                        Y = (float)(y + jitR * 0.3 + colOy),
                        Z = (float)(Math.Sin(angle) * distFromCenter + wobbleZ + colOz),
                        Radius = (float)Math.Max(sphereRadius, 0.5),
                        Depth = 0, Density = (float)(0.6 + (1.0 - t) * 0.3),
                        Archetype = CloudArchetype.Column
                    });
                }

                if (floor % 2 == 0)
                {
                    spheres.Add(new CloudSphere
                    {
                        X = (float)wobbleX, Y = (float)y, Z = (float)wobbleZ,
                        Radius = (float)(floorRadius * 0.3),
                        Depth = 0, Density = 0.8f,
                        Archetype = CloudArchetype.Column
                    });
                }
            }

            return spheres;
        }

        private static List<CloudSphere> GeneratePlatformLayer(CloudLayerConfig layer, ref DeterministicRandom rng)
        {
            var spheres = new List<CloudSphere>();

            int seed = layer.Seed;
            double jitter = layer.Jitter;
            double clustering = layer.Clustering;
            double posVariation = layer.PositionVariation;
            int sizeMin = layer.SizeRange.Min;

            double width = layer.PlatformParams.Width;
            double depth = layer.PlatformParams.Depth;
            double centerThickness = layer.PlatformParams.CenterThickness;
            double edgeThickness = layer.PlatformParams.EdgeThickness;
            int interiorDensity = layer.PlatformParams.InteriorDensity;

            double baseRadius = sizeMin;

            spheres.Add(new CloudSphere
            {
                X = 0, Y = 0, Z = 0,
                Radius = (float)baseRadius,
                Depth = 0, Density = 1.0f,
                Archetype = CloudArchetype.Platform
            });

            var interiorPoints = CloudMath.FibonacciSpiral2D(interiorDensity);
            int spiralIdx = 0;

            for (int pi = 0; pi < interiorPoints.Length; pi++)
            {
                var pt = interiorPoints[pi];
                double px = pt.x * width * 0.5;
                double pz = pt.z * depth * 0.5;

                double dist = Math.Sqrt(
                    (px * px) / (width * width * 0.25) + (pz * pz) / (depth * depth * 0.25));
                double thickness = centerThickness * Math.Exp(-dist * dist * 3.0)
                                   + edgeThickness * dist;
                if (thickness < 0.2) continue;

                double yNoise = CloudMath.Perlin3D(px * 0.3, pz * 0.3, seed + 500, seed);
                double y = yNoise * thickness * 0.5
                           + jitter * baseRadius * CloudMath.Perlin3D(px, pz, seed, seed + 1);

                double rNoiseBase = Math.Pow(
                    (CloudMath.Perlin3D(px * 0.5, pz * 0.5, seed + 600 + spiralIdx, seed)
                     + 1.0) * 0.5, 1.8);
                double rNoiseMult = Math.Pow(
                    (CloudMath.Perlin3D(px * 0.5 + 70, pz * 0.5 + 70, seed + 650 + spiralIdx, seed + 1)
                     + 1.0) * 0.5, 1.5);
                double sizeBase = sizeMin + rNoiseBase * (layer.SizeRange.Max - sizeMin);
                double jitterFactor = 1.0 + jitter * (1.0 - clustering);
                double radius = sizeBase * (0.1 + rNoiseMult * 0.9) * jitterFactor;

                double densityVal = (0.3 + 0.7 * (1.0 - dist))
                                    * (clustering > 0.5 ? (0.7 + rNoiseBase * 0.3) : 1.0);

                if (densityVal < 0.1 || radius < 0.3) { spiralIdx++; continue; }

                double platOx = (rng.NextDouble() - 0.5) * 12.0 * radius * posVariation;
                double platOy = (rng.NextDouble() - 0.5) * 12.0 * radius * posVariation;
                double platOz = (rng.NextDouble() - 0.5) * 12.0 * radius * posVariation;

                spheres.Add(new CloudSphere
                {
                    X = (float)(px + platOx),
                    Y = (float)(y + platOy),
                    Z = (float)(pz + platOz),
                    Radius = (float)radius,
                    Depth = 0, Density = (float)densityVal,
                    Archetype = CloudArchetype.Platform
                });
                spiralIdx++;
            }

            return spheres;
        }

        private struct TreeFrame
        {
            public double X, Y, Z;
            public double DirX, DirY, DirZ;
            public double Radius;
            public int Depth;
            public int PathId;
            public double LengthMult;
        }

        private static List<CloudSphere> GenerateTreeLayer(CloudLayerConfig layer, ref DeterministicRandom rng)
        {
            var spheres = new List<CloudSphere>();
            int globalPathId = 0;

            int seed = layer.Seed;
            double jitter = layer.Jitter;
            double posVariation = layer.PositionVariation;
            int sizeMin = layer.SizeRange.Min;
            int sizeMax = layer.SizeRange.Max;

            double branchElongation = layer.TreeParams.BranchElongation;
            double taperRatio = layer.TreeParams.TaperRatio;
            double branchAngle = layer.TreeParams.BranchAngle * Math.PI / 180.0;
            double lengthFalloff = layer.TreeParams.LengthFalloff;
            double thicknessFalloff = layer.TreeParams.ThicknessFalloff;

            spheres.Add(new CloudSphere
            {
                X = 0, Y = 0, Z = 0,
                Radius = sizeMin,
                Depth = 0, Density = 1.0f,
                Archetype = CloudArchetype.Tree
            });

            var stack = new Stack<TreeFrame>();
            stack.Push(new TreeFrame
            {
                X = 0, Y = 0, Z = 0,
                DirX = 0, DirY = 1, DirZ = 0,
                Radius = sizeMin,
                Depth = 0, PathId = 0, LengthMult = 1.0
            });

            while (stack.Count > 0)
            {
                TreeFrame frame = stack.Pop();
                if (frame.Depth >= layer.TreeParams.MaxDepth) continue;
                if (frame.Radius < 0.5) continue;

                double dirLen = Math.Sqrt(
                    frame.DirX * frame.DirX + frame.DirY * frame.DirY + frame.DirZ * frame.DirZ);
                if (dirLen < 1e-15) continue;
                double dirNX = frame.DirX / dirLen;
                double dirNY = frame.DirY / dirLen;
                double dirNZ = frame.DirZ / dirLen;

                double extension = frame.Radius * branchElongation * frame.LengthMult;

                double a1 = CloudMath.Perlin3D(frame.X * 3, frame.Y * 3, frame.Z * 3, seed + frame.PathId)
                            * branchAngle;
                double a2 = CloudMath.Perlin3D(frame.X * 3, frame.Y * 3, frame.Z * 3 + 50, seed + frame.PathId + 1)
                            * branchAngle;
                double cos1 = Math.Cos(a1), sin1 = Math.Sin(a1);
                double cos2 = Math.Cos(a2), sin2 = Math.Sin(a2);

                double pdx = dirNX * cos1 - dirNY * sin1;
                double pdy = dirNX * sin1 + dirNY * cos1;
                double pdz = dirNZ;
                double pdx2 = pdx * cos2 + pdz * sin2;
                double pdy2 = pdy;
                double pdz2 = -pdx * sin2 + pdz * cos2;
                double pLen = Math.Sqrt(pdx2 * pdx2 + pdy2 * pdy2 + pdz2 * pdz2);
                if (pLen < 1e-15) continue;
                double perturbedDirX = pdx2 / pLen;
                double perturbedDirY = pdy2 / pLen;
                double perturbedDirZ = pdz2 / pLen;

                double jitterAngle = jitter * Math.PI
                                     * CloudMath.Perlin3D(frame.X, frame.Y, frame.PathId, seed);
                double jCos = Math.Cos(jitterAngle), jSin = Math.Sin(jitterAngle);
                double jDirX = jCos * perturbedDirX - jSin * perturbedDirY;
                double jDirY = jCos * perturbedDirY + jSin * perturbedDirX;
                double jDirZ = perturbedDirZ;

                double childPosX = frame.X + jDirX * extension
                                   + jitter * layer.TreeParams.BaseRadius * CloudMath.Perlin3D(frame.Depth, frame.PathId, seed + 50, seed);
                double childPosY = frame.Y + jDirY * extension
                                   + jitter * layer.TreeParams.BaseRadius * CloudMath.Perlin3D(frame.Depth, frame.PathId, seed + 60, seed);
                double childPosZ = frame.Z + jDirZ * extension
                                   + jitter * layer.TreeParams.BaseRadius * CloudMath.Perlin3D(frame.Depth, frame.PathId, seed + 70, seed);

                double sizeNoiseBase = Math.Pow(
                    (CloudMath.Perlin3D(frame.Depth, frame.PathId, seed + 80, seed) + 1.0) * 0.5, 1.8);
                double sizeNoiseMult = Math.Pow(
                    (CloudMath.Perlin3D(frame.Depth, frame.PathId, seed + 82, seed) + 1.0) * 0.5, 1.5);
                double radiusNoise = Math.Pow(
                    (CloudMath.Perlin3D(frame.Depth, frame.PathId, seed + 81, seed) + 1.0) * 0.5, 2.0);
                double szBase = sizeMin + sizeNoiseBase * (sizeMax - sizeMin);
                double childRadius = szBase * taperRatio * thicknessFalloff
                                     * (0.1 + sizeNoiseMult * 0.9)
                                     * (0.3 + radiusNoise * 0.7);
                double childDensity = 1.0 - (frame.Depth / (double)layer.TreeParams.MaxDepth) * 0.3;

                double treeOx = (rng.NextDouble() - 0.5) * 12.0 * childRadius * posVariation;
                double treeOy = (rng.NextDouble() - 0.5) * 12.0 * childRadius * posVariation;
                double treeOz = (rng.NextDouble() - 0.5) * 12.0 * childRadius * posVariation;

                spheres.Add(new CloudSphere
                {
                    X = (float)(childPosX + treeOx),
                    Y = (float)(childPosY + treeOy),
                    Z = (float)(childPosZ + treeOz),
                    Radius = (float)childRadius,
                    Depth = frame.Depth + 1, Density = (float)childDensity,
                    Archetype = CloudArchetype.Tree
                });

                stack.Push(new TreeFrame
                {
                    X = childPosX, Y = childPosY, Z = childPosZ,
                    DirX = perturbedDirX, DirY = perturbedDirY, DirZ = perturbedDirZ,
                    Radius = childRadius,
                    Depth = frame.Depth + 1,
                    PathId = frame.PathId,
                    LengthMult = frame.LengthMult * lengthFalloff
                });

                double val = (CloudMath.Perlin3D(
                                 frame.X * 2, frame.Y * 2, frame.Z * 2, seed + frame.PathId)
                             + 1.0) * 0.5;
                int lateralCount;
                if (val < 0.4) lateralCount = 0;
                else if (val < 0.75) lateralCount = 1;
                else if (val < 0.95) lateralCount = 2;
                else lateralCount = 3;

                for (int i = 0; i < lateralCount; i++)
                {
                    int lateralPathId = ++globalPathId;
                    double lateralAngle = (i / (double)Math.Max(lateralCount, 1)) * Math.PI * 2
                                          + CloudMath.Perlin3D(frame.PathId * 10, i * 5, seed, seed)
                                            * 0.5 * (1.0 + jitter);

                    double perpX = -dirNZ;
                    double perpZ = dirNX;
                    double latDirX = dirNX * Math.Cos(branchAngle)
                                     + perpX * Math.Sin(lateralAngle) * Math.Sin(branchAngle);
                    double latDirY = dirNY * Math.Cos(branchAngle)
                                     + Math.Sin(branchAngle) * 0.5;
                    double latDirZ = dirNZ * Math.Cos(branchAngle)
                                     + perpZ * Math.Sin(lateralAngle) * Math.Sin(branchAngle);

                    double latLen = Math.Sqrt(latDirX * latDirX + latDirY * latDirY + latDirZ * latDirZ);
                    if (latLen < 1e-15) continue;
                    latDirX /= latLen;
                    latDirY /= latLen;
                    latDirZ /= latLen;

                    double lateralRadius = childRadius * 0.7;
                    if (lateralRadius < 0.5) continue;

                    double lateralPosX = frame.X + latDirX * extension * 0.8;
                    double lateralPosY = frame.Y + latDirY * extension * 0.8;
                    double lateralPosZ = frame.Z + latDirZ * extension * 0.8;

                    double latOx = (rng.NextDouble() - 0.5) * 12.0 * lateralRadius * posVariation;
                    double latOy = (rng.NextDouble() - 0.5) * 12.0 * lateralRadius * posVariation;
                    double latOz = (rng.NextDouble() - 0.5) * 12.0 * lateralRadius * posVariation;

                    spheres.Add(new CloudSphere
                    {
                        X = (float)(lateralPosX + latOx),
                        Y = (float)(lateralPosY + latOy),
                        Z = (float)(lateralPosZ + latOz),
                        Radius = (float)lateralRadius,
                        Depth = frame.Depth + 1, Density = (float)(childDensity * 0.8),
                        Archetype = CloudArchetype.Tree
                    });

                    if (frame.Depth + 1 < layer.TreeParams.MaxDepth - 1)
                    {
                        stack.Push(new TreeFrame
                        {
                            X = lateralPosX, Y = lateralPosY, Z = lateralPosZ,
                            DirX = latDirX, DirY = latDirY, DirZ = latDirZ,
                            Radius = lateralRadius,
                            Depth = frame.Depth + 2,
                            PathId = lateralPathId,
                            LengthMult = frame.LengthMult * lengthFalloff * 0.8
                        });
                    }
                }
            }

            return spheres;
        }
    }
}

        code += `            BranchElongation = ${p.branchElongation || 1.8}f, TaperRatio = ${p.taperRatio || 0.8}f,\n`;
        code += `            BranchAngle = ${p.branchAngle || 40}f, BranchProbability = ${p.branchProbability || 0.5}f,\n`;
        code += `            TrunkUpBias = ${p.trunkUpBias || 0.4}f, LengthFalloff = ${p.lengthFalloff || 0.75}f,\n`;
        code += `            ThicknessFalloff = ${p.thicknessFalloff || 0.85}f\n`;
        code += `        }\n`;
      }
      code += `    },\n`;
      return code;
    }
  },

  json: {
    // JSON export template
    exportConfig: (layers) => {
      return JSON.stringify({
        layers: layers.map(layer => {
          const exportLayer = { ...layer };
          Object.keys(exportLayer).forEach(key => {
            if (exportLayer[key] === undefined) delete exportLayer[key];
          });
          return exportLayer;
        }),
        generatorVersion: EXPORT_VERSION
      }, null, 2);
    },

    // JSON import helper comment
    importHint: `// To use this config in Unity:
// var config = JsonUtility.FromJson<CloudLayersExport>(json);
// var spheres = CloudGenerator.Generate(config.layers);`
  }
};

// Generic export function
function genericExport(layers, format, namespace) {
  namespace = namespace || 'ProjectC';

  if (format === 'json') {
    // Convert camelCase to PascalCase for Unity JsonUtility compatibility
    const convertKeys = (obj) => {
      if (Array.isArray(obj)) {
        return obj.map(convertKeys);
      }
      if (obj !== null && typeof obj === 'object') {
        const result = {};
        for (const key in obj) {
          let finalKey = key;
          // Special cases first
          if (key === 'sizeRange') {
            finalKey = 'SizeRange';
          } else if (key === 'noiseSalt') {
            finalKey = 'NoiseSalt';
          } else if (key.includes('Params')) {
            // columnParams -> ColumnParams, platformParams -> PlatformParams, treeParams -> TreeParams
            const match = key.match(/^([a-z]+)(Params)$/);
            if (match) {
              finalKey = match[1].charAt(0).toUpperCase() + match[1].slice(1) + match[2];
            }
          } else {
            finalKey = key.charAt(0).toUpperCase() + key.slice(1);
          }
          // Recursively convert nested objects
          if (obj[key] !== null && typeof obj[key] === 'object' && !Array.isArray(obj[key])) {
            result[finalKey] = convertKeys(obj[key]);
          } else {
            result[finalKey] = obj[key];
          }
        }
        return result;
      }
      return obj;
    };

    // Deep clone and convert layers
    const convertLayer = (layer) => {
      const result = {};
      for (const key in layer) {
        if (key === 'sizeRange' && typeof layer[key] === 'object') {
          result['SizeRange'] = {
            'Min': layer[key].min,
            'Max': layer[key].max
          };
        } else if (key === 'columnParams' && typeof layer[key] === 'object') {
          const p = layer[key];
          result['ColumnParams'] = {
            'Height': p.height || 0,
            'BaseRadius': p.baseRadius || 0,
            'TopRadius': p.topRadius || 0,
            'Floors': p.floors || 0,
            'RingsPerFloor': p.ringsPerFloor || 0,
            'Wobble': p.wobble || 0
          };
        } else if (key === 'platformParams' && typeof layer[key] === 'object') {
          const p = layer[key];
          result['PlatformParams'] = {
            'Width': p.width || 0,
            'Depth': p.depth || 0,
            'CenterThickness': p.centerThickness || 0,
            'EdgeThickness': p.edgeThickness || 0,
            'InteriorDensity': p.interiorDensity || 0,
            'EdgeRings': p.edgeRings || 0
          };
        } else if (key === 'treeParams' && typeof layer[key] === 'object') {
          const p = layer[key];
          result['TreeParams'] = {
            'BaseRadius': p.baseRadius || 0,
            'MaxDepth': p.maxDepth || 0,
            'BranchElongation': p.branchElongation || 0,
            'TaperRatio': p.taperRatio || 0,
            'BranchAngle': p.branchAngle || 0,
            'BranchProbability': p.branchProbability || 0,
            'TrunkUpBias': p.trunkUpBias || 0,
            'LengthFalloff': p.lengthFalloff || 0,
            'ThicknessFalloff': p.thicknessFalloff || 0
          };
        } else if (key === 'archetype') {
          const archMap = { sphere: 0, column: 1, platform: 2, tree: 3 };
          result['Archetype'] = archMap[layer[key]] ?? 0;
        } else {
          result[key.charAt(0).toUpperCase() + key.slice(1)] = layer[key];
        }
      }
      return result;
    };

    const config = {
      layers: layers.map(l => convertLayer(l)),
      generatorVersion: EXPORT_VERSION
    };
    return JSON.stringify(config, null, 2);
  }

  if (format === 'csharp-config') {
    let code = `// CloudConfig.cs v${EXPORT_VERSION}\n`;
    code += `// Generated by Cloud Generator Visualizer\n\n`;
    code += `using System.Collections.Generic;\n\n`;
    code += `namespace ${namespace}.CloudGenerator\n{\n`;
    code += `    public class CloudLayersExport\n`;
    code += `    {\n`;
    code += `        public List<CloudLayerConfig> layers;\n`;
    code += `    }\n`;
    code += `}\n\n`;
    code += `// Layer configs:\n`;
    code += `List<CloudLayerConfig> layers = new List<CloudLayerConfig> {\n`;
    layers.forEach(layer => {
      code += TEMPLATES.csharp.layerInitializer(layer);
    });
    code += `};\n\n`;
    code += `var spheres = CloudGenerator.Generate(layers);\n`;
    return code;
  }

  return '// Unsupported format: ' + format;
}

// Export full generator as ZIP (3 separate .cs files)
async function exportFullGenerator(layers, namespace) {
  const status = document.getElementById('export-status');
  status.textContent = 'Creating ZIP archive...';

  try {
    const zip = new JSZip();
    const archiveName = `CloudGenerator_v${EXPORT_VERSION}`;

    // Use actual layers from UI
    const actualLayers = window._advancedLayers && window._advancedLayers.length > 0
      ? window._advancedLayers
      : layers;

    // Generate content for each file
    const cloudMathContent = TEMPLATES.csharp.cloudMathHeader
      .replace(/{{NAMESPACE}}/g, namespace)
      .replace(/\$\{EXPORT_VERSION\}/g, EXPORT_VERSION);

    const cloudTypesContent = TEMPLATES.csharp.cloudTypesHeader
      .replace(/{{NAMESPACE}}/g, namespace)
      .replace(/\$\{EXPORT_VERSION\}/g, EXPORT_VERSION);

    const cloudGenContent = TEMPLATES.csharp.cloudGeneratorHeader
      .replace(/{{NAMESPACE}}/g, namespace)
      .replace(/\$\{EXPORT_VERSION\}/g, EXPORT_VERSION);

    // Add files to ZIP
    zip.file(`${archiveName}/CloudMath.cs`, cloudMathContent);
    zip.file(`${archiveName}/CloudTypes.cs`, cloudTypesContent);
    zip.file(`${archiveName}/CloudGenerator.cs`, cloudGenContent);
    zip.file(`${archiveName}/Editor/CloudGeneratorWindow.cs`, generateEditorScript(namespace).replace(/\$\{EXPORT_VERSION\}/g, EXPORT_VERSION));

    // Generate and download ZIP
    const content = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = `${archiveName}.zip`;
    a.click();
    URL.revokeObjectURL(a.href);

    status.textContent = 'Downloaded ' + archiveName + '.zip';
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }

  setTimeout(() => {
    const modal = document.querySelector('div[style*="z-index: 1000"]');
    if (modal) modal.remove();
  }, 2000);
}

// Helper: download text file
function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Export mesh as OBJ file
function exportMeshOBJ() {
  const status = document.getElementById('export-status');
  if (!status) { alert('Open export dialog first'); return; }
  status.textContent = 'Generating OBJ mesh...';

  try {
    let spheres;
    if (_isRemeshed && _visibleSpheres.length > 0) {
      spheres = _visibleSpheres;
    } else {
      spheres = getVisibleSpheresForExport();
    }

    let obj = '# Cloud Mesh OBJ Export\n';
    obj += `# ${spheres.length} spheres`;
    obj += _isRemeshed ? ' (remeshed)\n' : '\n';
    obj += '# Format: x y z radius\n\n';

    let vertexOffset = 1;
    spheres.forEach((s, idx) => {
      const r = s.radius;
      const latSegments = Math.max(8, Math.floor(r * 2));
      const lonSegments = Math.max(6, Math.floor(r * 2));

      obj += `# Sphere ${idx + 1} at (${s.x.toFixed(2)}, ${s.y.toFixed(2)}, ${s.z.toFixed(2)}) r=${r.toFixed(2)}\n`;

      const baseVertex = vertexOffset;
      let firstBand = true;

      for (let lat = 0; lat <= latSegments; lat++) {
        const theta = (lat * Math.PI) / latSegments;
        const sinTheta = Math.sin(theta);
        const cosTheta = Math.cos(theta);

        for (let lon = 0; lon <= lonSegments; lon++) {
          const phi = (lon * 2 * Math.PI) / lonSegments;
          const x = s.x + r * sinTheta * Math.cos(phi);
          const y = s.y + r * cosTheta;
          const z = s.z + r * sinTheta * Math.sin(phi);
          obj += `v ${x.toFixed(4)} ${y.toFixed(4)} ${z.toFixed(4)}\n`;
          vertexOffset++;
        }
      }

      const latSegmentsActual = latSegments;
      const lonSegmentsActual = lonSegments;
      for (let lat = 0; lat < latSegmentsActual; lat++) {
        for (let lon = 0; lon < lonSegmentsActual; lon++) {
          const p1 = baseVertex + lat * (lonSegmentsActual + 1) + lon;
          const p2 = p1 + lonSegmentsActual + 1;
          const p3 = p2 + 1;
          const p4 = p1 + 1;
          obj += `f ${p1} ${p2} ${p3}\n`;
          obj += `f ${p1} ${p3} ${p4}\n`;
        }
      }
      obj += '\n';
    });

    const timestamp = new Date().toISOString().slice(0, 10);
    downloadFile(`cloud_mesh_${timestamp}.obj`, obj);
    status.textContent = `Exported ${spheres.length} spheres as OBJ${_isRemeshed ? ' (remeshed)' : ''}`;

    setTimeout(() => {
      const modal = document.querySelector('div[style*="z-index: 1000"]');
      if (modal) modal.remove();
    }, 1500);
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}

// Export mesh positions as C# static class
function exportMeshPositions() {
  const status = document.getElementById('export-status');
  if (!status) { alert('Open export dialog first'); return; }
  status.textContent = 'Generating C# positions...';

  try {
    let spheres;
    if (_isRemeshed && _visibleSpheres.length > 0) {
      spheres = _visibleSpheres;
    } else {
      spheres = getVisibleSpheresForExport();
    }

    const ns = document.getElementById('export-namespace')?.value.trim() || 'ProjectC';

    let code = `// CloudMeshPositions.cs v${EXPORT_VERSION}\n`;
    code += `// Generated by Cloud Generator Visualizer\n`;
    code += `// ${spheres.length} spheres${_isRemeshed ? ' (remeshed)' : ''}, ${new Date().toISOString()}\n\n`;
    code += `using UnityEngine;\n\n`;
    code += `namespace ${ns}.CloudGenerator\n`;
    code += `{\n`;
    code += `    public static class CloudMeshPositions\n`;
    code += `    {\n`;
    code += `        public const int SphereCount = ${spheres.length};\n\n`;
    code += `        public static readonly Vector3[] Positions = new Vector3[${spheres.length}]\n`;
    code += `        {\n`;

    for (let i = 0; i < spheres.length; i++) {
      const s = spheres[i];
      code += `            new Vector3(${s.x.toFixed(4)}f, ${s.y.toFixed(4)}f, ${s.z.toFixed(4)}f)`;
      code += i < spheres.length - 1 ? ',\n' : '\n';
    }

    code += `        };\n\n`;
    code += `        public static readonly float[] Radii = new float[${spheres.length}]\n`;
    code += `        {\n`;

    for (let i = 0; i < spheres.length; i++) {
      code += `            ${spheres[i].radius.toFixed(4)}f`;
      code += i < spheres.length - 1 ? ',\n' : '\n';
    }

    code += `        };\n\n`;
    code += `        public static readonly float[] Densities = new float[${spheres.length}]\n`;
    code += `        {\n`;

    for (let i = 0; i < spheres.length; i++) {
      code += `            ${(spheres[i].density || 0.6).toFixed(4)}f`;
      code += i < spheres.length - 1 ? ',\n' : '\n';
    }

    code += `        };\n\n`;
    code += `        public static Mesh CreateMesh()\n`;
    code += `        {\n`;
    code += `            var mesh = new Mesh();\n`;
    code += `            var vertices = new Vector3[${spheres.length} * 4];\n`;
    code += `            var indices = new int[${spheres.length} * 6];\n\n`;
    code += `            for (int i = 0; i < ${spheres.length}; i++)\n`;
    code += `            {\n`;
    code += `                float r = Radii[i];\n`;
    code += `                vertices[i * 4] = Positions[i] + Vector3.up * r;\n`;
    code += `                vertices[i * 4 + 1] = Positions[i] + Vector3.down * r;\n`;
    code += `                vertices[i * 4 + 2] = Positions[i] + Vector3.left * r;\n`;
    code += `                vertices[i * 4 + 3] = Positions[i] + Vector3.right * r;\n`;
    code += `                indices[i * 6] = i * 4;\n`;
    code += `                indices[i * 6 + 1] = i * 4 + 1;\n`;
    code += `                indices[i * 6 + 2] = i * 4 + 2;\n`;
    code += `                indices[i * 6 + 3] = i * 4;\n`;
    code += `                indices[i * 6 + 4] = i * 4 + 2;\n`;
    code += `                indices[i * 6 + 5] = i * 4 + 3;\n`;
    code += `            }\n\n`;
    code += `            mesh.vertices = vertices;\n`;
    code += `            mesh.SetIndices(indices, MeshTopology.Triangles, 0);\n`;
    code += `            mesh.RecalculateBounds();\n`;
    code += `            return mesh;\n`;
    code += `        }\n`;
    code += `    }\n`;
    code += `}\n`;

    const timestamp = new Date().toISOString().slice(0, 10);
    downloadFile(`CloudMeshPositions_${timestamp}.cs`, code);
    status.textContent = `Exported ${spheres.length} sphere positions as C#${_isRemeshed ? ' (remeshed)' : ''}`;

    setTimeout(() => {
      const modal = document.querySelector('div[style*="z-index: 1000"]');
      if (modal) modal.remove();
    }, 1500);
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}

    const cloudMathCpp = `// CloudMath.cpp
#include "CloudMath.h"
#include "Math/UnrealMathUtility.h"

namespace CloudMathUE
{
    int32 Hash3(int32 x, int32 y, int32 z, int32 seed)
    {
        int64 n64 = x + y * 57LL + z * 131LL + (int64)seed * 123456789LL;
        int32 n = (int32)n64;
        n = (n << 13) ^ n;
        double dn = n;
        double d = dn * (dn * dn * 15731.0 + 789221.0) + 1376312589.0;
        const double two32 = 4294967296.0;
        double mod = d - two32 * FMath::FloorToDouble(d / two32);
        if (mod >= 2147483648.0) mod -= two32;
        return ((int32)mod) & 0x7FFFFFFF;
    }

    double Fade3(double t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    double Lerp3(double a, double b, double t) { return a + (b - a) * t; }

    double Grad3(int32 h, double x, double y, double z)
    {
        int32 g = h & 15;
        double u = g < 8 ? x : y;
        double v = g < 4 ? y : (g == 12 || g == 14 ? x : z);
        return ((g & 1) != 0 ? -u : u) + ((g & 2) != 0 ? -v : v);
    }

    double Perlin3D(double x, double y, double z, int32 seed)
    {
        int32 xi = (int32)FMath::FloorToDouble(x) & 0xFF;
        int32 yi = (int32)FMath::FloorToDouble(y) & 0xFF;
        int32 zi = (int32)FMath::FloorToDouble(z) & 0xFF;
        double xf = x - FMath::FloorToDouble(x);
        double yf = y - FMath::FloorToDouble(y);
        double zf = z - FMath::FloorToDouble(z);
        double u = Fade3(xf), v = Fade3(yf), w = Fade3(zf);

        int32 aaa = Hash3(xi, yi, zi, seed) % 12;
        int32 aba = Hash3(xi, yi + 1, zi, seed) % 12;
        int32 aab = Hash3(xi, yi, zi + 1, seed) % 12;
        int32 abb = Hash3(xi, yi + 1, zi + 1, seed) % 12;
        int32 baa = Hash3(xi + 1, yi, zi, seed) % 12;
        int32 bba = Hash3(xi + 1, yi + 1, zi, seed) % 12;
        int32 bab = Hash3(xi + 1, yi, zi + 1, seed) % 12;
        int32 bbb = Hash3(xi + 1, yi + 1, zi + 1, seed) % 12;

        double x1 = Lerp3(Grad3(aaa, xf, yf, zf), Grad3(baa, xf - 1, yf, zf), u);
        double x2 = Lerp3(Grad3(aba, xf, yf - 1, zf), Grad3(bba, xf - 1, yf - 1, zf), u);
        double y1 = Lerp3(x1, x2, v);
        double x3 = Lerp3(Grad3(aab, xf, yf, zf - 1), Grad3(bab, xf - 1, yf, zf - 1), u);
        double x4 = Lerp3(Grad3(abb, xf, yf - 1, zf - 1), Grad3(bbb, xf - 1, yf - 1, zf - 1), u);
        double y2 = Lerp3(x3, x4, v);
        return Lerp3(y1, y2, w);
    }

    double Fbm(double x, double y, double z, int32 octaves, double persistence, double lacunarity, int32 seed)
    {
        double value = 0, amplitude = 1, frequency = 1, maxValue = 0;
        for (int32 i = 0; i < octaves; i++)
        {
            value += amplitude * Perlin3D(x * frequency, y * frequency, z * frequency, seed + i);
            maxValue += amplitude;
            amplitude *= persistence;
            frequency *= lacunarity;
        }
        return value / maxValue;
    }

    double Worley3D(double x, double y, double z, double freq, int32 seed)
    {
        int32 ix = (int32)FMath::FloorToDouble(x * freq);
        int32 iy = (int32)FMath::FloorToDouble(y * freq);
        int32 iz = (int32)FMath::FloorToDouble(z * freq);
        double minDist = 1e9;
        for (int32 dx = -1; dx <= 1; dx++)
        {
            for (int32 dy = -1; dy <= 1; dy++)
            {
                for (int32 dz = -1; dz <= 1; dz++)
                {
                    int32 cx = ix + dx;
                    int32 cy = iy + dy;
                    int32 cz = iz + dz;
                    int32 h = ((cx * 12345) ^ (cy * 67890) ^ (cz * 13579)) & 0x7FFFFFFF;
                    h += (int32)((int64)seed * 123456789);
                    double sx = (h % 1000) / 1000.0;
                    double sy = ((h / 1000) % 1000) / 1000.0;
                    double sz = ((h / 1000000) % 1000) / 1000.0;
                    double dx2 = x * freq - (cx + sx);
                    double dy2 = y * freq - (cy + sy);
                    double dz2 = z * freq - (cz + sz);
                    double dist = FMath::Sqrt(dx2 * dx2 + dy2 * dy2 + dz2 * dz2);
                    if (dist < minDist) minDist = dist;
                }
            }
        }
        return minDist;
    }

    double InvertedWorley(double x, double y, double z, double freq, int32 seed)
    {
        return 1.0 - FMath::Min(Worley3D(x, y, z, freq, seed), 1.0);
    }

    TArray<FVec3> FibonacciSphere(double cx, double cy, double cz, double rx, double ry, double rz, int32 numPoints)
    {
        TArray<FVec3> pts;
        pts.Reserve(numPoints);
        double angleInc = UE_DOUBLE_PI * 2.0 * PHI;
        for (int32 i = 0; i < numPoints; i++)
        {
            double t = i / (double)numPoints;
            double inclination = FMath::Acos(1.0 - 2.0 * t);
            double azimuth = angleInc * i;
            double sx = FMath::Sin(inclination) * FMath::Cos(azimuth);
            double sy = FMath::Sin(inclination) * FMath::Sin(azimuth);
            double sz = FMath::Cos(inclination);
            pts.Add({ cx + sx * rx, cy + sy * ry, cz + sz * rz });
        }
        return pts;
    }

    TArray<FVec3> FibonacciSpiral2D(int32 count)
    {
        TArray<FVec3> pts;
        pts.Reserve(count);
        double angleInc = UE_DOUBLE_PI * 2.0 * PHI;
        for (int32 i = 0; i < count; i++)
        {
            double r = FMath::Sqrt(i / (double)count);
            double theta = angleInc * i;
            pts.Add({ r * FMath::Cos(theta), 0, r * FMath::Sin(theta) });
        }
        return pts;
    }

    FVec3 PerturbDir(double nx, double ny, double nz, double px, double py, double pz, double strength, int32 seed)
    {
        double a1 = Perlin3D(px * 10, py * 10, pz * 10, seed) * strength;
        double a2 = Perlin3D(px * 10, py * 10, pz * 10 + 50, seed + 1) * strength;
        double cos1 = FMath::Cos(a1), sin1 = FMath::Sin(a1);
        double cos2 = FMath::Cos(a2), sin2 = FMath::Sin(a2);
        double nx2 = nx * cos1 - ny * sin1;
        double ny2 = nx * sin1 + ny * cos1;
        double nz2 = nz;
        double nx3 = nx2 * cos2 + nz2 * sin2;
        double ny3 = ny2;
        double nz3 = -nx2 * sin2 + nz2 * cos2;
        double len = FMath::Sqrt(nx3 * nx3 + ny3 * ny3 + nz3 * nz3);
        if (len == 0) len = 1;
        return { nx3 / len, ny3 / len, nz3 / len };
    }
}
`;

#include "CloudGeneratorBPLibrary.h"
#include "CloudMath.h"
#include "Json.h"
#include "JsonUtilities.h"
#include "Math/UnrealMathUtility.h"

using namespace CloudMathUE;

struct FDeterministicRandom {
    uint32 State;
    FDeterministicRandom(int32 seed) {
        State = (uint32)(seed != 0 ? seed : 1);
        for (int32 i = 0; i < 10; i++) {
            State ^= State << 13; State ^= State >> 17; State ^= State << 5;
        }
    }
    double Next() { State ^= State << 13; State ^= State >> 17; State ^= State << 5; return State / (double)UINT32_MAX; }
};

TArray<FCloudSphereBP> GenerateLayerSpheres(const FCloudLayerConfigBP& Config) {
    TArray<FCloudSphereBP> Result;
    if (!Config.Enabled) return Result;

    int32 Seed = Config.Seed > 0 ? Config.Seed : 42;
    FDeterministicRandom RNG(Seed);
    double YOffset = Config.YOffset;
    float Jitter = Config.Jitter;
    float PositionVariation = Config.PositionVariation;
    int32 Archetype = Config.Archetype;
    int32 SizeMin = Config.SizeRange.Min > 0 ? Config.SizeRange.Min : 5;
    int32 SizeMax = Config.SizeRange.Max > SizeMin ? Config.SizeRange.Max : 20;

    if (Archetype == 0) { // Sphere
        double BaseR = Config.CloudSize * 0.5;
        TArray<TTuple<FVector, double>> Stack;
        Stack.Add(TTuple<FVector, double>(FVector::ZeroVector, BaseR));

        while (Stack.Num() > 0 && Result.Num() < Config.MaxSphereCount) {
            auto [Pos, Radius] = Stack.Last();
            Stack.Pop();
            if (Radius < SizeMin * 1.5) continue;

            auto Points = FibonacciSphere(Pos.X, Pos.Y, Pos.Z, Radius, Radius, Radius, Config.BumpsPerLevel);
            for (int32 i = 0; i < Points.Num() && Result.Num() < Config.MaxSphereCount; i++) {
                auto& P = Points[i];
                double DistN = Perlin3D(P.X * 0.1, P.Y * 0.1, P.Z * 0.1, Seed + i + 100);
                if ((DistN + 1) * 0.5 < Config.ChildRatio / 100.0f * (1 - Jitter * 0.5f)) continue;
                double SizeN = FMath::Pow((Perlin3D(P.X * 0.2, P.Y * 0.2, P.Z * 0.2, Seed + 200 + i) + 1) * 0.5, 1.8);
                double NewR = SizeMin + SizeN * (SizeMax - SizeMin);
                Result.Add(FCloudSphereBP{ FVector(P.X, P.Y + YOffset, P.Z), (float)NewR, Config.Density, 0 });
                Stack.Add(TTuple<FVector, double>(FVector(P.X, P.Y, P.Z), NewR));
            }
        }
    }
    else if (Archetype == 1) { // Column
        double H = Config.ColumnParams.Height;
        double BR = Config.ColumnParams.BaseRadius;
        double TR = Config.ColumnParams.TopRadius;
        int32 Floors = FMath::Max(Config.ColumnParams.Floors, 1);
        int32 RPF = FMath::Max(Config.ColumnParams.RingsPerFloor, 1);
        double FloorSpacing = H / FMath::Max(Floors - 1, 1);

        for (int32 Floor = 0; Floor < Floors; Floor++) {
            double T = Floor / (double)FMath::Max(Floors - 1, 1);
            double FR = BR + (TR - BR) * T;
            double Y = Floor * FloorSpacing;

            for (int32 R = 0; R < RPF; R++) {
                double Angle = (R / (double)RPF) * UE_DOUBLE_PI * 2 + Perlin3D(Floor * 0.3, R * 0.5, Seed, Seed) * 0.5 * (1 + Jitter * 2);
                double Dist = FR * (0.3 + (Perlin3D(Floor * 0.5, R * 0.7, Seed + 50, Seed) + 1) * 0.35);
                double jitR = Perlin3D(Floor, R, Seed, Seed) * Jitter * 0.5;
                double SizeN = FMath::Pow((Perlin3D(Floor + R * 0.1, R + Floor * 0.1, Seed + 200, Seed) + 1) * 0.5, 1.8);
                double SphereR = BR * (SizeMin + SizeN * (SizeMax - SizeMin)) * 0.12 * (0.1 + 0.9 * SizeN);
                double OX = (RNG.Next() - 0.5) * 12 * SphereR * PositionVariation;
                double OY = (RNG.Next() - 0.5) * 12 * SphereR * PositionVariation;
                double OZ = (RNG.Next() - 0.5) * 12 * SphereR * PositionVariation;
                Result.Add(FCloudSphereBP{ FVector(FMath::Cos(Angle) * Dist + OX, Y + jitR * 0.3 + OY + YOffset, FMath::Sin(Angle) * Dist + OZ), (float)SphereR, Config.Density, 1 });
            }
        }
    }
    else if (Archetype == 2) { // Platform
        Result.Add(FCloudSphereBP{ FVector(0, YOffset, 0), (float)SizeMin, 1.0f, 2 });
        auto Points = FibonacciSpiral2D(Config.PlatformParams.InteriorDensity);
        for (int32 i = 0; i < Points.Num(); i++) {
            auto& P = Points[i];
            double PX = P.X * Config.PlatformParams.Width * 0.5;
            double PZ = P.Z * Config.PlatformParams.Depth * 0.5;
            double Dist = FMath::Sqrt((PX * PX) / (Config.PlatformParams.Width * Config.PlatformParams.Width * 0.25) + (PZ * PZ) / (Config.PlatformParams.Depth * Config.PlatformParams.Depth * 0.25));
            double Thick = Config.PlatformParams.CenterThickness * FMath::Exp(-Dist * Dist * 3) + Config.PlatformParams.EdgeThickness * Dist;
            if (Thick < 0.2) continue;
            double YN = Perlin3D(PX * 0.3, PZ * 0.3, Seed + 500, Seed);
            double Y = YN * Thick * 0.5 + Jitter * SizeMin * Perlin3D(PX, PZ, Seed, Seed + 1);
            double SizeN = FMath::Pow((Perlin3D(PX * 0.5, PZ * 0.5, Seed + 600 + i, Seed) + 1) * 0.5, 1.8);
            double R = (SizeMin + SizeN * (SizeMax - SizeMin)) * (0.1 + 0.9 * SizeN) * (1 + Jitter);
            double OX = (RNG.Next() - 0.5) * 12 * R * PositionVariation;
            double OY = (RNG.Next() - 0.5) * 12 * R * PositionVariation;
            double OZ = (RNG.Next() - 0.5) * 12 * R * PositionVariation;
            Result.Add(FCloudSphereBP{ FVector(PX + OX, Y + OY + YOffset, PZ + OZ), (float)R, Config.Density, 2 });
        }
    }
    else { // Tree
        TArray<TTuple<FVector, FVector, double, int32>> Stack;
        Stack.Add(TTuple<FVector, FVector, double, int32>(FVector::ZeroVector, FVector(0, 1, 0), SizeMin, 0));
        double BAngle = Config.TreeParams.BranchAngle * UE_DOUBLE_PI / 180.0;
        double BranchProb = Config.TreeParams.BranchProbability;
        double BranchElong = Config.TreeParams.BranchElongation;

        while (Stack.Num() > 0 && Result.Num() < 2000) {
            auto [Pos, Dir, Radius, Depth] = Stack.Last();
            Stack.Pop();
            Result.Add(FCloudSphereBP{ FVector(Pos.X, Pos.Y + YOffset, Pos.Z), (float)Radius, Config.Density, 3 });
            if (Depth >= Config.TreeParams.MaxDepth || Radius < 0.5) continue;

            for (int32 B = 0; B < 3; B++) {
                if (RNG.Next() > BranchProb) continue;
                double AX = (RNG.Next() - 0.5) * BAngle * 2;
                FVector NewDir = Dir;
                NewDir = NewDir.RotateAngleAxis(AX * 180 / UE_DOUBLE_PI, FVector::CrossProduct(Dir, FVector::UpVector).GetSafeNormal());
                NewDir.Z += 0.1f * BranchElong;
                NewDir.Normalize();
                double NewRadius = Radius * Config.TreeParams.TaperRatio;
                FVector NewPos = Pos + NewDir * Radius * BranchElong;
                Stack.Add(TTuple<FVector, FVector, double, int32>(NewPos, NewDir, NewRadius, Depth + 1));
            }
        }
    }
    return Result;
}
