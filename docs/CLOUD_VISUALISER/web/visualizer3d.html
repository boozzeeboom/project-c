<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Generator 3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
  }
  
  header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(22, 33, 62, 0.9);
    backdrop-filter: blur(8px);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 10;
    border-bottom: 1px solid #0f3460;
  }
  
  header h1 {
    color: #00d9ff;
    font-size: 15px;
    font-weight: 600;
  }
  
  .stats {
    font-size: 12px;
    color: #888;
  }
  
  .controls {
    position: absolute;
    left: 0;
    top: 60px;
    bottom: 0;
    width: 280px;
    padding: 16px;
    background: rgba(22, 33, 62, 0.85);
    backdrop-filter: blur(8px);
    overflow-y: auto;
    z-index: 10;
    border-right: 1px solid #0f3460;
  }

  @media (max-width: 767px) {
    .controls {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      width: 100%;
      max-height: 40vh;
      border-right: none;
      border-bottom: 1px solid #0f3460;
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
      transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
      overflow: hidden;
      max-height: 500px;
      opacity: 1;
    }

    .controls.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
    }

    .controls h2 {
      width: 100%;
      margin-bottom: 6px;
      padding-bottom: 4px;
    }

    .control-group {
      flex: 1 1 calc(50% - 4px);
      min-width: 120px;
      margin-bottom: 0;
    }

    .control-group label {
      font-size: 9px;
    }

    .control-group .value {
      font-size: 9px;
    }

    .control-group input[type="range"] {
      height: 4px;
    }

    .buttons {
      flex: 1 1 100%;
      margin-top: 6px;
    }

    button {
      padding: 7px;
      font-size: 10px;
    }

    .info {
      display: none;
    }

    .hint {
      bottom: 8px;
      font-size: 9px;
    }
  }

  .toggle-btn {
    display: none;
  }

  @media (max-width: 767px) {
    .toggle-btn {
      display: block;
      position: fixed;
      top: 52px;
      right: 8px;
      z-index: 20;
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #0f3460;
      color: #00d9ff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background: #00d9ff;
      color: #0a0a1a;
    }
  }
  
  .controls h2 {
    color: #00d9ff;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #0f3460;
  }
  
  .control-group {
    margin-bottom: 12px;
  }
  
  .control-group label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #aaa;
    margin-bottom: 5px;
  }
  
  .control-group .value {
    color: #00d9ff;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  
  .control-group input[type="range"] {
    width: 100%;
    height: 5px;
    -webkit-appearance: none;
    background: #0f3460;
    border-radius: 3px;
  }
  
  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #00d9ff;
    border-radius: 50%;
    cursor: pointer;
  }
  
  .buttons {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  
  button {
    flex: 1;
    padding: 9px;
    background: #0f3460;
    color: #00d9ff;
    border: 1px solid #00d9ff;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  
  button:hover { background: #00d9ff; color: #0a0a1a; }
  
  .info {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid #0f3460;
    font-size: 10px;
    color: #666;
    line-height: 1.5;
  }
  
  canvas { 
    display: block;
    width: 100%;
    height: 100%;
  }
  
  .hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #555;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <h1>CLOUD GENERATOR 3D</h1>
  <span class="stats" id="stats">0 spheres</span>
</header>

<button class="toggle-btn" onclick="toggleControls()">Parameters</button>

<div class="controls">
  <h2>Parameters</h2>
  
  <div class="control-group">
    <label>Cloud Size <span class="value" id="cloudSizeVal">100</span></label>
    <input type="range" id="cloudSize" min="20" max="200" value="80">
  </div>
  
  <div class="control-group">
    <label>Density <span class="value" id="densityVal">0.60</span></label>
    <input type="range" id="density" min="5" max="95" value="60">
  </div>
  
  <div class="control-group">
    <label>Turbulence <span class="value" id="turbulenceVal">0.50</span></label>
    <input type="range" id="turbulence" min="0" max="100" value="50">
  </div>
  
  <div class="control-group">
    <label>Humidity <span class="value" id="humidityVal">0.70</span></label>
    <input type="range" id="humidity" min="10" max="100" value="70">
  </div>
  
  <div class="control-group">
    <label>Storm <span class="value" id="stormVal">0.00</span></label>
    <input type="range" id="storm" min="0" max="100" value="0">
  </div>
  
  <div class="control-group">
    <label>Seed <span class="value" id="seedVal">42</span></label>
    <input type="range" id="seed" min="0" max="999" value="42">
  </div>

  <div class="control-group">
    <label>Flat Bottom <span class="value" id="flatBottomVal">1.00</span></label>
    <input type="range" id="flatBottom" min="0" max="100" value="100">
  </div>

  <div class="control-group">
    <label>Worley Detail <span class="value" id="worleyDetailVal">0.50</span></label>
    <input type="range" id="worleyDetail" min="0" max="100" value="50">
  </div>
  
  <div class="buttons">
    <button onclick="generate()">Generate</button>
    <button onclick="exportCode()">Export</button>
  </div>
  
  <div class="info">
    Clouds: FBM + Worley + Domain Warping<br>
    Blue = dense, white = wispy<br>
    Storm: tall column + anvil top
  </div>
</div>

<div class="hint">Drag / swipe to orbit | Pinch to zoom | Double-tap to reset</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// NOISE UTILITIES — 3D Perlin + Worley + Domain Warping
// ============================================================

// --- 3D Perlin Noise ---
const hash3 = (x, y, z, seed) => {
  let n = (((x | 0) + ((y | 0) * 57) | 0) + ((z | 0) * 131) | 0) + ((seed | 0) * 123456789) | 0;
  n = (n << 13) ^ n;
  return (n * (n * n * 15731 + 789221) + 1376312589) & 0x7FFFFFFF;
};

const fade3 = t => t * t * t * (t * (t * 6 - 15) + 10);

const lerp3 = (a, b, t) => a + (b - a) * t;

const grad3 = (h, x, y, z) => {
  const g = h & 15;
  const u = g < 8 ? x : y;
  const v = g < 4 ? y : (g === 12 || g === 14 ? x : z);
  return ((g & 1) ? -u : u) + ((g & 2) ? -v : v);
};

// Seeded 3D Perlin noise, returns value in [-1, 1]
const perlin3D = (x, y, z, seed) => {
  const xi = Math.floor(x) & 0xFF;
  const yi = Math.floor(y) & 0xFF;
  const zi = Math.floor(z) & 0xFF;
  const xf = x - Math.floor(x);
  const yf = y - Math.floor(y);
  const zf = z - Math.floor(z);
  const u = fade3(xf), v = fade3(yf), w = fade3(zf);
  const aaa = hash3(xi, yi, zi, seed) % 12;
  const aba = hash3(xi, yi + 1, zi, seed) % 12;
  const aab = hash3(xi, yi, zi + 1, seed) % 12;
  const abb = hash3(xi, yi + 1, zi + 1, seed) % 12;
  const baa = hash3(xi + 1, yi, zi, seed) % 12;
  const bba = hash3(xi + 1, yi + 1, zi, seed) % 12;
  const bab = hash3(xi + 1, yi, zi + 1, seed) % 12;
  const bbb = hash3(xi + 1, yi + 1, zi + 1, seed) % 12;
  const x1 = lerp3(grad3(aaa, xf, yf, zf), grad3(baa, xf - 1, yf, zf), u);
  const x2 = lerp3(grad3(aba, xf, yf - 1, zf), grad3(bba, xf - 1, yf - 1, zf), u);
  const y1 = lerp3(x1, x2, v);
  const x3 = lerp3(grad3(aab, xf, yf, zf - 1), grad3(bab, xf - 1, yf, zf - 1), u);
  const x4 = lerp3(grad3(abb, xf, yf - 1, zf - 1), grad3(bbb, xf - 1, yf - 1, zf - 1), u);
  const y2 = lerp3(x3, x4, v);
  return lerp3(y1, y2, w);
};

// FBM — fractional Brownian motion
const fbm = (x, y, z, octaves = 5, persistence = 0.5, lacunarity = 2.0, seed = 0) => {
  let value = 0, amplitude = 1, frequency = 1, maxValue = 0;
  for (let i = 0; i < octaves; i++) {
    value += amplitude * perlin3D(x * frequency, y * frequency, z * frequency, seed + i);
    maxValue += amplitude;
    amplitude *= persistence;
    frequency *= lacunarity;
  }
  return value / maxValue;
};

// --- 3D Worley (Cellular) Noise ---
// Returns distance to nearest cell seed point
const worley3D = (x, y, z, freq) => {
  const ix = Math.floor(x * freq);
  const iy = Math.floor(y * freq);
  const iz = Math.floor(z * freq);
  let minDist = 1e9;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      for (let dz = -1; dz <= 1; dz++) {
        const cx = ix + dx;
        const cy = iy + dy;
        const cz = iz + dz;
        // Pseudo-random point in this cell (deterministic)
        const h = (((cx * 12345 ^ cy * 67890 ^ cz * 13579)) & 0x7FFFFFFF);
        const sx = (h % 1000) / 1000;
        const sy = ((h / 1000) % 1000) / 1000;
        const sz = ((h / 1000000) % 1000) / 1000;
        const dx2 = x * freq - (cx + sx);
        const dy2 = y * freq - (cy + sy);
        const dz2 = z * freq - (cz + sz);
        const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2 + dz2 * dz2);
        if (dist < minDist) minDist = dist;
      }
    }
  }
  return minDist;
};

// Inverted Worley: high at cell centers, low at edges
const invertedWorley = (x, y, z, freq) => 1.0 - Math.min(worley3D(x, y, z, freq), 1.0);

// --- Domain Warping ---
// Warp coordinates using fbm displacement for organic shapes
const warpedFbm = (x, y, z, seed, warpStrength = 4.0) => {
  const wx = fbm(x + 0.0, y + 1.7, z + 9.2, 3, 0.5, 2.0, seed + 10) * warpStrength;
  const wy = fbm(x + 3.1, y + 2.7, z + 8.4, 3, 0.5, 2.0, seed + 20) * warpStrength;
  const wz = fbm(x + 7.2, y + 1.3, z + 4.6, 3, 0.5, 2.0, seed + 30) * warpStrength;
  return fbm(x + wx, y + wy, z + wz, 5, 0.5, 2.0, seed);
};

// ============================================================
// CLOUD DENSITY FUNCTION
// Phase 1: Ellipsoid boundary + FBM + flat bottom
// Phase 2: Worley detail + domain warping
// Phase 3: Cloud type variations (stratus/cumulus/cumulonimbus)
// ============================================================

// Smooth ellipsoid boundary: returns 1 inside, 0 at edge, negative outside
const ellipsoidBoundary = (px, py, pz, cx, cy, cz, rx, ry, rz) => {
  const dx = (px - cx) / rx;
  const dy = (py - cy) / ry;
  const dz = (pz - cz) / rz;
  const d = dx * dx + dy * dy + dz * dz;
  return 1.0 - d;
};

// Flat bottom height profile (condensation level = sharp horizontal boundary)
const flatBottomProfile = (y, baseY, turbulenceH, flatBottomStrength) => {
  // Hard cutoff at condensation level
  const bottomMask = smoothstep(baseY - 5, baseY + 5, y);
  // Noisy top — density decreases with height using noise
  const normalizedY = Math.max(0, (y - baseY) / turbulenceH);
  const topNoise = 1.0 - normalizedY + (Math.random() * 0.0); // noise added separately
  return bottomMask * topNoise;
};

// Gaussian height profile (for stratus / softer clouds)
const gaussianProfile = (y, baseY, topY, centerBias = 0.5) => {
  const center = baseY + (topY - baseY) * centerBias;
  const sigma = (topY - baseY) * 0.35;
  return Math.exp(-Math.pow(y - center, 2) / (2 * sigma * sigma));
};

// Smoothstep helper
const smoothstep = (a, b, x) => {
  const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
  return t * t * (3 - 2 * t);
};

// CUMULONIMBUS (storm): column + anvil
const cumulonimbusDensity = (px, py, pz, cx, cy, cz, rx, ry, rz, 
                              columnH, anvilY, anvilRx, anvilRz, anvilH,
                              largeFbm, worleyD, warpAmt, seed) => {
  // --- Column (tall ellipsoid) ---
  const colDx = (px - cx) / rx;
  const colDy = (py - cy - columnH * 0.5) / (columnH * 0.5);
  const colDz = (pz - cz) / rz;
  const colDist = colDx * colDx + colDy * colDy + colDz * colDz;
  let columnDensity = Math.max(0, 1.0 - colDist);
  columnDensity = smoothstep(0, 0.25, columnDensity);
  // Height mask for column
  const colHeightMask = smoothstep(cy, cy + 2, py) * smoothstep(cy + columnH + 2, cy + columnH - 2, py);
  columnDensity *= colHeightMask;

  // --- Anvil (flat ellipsoid at top) ---
  const anvilDy = (py - anvilY) / (anvilH * 0.5);
  const anvilDx = (px - cx) / anvilRx;
  const anvilDz = (pz - cz) / anvilRz;
  const anvilDist = anvilDx * anvilDx + anvilDy * anvilDy + anvilDz * anvilDz;
  let anvilDensity = Math.max(0, 1.0 - anvilDist);
  anvilDensity = smoothstep(0, 0.4, anvilDensity) * 0.6;

  // --- Scud (wispy base) ---
  const scudDensity = largeFbm * 0.3 * smoothstep(cy + 2, cy - 1, py);

  return columnDensity + anvilDensity + scudDensity;
};

// Main cloud density function — returns value in [0, 1]
const cloudDensity = (px, py, pz, params) => {
  const {
    cx, cy, cz, rx, ry, rz,    // cloud center and radius
    baseY,                        // condensation level (flat bottom y)
    turbulenceH,                  // height of fluffy top
    largeFreq, detailFreq,        // noise frequencies
    worleyDetailAmt,              // how much Worley affects density
    warpStrength,                 // domain warping strength
    seed, turbulence,             // turbulence = overall noisiness
    flatBottomStrength,           // 0 = stratus, 1 = cumulus
    densityThreshold,             // threshold for sphere placement
    isStorm                      // cumulonimbus mode
  } = params;

  // Cumulonimbus uses different geometry
  if (isStorm) {
    return cumulonimbusDensity(
      px, py, pz, cx, cy, cz, rx, ry, rz,
      turbulenceH * 1.5,           // column height
      cy + turbulenceH * 1.4,      // anvil y
      rx * 3.0, rz * 3.0, 0.4,    // anvil size
      fbm(px * 0.5, py * 0.5, pz * 0.5, 3, 0.5, 2.0, seed), // largeFbm placeholder
      worleyDetailAmt,
      warpStrength,
      seed
    );
  }

  // --- 1. Ellipsoid boundary ---
  let density = ellipsoidBoundary(px, py, pz, cx, cy, cz, rx, ry, rz);
  if (density <= 0) return 0;

  // --- 2. Large-scale FBM shape ---
  const largeShape = fbm(px * largeFreq, py * largeFreq * 0.3, pz * largeFreq, 3, 0.5, 2.0, seed);
  density += largeShape * 0.4 * turbulence;

  // --- 3. Domain warping for organic look ---
  const warpedVal = warpedFbm(px, py, pz, seed, warpStrength);
  density += warpedVal * warpStrength * 0.05 * turbulence;

  // --- 4. Worley detail (cauliflower) ---
  const worleyVal = invertedWorley(px * detailFreq, py * detailFreq * 0.3, pz * detailFreq, 1.0);
  density += (worleyVal - 0.5) * worleyDetailAmt * turbulence;

  // --- 5. Height profile ---
  const normalizedY = Math.max(0, (py - baseY) / turbulenceH);
  let heightProfile;

  if (flatBottomStrength > 0.1) {
    // Cumulus-style: flat bottom + noisy top
    const bottomMask = smoothstep(baseY - 3, baseY + 3, py);
    // Top is noisy: use FBM to make fluffy
    const topNoise = 1.0 - normalizedY + fbm(px * 2.0, py * 0.8, pz * 2.0, 3, 0.5, 2.0, seed) * 0.5;
    heightProfile = bottomMask * Math.max(0.05, topNoise);
  } else {
    // Stratus-style: smooth Gaussian layer
    heightProfile = gaussianProfile(py, baseY, baseY + turbulenceH, 0.4);
  }

  density *= heightProfile;

  return Math.max(0, density);
};

// ============================================================
// CLOUD GENERATION — place spheres where density > threshold
// ============================================================

function generateCloud(params) {
  const spheres = [];
  const {
    cloudSize, density: fillDensity, turbulence, seed, humidity, stormIntensity
  } = params;

  // Cloud volume: ellipsoid centered at origin
  // For storm, taller ellipsoid; for normal, more spherical
  const rx = stormIntensity > 0.5 ? cloudSize * 0.45 : cloudSize * 0.55;
  const ry = stormIntensity > 0.5 ? cloudSize * 0.9 : cloudSize * 0.5;
  const rz = stormIntensity > 0.5 ? cloudSize * 0.45 : cloudSize * 0.55;
  const baseY = -ry * 0.25; // condensation level = 25% up from bottom
  const turbulenceH = ry * (stormIntensity > 0.5 ? 1.0 : 0.7);

  const densityParams = {
    cx: 0, cy: 0, cz: 0,
    rx, ry, rz,
    baseY,
    turbulenceH,
    largeFreq: 0.5 / cloudSize * 50,
    detailFreq: 4.0 / cloudSize * 50,
    worleyDetailAmt: params.worleyDetail,
    warpStrength: 4.0,
    seed,
    turbulence,
    flatBottomStrength: params.flatBottom,
    densityThreshold: 1 - fillDensity,
    isStorm: stormIntensity > 0.5
  };

  // Sampling: iterate in world space, not grid
  const step = cloudSize * 0.18; // sphere spacing

  const xMin = -rx - step;
  const xMax = rx + step;
  const yMin = baseY - step;
  const yMax = ry * 1.5 + step;
  const zMin = -rz - step;
  const zMax = rz + step;

  // Worley cells per unit (deterministic, seeded per cell)
  const worleyFreq = 1.0 / step;

  for (let x = xMin; x <= xMax; x += step) {
    for (let y = yMin; y <= yMax; y += step) {
      for (let z = zMin; z <= zMax; z += step) {
        const d = cloudDensity(x, y, z, densityParams);
        if (d < densityParams.densityThreshold) continue;

        // Base radius from humidity
        const baseRadius = step * 0.55 * (humidity * 0.6 + 0.4);

        // Worley-based local radius variation (cauliflower bumps)
        const worleyR = invertedWorley(x * worleyFreq, y * worleyFreq * 0.3, z * worleyFreq, 1.0);
        const radiusNoise = perlin3D(x * 3, y * 3, z * 3, seed + 50) * 0.3 + 0.85;
        const radius = baseRadius * radiusNoise * (0.6 + worleyR * 0.4);

        // Storm: column is denser at bottom, anvil is larger at top
        let localDensity = d;
        if (stormIntensity > 0.5) {
          const columnMask = smoothstep(baseY, baseY + turbulenceH * 1.5, y);
          localDensity = d * columnMask * 1.2;
        }

        if (localDensity < 0.05) continue;

        spheres.push({
          x, y, z,
          radius: Math.max(0.1, radius),
          density: Math.min(Math.max(localDensity, 0), 1)
        });
      }
    }
  }

  return spheres;
}

// ============================================================
// THREE.JS SCENE
// ============================================================

let scene, camera, renderer;
let cloudMeshes = [];
let currentSpheres = [];

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
  camera.position.set(80, 60, 120);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);
  
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(50, 100, 50);
  scene.add(dirLight);
  
  const backLight = new THREE.DirectionalLight(0x4488ff, 0.3);
  backLight.position.set(-50, -30, -50);
  scene.add(backLight);
  
  setupControls();
  
  const grid = new THREE.GridHelper(200, 20, 0x1a1a3a, 0x1a1a3a);
  grid.position.y = -10;
  scene.add(grid);
  
  const axes = new THREE.AxesHelper(30);
  scene.add(axes);
  
  window.addEventListener('resize', onResize);
  
  ['cloudSize', 'density', 'turbulence', 'humidity', 'storm', 'seed', 'flatBottom', 'worleyDetail'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      const v = parseFloat(this.value);
      const isPercent = ['density', 'humidity', 'storm', 'flatBottom', 'worleyDetail'].includes(id);
      document.getElementById(id + 'Val').textContent = 
        id === 'seed' ? v : (v / (isPercent ? 100 : 1)).toFixed(2);
    });
  });
  
  generate();
  animate();
}

function setupControls() {
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let theta = Math.PI / 4;
  let phi = Math.PI / 4;
  let radius = 150;
  const target = new THREE.Vector3(0, 0, 0);
  
  const canvas = renderer.domElement;
  
  const updateCamera = () => {
    camera.position.x = target.x + radius * Math.sin(phi) * Math.cos(theta);
    camera.position.y = target.y + radius * Math.cos(phi);
    camera.position.z = target.z + radius * Math.sin(phi) * Math.sin(theta);
    camera.lookAt(target);
  };
  
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
    canvas.style.cursor = 'grabbing';
  });
  
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    theta -= dx * 0.01;
    phi -= dy * 0.01;
    phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
    prevX = e.clientX;
    prevY = e.clientY;
    updateCamera();
  });
  
  canvas.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  canvas.addEventListener('mouseleave', () => {
    isDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    radius += e.deltaY * 0.5;
    radius = Math.max(30, Math.min(500, radius));
    updateCamera();
  }, { passive: false });

  let touchPrevDist = 0;
  let isPinching = false;
  let pinchOccurred = false;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      isPinching = false;
      pinchOccurred = false;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      isPinching = true;
      pinchOccurred = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchPrevDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && !isPinching) {
      const dx = e.touches[0].clientX - prevX;
      const dy = e.touches[0].clientY - prevY;
      theta -= dx * 0.01;
      phi -= dy * 0.01;
      phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
      updateCamera();
    } else if (e.touches.length === 2) {
      if (!isPinching) {
        isPinching = true;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchPrevDist = Math.sqrt(dx * dx + dy * dy);
      }
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const delta = dist - touchPrevDist;
      radius += delta * 0.8;
      radius = Math.max(30, Math.min(500, radius));
      touchPrevDist = dist;
      if (Math.abs(delta) > 1) pinchOccurred = true;
      updateCamera();
    }
  }, { passive: false });

  let lastTap = 0;
  canvas.addEventListener('touchend', e => {
    if (isPinching && e.touches.length === 1) {
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    }
    isPinching = false;

    if (e.touches.length === 0 && !pinchOccurred) {
      const now = Date.now();
      if (now - lastTap < 300) {
        theta = Math.PI / 4;
        phi = Math.PI / 4;
        radius = 150;
        updateCamera();
      }
      lastTap = now;
    }
  }, { passive: false });

  canvas.style.cursor = 'grab';
  updateCamera();

  window._orbitUpdate = updateCamera;
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function generate() {
  const params = {
    cloudSize: parseFloat(document.getElementById('cloudSize').value),
    density: parseFloat(document.getElementById('density').value) / 100,
    turbulence: parseFloat(document.getElementById('turbulence').value) / 100,
    humidity: parseFloat(document.getElementById('humidity').value) / 100,
    stormIntensity: parseFloat(document.getElementById('storm').value) / 100,
    seed: parseInt(document.getElementById('seed').value),
    flatBottom: parseFloat(document.getElementById('flatBottom').value) / 100,
    worleyDetail: parseFloat(document.getElementById('worleyDetail').value) / 100
  };

  currentSpheres = generateCloud(params);
  document.getElementById('stats').textContent = `${currentSpheres.length} spheres`;
  
  rebuildMesh();
}

function rebuildMesh() {
  cloudMeshes.forEach(m => scene.remove(m));
  cloudMeshes = [];
  
  const geometry = new THREE.SphereGeometry(1, 12, 8);
  
  currentSpheres.forEach(s => {
    const d = s.density;
    const r = 0.2 + d * 0.6;
    const g = 0.4 + d * 0.4;
    const b = 1.0;
    const color = new THREE.Color(r, g, b);
    
    const material = new THREE.MeshLambertMaterial({
      color,
      transparent: true,
      opacity: 0.3 + d * 0.5,
      depthWrite: false
    });
    
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(s.x, s.y, s.z);
    mesh.scale.setScalar(s.radius);
    scene.add(mesh);
    cloudMeshes.push(mesh);
  });
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

function exportCode() {
  const params = {
    cloudSize: parseFloat(document.getElementById('cloudSize').value),
    density: parseFloat(document.getElementById('density').value) / 100,
    turbulence: parseFloat(document.getElementById('turbulence').value) / 100,
    humidity: parseFloat(document.getElementById('humidity').value) / 100,
    stormIntensity: parseFloat(document.getElementById('storm').value) / 100,
    seed: parseInt(document.getElementById('seed').value),
    flatBottom: parseFloat(document.getElementById('flatBottom').value) / 100,
    worleyDetail: parseFloat(document.getElementById('worleyDetail').value) / 100
  };
  
  const code = `// CloudMath C# — Generated from visualizer v2
// Sphere-based cloud generator: Ellipsoid + FBM + Worley + Domain Warping
// ${currentSpheres.length} spheres

List<CloudSphere> spheres = GenerateCloud(
    cloudSize: ${params.cloudSize}f,
    density: ${params.density}f,
    turbulence: ${params.turbulence}f,
    humidity: ${params.humidity}f,
    seed: ${params.seed},
    flatBottom: ${params.flatBottom}f,
    worleyDetail: ${params.worleyDetail}f,
    stormIntensity: ${params.stormIntensity}f
);`;

  const blob = new Blob([code], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CloudMath_Export.cs';
  a.click();
}

function toggleControls() {
  const controls = document.querySelector('.controls');
  const btn = document.querySelector('.toggle-btn');
  controls.classList.toggle('collapsed');
  btn.textContent = controls.classList.contains('collapsed') ? 'Parameters' : 'Hide';
}

init();
</script>
