<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project C — Roadmap</title>
<!-- Marked.js для парсинга Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --border:    #1e1e2e;
    --text:      #c8c8d4;
    --text-dim:  #6e6e82;
    --accent:    #4ade80;
    --accent2:   #38bdf8;
    --warning:   #facc15;
    --done:      #4ade80;
    --future:    #333345;
    --radius:    12px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== CLOUD BACKGROUND ===== */
  .clouds {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: .06;
    animation: drift linear infinite;
  }
  .cloud:nth-child(1) { width:600px;height:300px;background:#4ade80;top:10%;left:-10%;animation-duration:90s; }
  .cloud:nth-child(2) { width:500px;height:250px;background:#38bdf8;top:40%;left:60%;animation-duration:120s;animation-delay:-30s; }
  .cloud:nth-child(3) { width:700px;height:350px;background:#a78bfa;top:70%;left:20%;animation-duration:100s;animation-delay:-60s; }

  @keyframes drift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(110vw); }
  }

  /* ===== LAYOUT ===== */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    margin-bottom: 64px;
  }
  .header__badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 6px 18px;
    margin-bottom: 20px;
    animation: fadeDown .8s ease both;
  }
  .header__title {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
    margin-bottom: 12px;
    animation: fadeDown .8s .15s ease both;
  }
  .header__title span { color: var(--accent); }
  .header__sub {
    font-size: 1.05rem;
    color: var(--text-dim);
    max-width: 540px;
    margin: 0 auto 32px;
    animation: fadeDown .8s .3s ease both;
  }

  /* ===== BUTTONS ===== */
  .buttons {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    animation: fadeDown .8s .45s ease both;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 999px;
    padding: 12px 26px;
    transition: all .25s ease;
    cursor: pointer;
    border: none;
  }
  .btn--primary {
    background: var(--accent);
    color: #0a0a0f;
  }
  .btn--primary:hover { background: #22c55e; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(74,222,128,.25); }
  .btn--ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn--ghost:hover { border-color: var(--text-dim); transform: translateY(-2px); }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* ===== TIMELINE ===== */
  .timeline {
    position: relative;
    padding-left: 40px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 14px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  /* ===== PHASE CARD ===== */
  .phase {
    position: relative;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity .6s ease, transform .6s ease;
  }
  .phase.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Dot on the line */
  .phase__dot {
    position: absolute;
    left: -33px;
    top: 28px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--future);
    border: 3px solid var(--border);
    transition: all .4s ease;
  }
  .phase--done .phase__dot,
  .phase--active .phase__dot {
    background: var(--done);
    border-color: var(--done);
    box-shadow: 0 0 12px rgba(74,222,128,.5);
  }
  .phase--active .phase__dot {
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 12px rgba(74,222,128,.5); }
    50%      { box-shadow: 0 0 24px rgba(74,222,128,.8); }
  }

  .phase__card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    transition: border-color .3s ease;
  }
  .phase--active .phase__card {
    border-color: var(--accent);
  }
  .phase__card:hover {
    border-color: var(--text-dim);
  }

  /* Header row */
  .phase__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .phase__tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .phase--active .phase__tag { color: var(--accent); }
  .phase--done  .phase__tag { color: var(--done); }

  .phase__status {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 999px;
    letter-spacing: .5px;
  }
  .phase--done  .phase__status { background: rgba(74,222,128,.12); color: var(--done); }
  .phase--active .phase__status { background: rgba(74,222,128,.15); color: var(--accent); animation: blink 2s ease infinite; }
  .phase--future .phase__status { background: rgba(51,51,69,.6); color: var(--text-dim); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: .5; }
  }

  .phase__title {
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .phase__goal {
    font-size: .92rem;
    color: var(--text-dim);
    margin-bottom: 18px;
  }

  /* Task list */
  .phase__tasks {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .phase__tasks li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: .9rem;
    color: var(--text);
    line-height: 1.5;
  }
  .phase__tasks li::before {
    content: '';
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 7px;
    background: var(--future);
  }
  .phase--done .phase__tasks li::before { background: var(--done); }
  .phase--active .phase__tasks li::before { background: var(--accent); }

  .task--done {
    text-decoration: line-through;
    color: var(--text-dim) !important;
  }
  .task--done::before { background: var(--done) !important; }

  /* Sub-items (вложенные списки — подзадачи) */
  .phase__subtasks {
    list-style: none;
    margin-left: 16px;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .phase__subtasks li {
    font-size: .84rem;
    color: var(--text-dim);
    line-height: 1.45;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .phase__subtasks li::before {
    content: '›';
    flex-shrink: 0;
    font-weight: 700;
    color: var(--text-dim);
    font-size: .9rem;
    line-height: 1.5;
  }

  /* Progress bar */
  .phase__progress {
    margin-top: 18px;
    height: 4px;
    background: var(--future);
    border-radius: 999px;
    overflow: hidden;
  }
  .phase__bar {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0;
    transition: width 1.2s ease;
  }
  .phase__pct {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: right;
  }

  /* Markdown-rendered sections (риски, инструменты и т.д.) */
  .md-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity .6s ease, transform .6s ease;
  }
  .md-content.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .md-content h2 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 16px;
  }
  .md-content h3 {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent);
    margin-top: 18px;
    margin-bottom: 8px;
  }
  .md-content p {
    font-size: .92rem;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .md-content p strong {
    color: var(--text);
  }
  .md-content ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .md-content ul li {
    font-size: .9rem;
    color: var(--text);
    line-height: 1.5;
    padding-left: 16px;
    position: relative;
  }
  .md-content ul li::before {
    content: '•';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }
  .md-content ul li ul {
    margin-top: 4px;
    margin-left: 0;
  }
  .md-content ul li ul li {
    font-size: .84rem;
    color: var(--text-dim);
  }
  .md-content ul li ul li::before {
    content: '›';
    color: var(--text-dim);
  }
  .md-content em {
    font-style: italic;
    color: var(--text-dim);
    font-size: .85rem;
  }
  .md-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    margin: 12px 0;
    color: var(--text-dim);
    font-size: .9rem;
    font-style: italic;
  }
  .md-content code {
    font-family: 'Fira Code', 'Consolas', monospace;
    background: rgba(56, 189, 248, .08);
    color: var(--accent2);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: .84rem;
  }
  .md-content hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    margin-top: 72px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
  }
  .footer__text {
    font-size: .85rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }
  .footer__links {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .footer__links a {
    color: var(--text);
    text-decoration: none;
    font-size: .9rem;
    font-weight: 500;
    transition: color .2s;
  }
  .footer__links a:hover { color: var(--accent); }

  /* ===== LOADING / ERROR ===== */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .loading-state__spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== GITHUB COMMITS BLOCK ===== */
  .commits-block {
    margin-bottom: 64px;
    animation: fadeDown .8s .5s ease both;
  }
  .commits-block__title {
    font-size: .85rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .commits-block__title svg {
    width: 18px;
    height: 18px;
    fill: var(--accent);
  }
  .commits-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .commit-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    transition: border-color .25s ease, transform .25s ease;
    text-decoration: none;
    color: inherit;
  }
  .commit-item:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .commit-hash {
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent2);
    background: rgba(56, 189, 248, .1);
    padding: 3px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .commit-info {
    flex: 1;
    min-width: 0;
  }
  .commit-message {
    font-size: .92rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .commit-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: .78rem;
    color: var(--text-dim);
  }
  .commit-author {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .commit-avatar {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--border);
  }
  .commit-date::before {
    content: '·';
    margin-right: 12px;
  }
  .commits-loading, .commits-error {
    text-align: center;
    font-size: .85rem;
    padding: 20px;
  }
  .commits-error {
    color: #f87171;
    border: 1px dashed rgba(248, 113, 113, .3);
    border-radius: var(--radius);
    background: rgba(248, 113, 113, .05);
  }
  .commits-error a {
    color: #f87171;
    text-decoration: underline;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .wrapper { padding: 40px 16px 60px; }
    .timeline { padding-left: 32px; }
    .phase__dot { left: -25px; width: 12px; height: 12px; }
    .phase__card { padding: 20px 18px 18px; }
    .phase__head { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

<script>
/* ================================================================
   1. GITHUB COMMITS
   ================================================================ */
(function loadCommits() {
  const commitsContainer = document.getElementById('commits-container');
  const REPO_URL = 'https://api.github.com/repos/boozzeeboom/project-c/commits?per_page=3&sha=qwen-gamestudio-agent-dev';
  const REPO_URL_NOCACHE = () => `${REPO_URL}&_=${Date.now()}`;

  function timeAgo(dateStr) {
    const now = new Date();
    const date = new Date(dateStr);
    const seconds = Math.floor((now - date) / 1000);
    const intervals = [
      { label: 'лет', seconds: 31536000 },
      { label: 'мес', seconds: 2592000 },
      { label: 'дн', seconds: 86400 },
      { label: 'ч', seconds: 3600 },
      { label: 'мин', seconds: 60 },
    ];
    for (const interval of intervals) {
      const count = Math.floor(seconds / interval.seconds);
      if (count >= 1) return `${count} ${interval.label} назад`;
    }
    return 'только что';
  }

  fetch(REPO_URL_NOCACHE(), { cache: 'no-store' })
    .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
    .then(commits => {
      if (!commits.length) { commitsContainer.innerHTML = '<div class="commits-loading">Нет коммитов</div>'; return; }
      const html = commits.map(commit => {
        const sha = commit.sha.substring(0, 7);
        const message = commit.commit.message.split('\n')[0];
        const author = commit.commit.author.name;
        const avatarUrl = commit.author?.avatar_url || '';
        const date = commit.commit.author.date;
        const commitUrl = commit.html_url;
        const esc = str => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `
          <a href="${commitUrl}" target="_blank" rel="noopener" class="commit-item">
            <span class="commit-hash">${esc(sha)}</span>
            <div class="commit-info">
              <div class="commit-message">${esc(message)}</div>
              <div class="commit-meta">
                <span class="commit-author">
                  ${avatarUrl ? `<img src="${avatarUrl}" alt="" class="commit-avatar">` : ''}
                  ${esc(author)}
                </span>
                <span class="commit-date">${timeAgo(date)}</span>
              </div>
            </div>
          </a>`;
      }).join('');
      commitsContainer.innerHTML = `<div class="commits-list">${html}</div>`;
    })
    .catch(err => {
      console.error('GitHub API error:', err);
      commitsContainer.innerHTML = `<div class="commits-error">Не удалось загрузить коммиты. <a href="https://github.com/boozzeeboom/project-c/commits" target="_blank" rel="noopener">Посмотреть на GitHub →</a></div>`;
    });
})();

/* ================================================================
   2. LOAD & PARSE MARKDOWN FROM GitHub
   ================================================================ */
(function loadRoadmap() {
  const MD_URL = 'https://raw.githubusercontent.com/boozzeeboom/project-c/qwen-gamestudio-agent-dev/docs/MMO_Development_Plan.md?_=' + Date.now();
  const loadingEl = document.getElementById('loading-state');
  const timelineEl = document.getElementById('timeline');
  const extraContentEl = document.getElementById('extra-content');
  const badgeEl = document.getElementById('header-badge');
  const subEl = document.getElementById('header-sub');
  const footerTextEl = document.getElementById('footer-text');

  fetch(MD_URL, { cache: 'no-store' })
    .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.text(); })
    .then(markdown => {
      loadingEl.style.display = 'none';
      parseAndRender(markdown);
    })
    .catch(err => {
      console.error('MD load error:', err);
      loadingEl.innerHTML = `<div class="commits-error">Не удалось загрузить план разработки.<br><a href="https://github.com/boozzeeboom/project-c/blob/qwen-gamestudio-agent-dev/docs/MMO_Development_Plan.md" target="_blank" rel="noopener">Открыть на GitHub →</a></div>`;
    });

  function parseAndRender(md) {
    /* -- Extract version info from first paragraph -- */
    const firstP = md.match(/\*\*Последнее обновление:\*\*(.+?)\|/);
    if (firstP) {
      const info = firstP[1].trim();
      const versionMatch = md.match(/`([^`]+)`/);
      const ver = versionMatch ? versionMatch[1] : '';
      badgeEl.textContent = `Pre-Alpha · ${ver}`.trim();
      subEl.textContent = `Мир над облаками. MMO/Co-Op авиасимулятор по книге «Интеграл Пьявица». Обновлено: ${info.replace(/\*\*/g, '')}`;
    }

    /* -- Parse the markdown into HTML via marked.js -- */
    const rawHtml = marked.parse(md);
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = rawHtml;

    /* -- Walk the parsed HTML and build timeline cards from H2 sections -- */
    const allElements = Array.from(tempDiv.children);
    let phases = [];
    let extraSections = [];
    let currentPhase = null;

    for (const el of allElements) {
      if (el.tagName === 'H2') {
        if (currentPhase) phases.push(currentPhase);
        currentPhase = { type: 'phase', title: el.textContent, elements: [] };
      } else if (el.tagName === 'HR') {
        // skip hr
      } else if (currentPhase) {
        currentPhase.elements.push(el.outerHTML);
      } else {
        extraSections.push(el.outerHTML);
      }
    }
    if (currentPhase) phases.push(currentPhase);

    /* -- Determine phase status from emoji / text in title -- */
    function getStatus(title) {
      if (title.includes('✅')) return 'done';
      if (title.includes('🔄')) return 'active';
      return 'future';
    }

    function cleanTitle(title) {
      return title.replace(/✅|🔄|⏳/g, '').trim();
    }

    /* -- Build timeline cards -- */
    phases.forEach((phase, idx) => {
      const status = getStatus(phase.title);
      const title = cleanTitle(phase.title);

      // Extract tag (first bold text or part before newline)
      const tagMatch = title.match(/^(.+?)[:\s(]/);
      const tag = tagMatch ? tagMatch[1].trim() : title;
      // Remove tag prefix from title
      const cleanTitleText = title.replace(tag, '').replace(/^[:\s]+/, '').trim() || tag;

      const card = document.createElement('div');
      card.className = `phase phase--${status}`;
      card.dataset.delay = idx * 100;

      // Build content from elements
      let goalHtml = '';
      let tasksHtml = '';
      let totalTasks = 0;
      let doneTasks = 0;

      for (const html of phase.elements) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        const inner = tmp.firstElementChild;
        if (!inner) continue;

        if (inner.tagName === 'P' && !goalHtml) {
          goalHtml = html;
        } else if (inner.tagName === 'UL') {
          // Parse list items
          const lis = inner.querySelectorAll('li');
          const taskList = [];

          lis.forEach(li => {
            const text = li.textContent.trim();
            // Skip "Результат:" lines
            if (text.startsWith('Результат:')) return;
            // Skip version lines
            if (text.startsWith('**Версия:**')) return;
            // Skip section headers inside lists
            if (text.startsWith('###') || text.match(/^#\s/)) return;

            const isDone = text.startsWith('✅');
            const isCheckboxDone = li.querySelector('input[checked]');
            const isCheckboxUnchecked = li.querySelector('input:not([checked])');

            if (isCheckboxUnchecked) {
              // checkbox task — future
              const cleanText = text.replace(/^\s*☐\s*/, '').replace(/^\s*-\s*\[\s*\]\s*/, '').trim();
              if (cleanText) {
                taskList.push({ text: cleanText, done: false });
                totalTasks++;
              }
            } else if (isDone || isCheckboxDone) {
              const cleanText = text.replace(/^✅\s*/, '').replace(/^\s*☑\s*/, '').replace(/^\s*-\s*\[\s*x\s*\]\s*/, '').trim();
              if (cleanText) {
                taskList.push({ text: cleanText, done: true });
                totalTasks++;
                doneTasks++;
              }
            } else {
              // Check if line contains sub-items
              const subUl = li.querySelector('ul');
              if (subUl) {
                const mainText = li.childNodes[0]?.textContent?.trim().replace(/^[-•]\s*/, '') || '';
                const subItems = [];
                subUl.querySelectorAll('li').forEach(subLi => {
                  const st = subLi.textContent.trim();
                  const sDone = st.startsWith('✅');
                  const sClean = st.replace(/^✅\s*|^⏳\s*/, '').trim();
                  if (sClean) {
                    subItems.push({ text: sClean, done: sDone });
                  }
                });
                if (mainText) {
                  taskList.push({ text: mainText, done: false, subItems });
                  totalTasks += subItems.length;
                  doneTasks += subItems.filter(s => s.done).length;
                }
              } else {
                // Plain task
                const cleanText = text.replace(/^[-•]\s*/, '').trim();
                if (cleanText) {
                  taskList.push({ text: cleanText, done: false });
                  totalTasks++;
                }
              }
            }
          });

          if (taskList.length) {
            let ulHtml = '<ul class="phase__tasks">';
            taskList.forEach(t => {
              if (t.subItems && t.subItems.length) {
                ulHtml += `<li class="${t.done ? 'task--done' : ''}">${escHtml(t.text)}`;
                ulHtml += '<ul class="phase__subtasks">';
                t.subItems.forEach(s => {
                  ulHtml += `<li class="${s.done ? 'task--done' : ''}">${escHtml(s.text)}</li>`;
                });
                ulHtml += '</ul></li>';
              } else {
                ulHtml += `<li class="${t.done ? 'task--done' : ''}">${escHtml(t.text)}</li>`;
              }
            });
            ulHtml += '</ul>';
            tasksHtml += ulHtml;
          }
        } else {
          // Other content (bold lines, etc.) — append as-is
          if (html.trim() && !html.includes('<strong>Результат:</strong>') && !html.includes('<strong>Версия:</strong>')) {
            tasksHtml += html;
          }
        }
      }

      // Calculate progress
      const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : (status === 'done' ? 100 : 0);

      card.innerHTML = `
        <div class="phase__dot"></div>
        <div class="phase__card">
          <div class="phase__head">
            <span class="phase__tag">${escHtml(tag)}</span>
            <span class="phase__status">${status === 'done' ? 'Готово' : status === 'active' ? 'В процессе' : 'Планируется'}</span>
          </div>
          <h3 class="phase__title">${escHtml(cleanTitleText)}</h3>
          ${goalHtml ? `<div class="phase__goal">${goalHtml}</div>` : ''}
          ${tasksHtml}
          <div class="phase__progress"><div class="phase__bar" data-width="${pct}"></div></div>
          <div class="phase__pct">${pct}%</div>
        </div>
      `;

      timelineEl.appendChild(card);
    });

    /* -- Extra sections (риски, инструменты) -- */
    if (extraSections.length) {
      const extraDiv = document.createElement('div');
      extraDiv.className = 'md-content';
      extraDiv.dataset.delay = (phases.length + 1) * 100;
      extraDiv.innerHTML = extraSections.join('');
      extraContentEl.appendChild(extraDiv);
    }

    /* -- Footer -- */
    const versionMatch = md.match(/\*\*Версия:\*\*\s*`([^`]+)`/);
    const dateMatch = md.match(/`([^`]+)`\s*\(\d/);
    if (versionMatch) {
      footerTextEl.textContent = `Открытая разработка · Все коммиты на GitHub · ${versionMatch[1]}`;
    }

    /* -- Init animations -- */
    initAnimations();
  }

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* -- Scroll animations -- */
  function initAnimations() {
    const phases = document.querySelectorAll('.phase');
    const bars = document.querySelectorAll('.phase__bar');
    const extras = document.querySelectorAll('.md-content');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const delay = parseInt(el.dataset.delay) || 0;
          setTimeout(() => el.classList.add('visible'), delay);
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.15 });

    phases.forEach(p => observer.observe(p));
    extras.forEach(e => observer.observe(e));

    const barObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const bar = entry.target;
          setTimeout(() => { bar.style.width = bar.dataset.width + '%'; }, 400);
          barObserver.unobserve(bar);
        }
      });
    }, { threshold: 0.3 });

    bars.forEach(b => barObserver.observe(b));
  }
})();
</script>
