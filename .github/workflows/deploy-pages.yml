name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# КЛЮЧЕВОЙ БЛОК — даёт права на создание Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Запускать только один деплой одновременно
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Весь docs/ — и Fun/index.html, и roadmap.html, и остальное
          path: docs
          # Короткий retention, чтобы старые artifact'ы не копились
          # и не ломали deploy-pages (баг: Multiple artifacts found)
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
