<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project C — Roadmap</title>
<!-- Marked.js для парсинга Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --border:    #1e1e2e;
    --text:      #c8c8d4;
    --text-dim:  #6e6e82;
    --accent:    #4ade80;
    --accent2:   #38bdf8;
    --warning:   #facc15;
    --done:      #4ade80;
    --future:    #333345;
    --radius:    12px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== CLOUD BACKGROUND ===== */
  .clouds {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: .06;
    animation: drift linear infinite;
  }
  .cloud:nth-child(1) { width:600px;height:300px;background:#4ade80;top:10%;left:-10%;animation-duration:90s; }
  .cloud:nth-child(2) { width:500px;height:250px;background:#38bdf8;top:40%;left:60%;animation-duration:120s;animation-delay:-30s; }
  .cloud:nth-child(3) { width:700px;height:350px;background:#a78bfa;top:70%;left:20%;animation-duration:100s;animation-delay:-60s; }

  @keyframes drift {
    0%   { transform: translateX(0); }
    100% { transform: translateX(110vw); }
  }

  /* ===== LAYOUT ===== */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    margin-bottom: 64px;
  }
  .header__badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 6px 18px;
    margin-bottom: 20px;
    animation: fadeDown .8s ease both;
  }
  .header__title {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
    margin-bottom: 12px;
    animation: fadeDown .8s .15s ease both;
  }
  .header__title span { color: var(--accent); }
  .header__sub {
    font-size: 1.05rem;
    color: var(--text-dim);
    max-width: 540px;
    margin: 0 auto 32px;
    animation: fadeDown .8s .3s ease both;
  }

  /* ===== BUTTONS ===== */
  .buttons {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    animation: fadeDown .8s .45s ease both;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 999px;
    padding: 12px 26px;
    transition: all .25s ease;
    cursor: pointer;
    border: none;
  }
  .btn--primary {
    background: var(--accent);
    color: #0a0a0f;
  }
  .btn--primary:hover { background: #22c55e; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(74,222,128,.25); }
  .btn--ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn--ghost:hover { border-color: var(--text-dim); transform: translateY(-2px); }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* ===== TIMELINE ===== */
  .timeline {
    position: relative;
    padding-left: 40px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 14px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  /* ===== PHASE CARD ===== */
  .phase {
    position: relative;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity .6s ease, transform .6s ease;
  }
  .phase.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Dot on the line */
  .phase__dot {
    position: absolute;
    left: -33px;
    top: 28px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--future);
    border: 3px solid var(--border);
    transition: all .4s ease;
  }
  .phase--done .phase__dot,
  .phase--active .phase__dot {
    background: var(--done);
    border-color: var(--done);
    box-shadow: 0 0 12px rgba(74,222,128,.5);
  }
  .phase--active .phase__dot {
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 12px rgba(74,222,128,.5); }
    50%      { box-shadow: 0 0 24px rgba(74,222,128,.8); }
  }

  .phase__card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    transition: border-color .3s ease;
  }
  .phase--active .phase__card {
    border-color: var(--accent);
  }
  .phase__card:hover {
    border-color: var(--text-dim);
  }

  /* Header row */
  .phase__head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .phase__tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .phase--active .phase__tag { color: var(--accent); }
  .phase--done  .phase__tag { color: var(--done); }

  .phase__status {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 999px;
    letter-spacing: .5px;
  }
  .phase--done  .phase__status { background: rgba(74,222,128,.12); color: var(--done); }
  .phase--active .phase__status { background: rgba(74,222,128,.15); color: var(--accent); animation: blink 2s ease infinite; }
  .phase--future .phase__status { background: rgba(51,51,69,.6); color: var(--text-dim); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: .5; }
  }

  .phase__title {
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .phase__goal {
    font-size: .92rem;
    color: var(--text-dim);
    margin-bottom: 18px;
  }

  /* Task list */
  .phase__tasks {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .phase__tasks li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: .9rem;
    color: var(--text);
    line-height: 1.5;
  }
  .phase__tasks li::before {
    content: '';
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 7px;
    background: var(--future);
  }
  .phase--done .phase__tasks li::before { background: var(--done); }
  .phase--active .phase__tasks li::before { background: var(--accent); }

  .task--done {
    text-decoration: line-through;
    color: var(--text-dim) !important;
  }
  .task--done::before { background: var(--done) !important; }

  /* Sub-items (вложенные списки — подзадачи) */
  .phase__subtasks {
    list-style: none;
    margin-left: 16px;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .phase__subtasks li {
    font-size: .84rem;
    color: var(--text-dim);
    line-height: 1.45;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .phase__subtasks li::before {
    content: '›';
    flex-shrink: 0;
    font-weight: 700;
    color: var(--text-dim);
    font-size: .9rem;
    line-height: 1.5;
  }

  /* Progress bar */
  .phase__progress {
    margin-top: 18px;
    height: 4px;
    background: var(--future);
    border-radius: 999px;
    overflow: hidden;
  }
  .phase__bar {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0;
    transition: width 1.2s ease;
  }
  .phase__pct {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: right;
  }

  /* Markdown-rendered sections (риски, инструменты и т.д.) */
  .md-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 32px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity .6s ease, transform .6s ease;
  }
  .md-content.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Collapsible header */
  .md-content__toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 20px 28px;
    user-select: none;
    transition: background .2s ease;
  }
  .md-content__toggle:hover {
    background: rgba(255,255,255,.02);
  }
  .md-content__toggle h2 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    margin: 0;
  }
  .md-content__arrow {
    width: 20px;
    height: 20px;
    fill: var(--text-dim);
    transition: transform .3s ease;
    flex-shrink: 0;
    margin-left: 16px;
  }
  .md-content--open .md-content__arrow {
    transform: rotate(180deg);
  }

  /* Collapsible body */
  .md-content__body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .4s ease, padding .4s ease;
    padding: 0 28px;
  }
  .md-content--open .md-content__body {
    max-height: 2000px;
    padding: 0 28px 24px;
  }
  .md-content__body h2 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 16px;
  }
  .md-content__body h3 {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent);
    margin-top: 18px;
    margin-bottom: 8px;
  }
  .md-content__body p {
    font-size: .92rem;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .md-content__body p strong {
    color: var(--text);
  }
  .md-content__body ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .md-content__body ul li {
    font-size: .9rem;
    color: var(--text);
    line-height: 1.5;
    padding-left: 16px;
    position: relative;
  }
  .md-content__body ul li::before {
    content: '•';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }
  .md-content__body ul li ul {
    margin-top: 4px;
    margin-left: 0;
  }
  .md-content__body ul li ul li {
    font-size: .84rem;
    color: var(--text-dim);
  }
  .md-content__body ul li ul li::before {
    content: '›';
    color: var(--text-dim);
  }
  .md-content__body em {
    font-style: italic;
    color: var(--text-dim);
    font-size: .85rem;
  }
  .md-content__body blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 16px;
    margin: 12px 0;
    color: var(--text-dim);
    font-size: .9rem;
    font-style: italic;
  }
  .md-content__body code {
    font-family: 'Fira Code', 'Consolas', monospace;
    background: rgba(56, 189, 248, .08);
    color: var(--accent2);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: .84rem;
  }
  .md-content__body hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    margin-top: 72px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
  }
  .footer__text {
    font-size: .85rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }
  .footer__links {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .footer__links a {
    color: var(--text);
    text-decoration: none;
    font-size: .9rem;
    font-weight: 500;
    transition: color .2s;
  }
  .footer__links a:hover { color: var(--accent); }

  /* ===== LOADING / ERROR ===== */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .loading-state__spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== GITHUB COMMITS BLOCK ===== */
  .commits-block {
    margin-bottom: 64px;
    animation: fadeDown .8s .5s ease both;
  }
  .commits-block__title {
    font-size: .85rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .commits-block__title svg {
    width: 18px;
    height: 18px;
    fill: var(--accent);
  }
  .commits-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .commit-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    transition: border-color .25s ease, transform .25s ease;
    text-decoration: none;
    color: inherit;
  }
  .commit-item:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .commit-hash {
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent2);
    background: rgba(56, 189, 248, .1);
    padding: 3px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .commit-info {
    flex: 1;
    min-width: 0;
  }
  .commit-message {
    font-size: .92rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .commit-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: .78rem;
    color: var(--text-dim);
  }
  .commit-author {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .commit-avatar {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--border);
  }
  .commit-date::before {
    content: '·';
    margin-right: 12px;
  }
  .commits-loading, .commits-error {
    text-align: center;
    font-size: .85rem;
    padding: 20px;
  }
  .commits-error {
    color: #f87171;
    border: 1px dashed rgba(248, 113, 113, .3);
    border-radius: var(--radius);
    background: rgba(248, 113, 113, .05);
  }
  .commits-error a {
    color: #f87171;
    text-decoration: underline;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .wrapper { padding: 40px 16px 60px; }
    .timeline { padding-left: 32px; }
    .phase__dot { left: -25px; width: 12px; height: 12px; }
    .phase__card { padding: 20px 18px 18px; }
    .phase__head { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

  <div class="cloud"></div>

<div class="wrapper">

  <!-- HEADER -->
  <header class="header">

<script>
/* ================================================================
   1. GITHUB COMMITS
   ================================================================ */
(function loadCommits() {
  const commitsContainer = document.getElementById('commits-container');
  const REPO_URL = 'https://api.github.com/repos/boozzeeboom/project-c/commits?per_page=3&sha=qwen-gamestudio-agent-dev';
  const REPO_URL_NOCACHE = () => `${REPO_URL}&_=${Date.now()}`;

  function timeAgo(dateStr) {
    const now = new Date();
    const date = new Date(dateStr);
    const seconds = Math.floor((now - date) / 1000);
    const intervals = [
      { label: 'лет', seconds: 31536000 },
      { label: 'мес', seconds: 2592000 },
      { label: 'дн', seconds: 86400 },
      { label: 'ч', seconds: 3600 },
      { label: 'мин', seconds: 60 },
    ];
    for (const interval of intervals) {
      const count = Math.floor(seconds / interval.seconds);
      if (count >= 1) return `${count} ${interval.label} назад`;
    }
    return 'только что';
  }

  fetch(REPO_URL_NOCACHE(), { cache: 'no-store' })
    .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
    .then(commits => {
      if (!commits.length) { commitsContainer.innerHTML = '<div class="commits-loading">Нет коммитов</div>'; return; }
      const html = commits.map(commit => {
        const sha = commit.sha.substring(0, 7);
        const message = commit.commit.message.split('\n')[0];
        const author = commit.commit.author.name;
        const avatarUrl = commit.author?.avatar_url || '';
        const date = commit.commit.author.date;
        const commitUrl = commit.html_url;
        const esc = str => str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `
          <a href="${commitUrl}" target="_blank" rel="noopener" class="commit-item">
            <span class="commit-hash">${esc(sha)}</span>
            <div class="commit-info">
              <div class="commit-message">${esc(message)}</div>
              <div class="commit-meta">
                <span class="commit-author">
                  ${avatarUrl ? `<img src="${avatarUrl}" alt="" class="commit-avatar">` : ''}
                  ${esc(author)}
                </span>
                <span class="commit-date">${timeAgo(date)}</span>
              </div>
            </div>
          </a>`;
      }).join('');
      commitsContainer.innerHTML = `<div class="commits-list">${html}</div>`;
    })
    .catch(err => {
      console.error('GitHub API error:', err);
      commitsContainer.innerHTML = `<div class="commits-error">Не удалось загрузить коммиты. <a href="https://github.com/boozzeeboom/project-c/commits" target="_blank" rel="noopener">Посмотреть на GitHub →</a></div>`;
    });
})();

/* ================================================================
   2. LOAD & PARSE MARKDOWN FROM GitHub
   ================================================================ */
(function loadRoadmap() {
  const MD_URL = 'https://raw.githubusercontent.com/boozzeeboom/project-c/qwen-gamestudio-agent-dev/docs/MMO_Development_Plan.md?_=' + Date.now();
  const loadingEl = document.getElementById('loading-state');
  const timelineEl = document.getElementById('timeline');
  const extraContentEl = document.getElementById('extra-content');
  const badgeEl = document.getElementById('header-badge');
  const subEl = document.getElementById('header-sub');
  const footerTextEl = document.getElementById('footer-text');

  fetch(MD_URL, { cache: 'no-store' })
    .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.text(); })
    .then(markdown => {
      loadingEl.style.display = 'none';
      parseAndRender(markdown);
    })
    .catch(err => {
      console.error('MD load error:', err);
      loadingEl.innerHTML = `<div class="commits-error">Не удалось загрузить план разработки.<br><a href="https://github.com/boozzeeboom/project-c/blob/qwen-gamestudio-agent-dev/docs/MMO_Development_Plan.md" target="_blank" rel="noopener">Открыть на GitHub →</a></div>`;
    });

  function parseAndRender(md) {
    /* -- Extract version info -- */
    const versionMatch = md.match(/\*\*Текущая версия:\*\*\s*`([^`]+)`/);
    const dateMatch = md.match(/\*\*Последнее обновление:\*\*\s*(.+?)\s*\|/);
    if (versionMatch) {
      badgeEl.textContent = `Pre-Alpha · ${versionMatch[1]}`;
    }
    if (dateMatch) {
      subEl.textContent = `Мир над облаками. MMO/Co-Op авиасимулятор по книге «Интеграл Пьявица». Обновлено: ${dateMatch[1].trim()}`;
    }
    const footerVersion = md.match(/\*\*Версия:\*\*\s*`([^`]+)`/);
    if (footerVersion) {
      footerTextEl.textContent = `Открытая разработка · Все коммиты на GitHub · ${footerVersion[1]}`;
    }

    /* -- Split by H2 sections -- */
    const lines = md.split('\n');
    const sections = [];
    let currentSection = null;
    let extraLines = []; // lines before first H2
    let beforeFirstH2 = true;

    for (const line of lines) {
      if (line.startsWith('## ')) {
        beforeFirstH2 = false;
        currentSection = { title: line.replace('## ', '').trim(), lines: [] };
        sections.push(currentSection);
      } else if (currentSection) {
        currentSection.lines.push(line);
      } else if (!beforeFirstH2) {
        extraLines.push(line);
      }
    }

    /* -- Process each H2 section as a phase card -- */
    sections.forEach((section, idx) => {
      const titleText = section.title;
      const hasCheck = titleText.includes('✅');
      const hasSpinner = titleText.includes('🔄');

      let status = 'future';
      let statusLabel = 'Планируется';
      if (hasCheck) { status = 'done'; statusLabel = 'Готово'; }
      else if (hasSpinner) { status = 'active'; statusLabel = 'В процессе'; }

      // Clean title
      let cleanTitle = titleText.replace(/✅|🔄|⏳/g, '').trim();
      // Extract tag (e.g. "Этап 0: Подготовка окружения" → tag="Этап 0", title="Подготовка окружения")
      const colonIdx = cleanTitle.indexOf(':');
      let tag = '';
      let displayTitle = cleanTitle;
      if (colonIdx > 0) {
        tag = cleanTitle.substring(0, colonIdx).trim();
        displayTitle = cleanTitle.substring(colonIdx + 1).trim();
      } else {
        // Try parenthetical like "Этап 2: Сетевой фундамент (Недели 7-10)"
        const parenMatch = cleanTitle.match(/^(.+?)\s*\((.+?)\)/);
        if (parenMatch) {
          tag = parenMatch[1].trim();
          displayTitle = parenMatch[2].trim();
        }
      }

      // Parse tasks from section text
      const sectionText = section.lines.join('\n');
      const allTasks = [];

      // 1) Checkbox tasks (any indent): - [ ] or - [x]
      const checkboxRe = /^(\s*)-\s*\[([ x])\]\s*(.+)$/gm;
      let m;
      while ((m = checkboxRe.exec(sectionText)) !== null) {
        const indent = m[1].length;
        const text = m[3].trim();
        const done = m[2] === 'x';
        allTasks.push({ text, done, indent });
      }

      // 2) Top-level bullet tasks (no leading spaces): "- ✅ текст" or "- ⏳ текст" or "- текст"
      const bulletRe = /^[-*]\s+(.+)$/gm;
      while ((m = bulletRe.exec(sectionText)) !== null) {
        const raw = m[1].trim();
        if (raw.startsWith('[')) continue;
        if (/^(Результат:|Версия:|⏳\s*Отложено)/.test(raw)) continue;

        const isDone = raw.startsWith('✅');
        const isFuture = raw.startsWith('⏳');
        const cleanText = raw.replace(/^(✅|⏳)\s*/, '').trim();
        if (!cleanText) continue;
        // Skip category headers
        if (/\*\*.*\*\*\s*:/.test(raw) && raw.split(':').length <= 2 && !raw.includes('—') && !raw.includes('(')) continue;

        allTasks.push({ text: cleanText, done: isDone && !isFuture, indent: 0 });
      }

      // 3) Sub-item bullet tasks (indented 2+ spaces): "  - ✅ текст"
      const subBulletRe = /^(\s{2,})[-*]\s+(.+)$/gm;
      while ((m = subBulletRe.exec(sectionText)) !== null) {
        const raw = m[2].trim();
        if (raw.startsWith('[')) continue;
        if (/^(Результат:|Версия:)/.test(raw)) continue;

        const isDone = raw.startsWith('✅');
        const isFuture = raw.startsWith('⏳');
        const cleanText = raw.replace(/^(✅|⏳)\s*/, '').trim();
        if (!cleanText) continue;

        allTasks.push({ text: cleanText, done: isDone && !isFuture, indent: m[1].length });
      }

      // Count: prefer sub-items if they exist, otherwise top-level bullets
      const subTasks = allTasks.filter(t => t.indent >= 2);
      const topBullets = allTasks.filter(t => t.indent === 0 && !t.text.match(/^\d+\.\s*\*\*/));

      let totalTasks, doneTasks;

      if (subTasks.length > 0) {
        // Section has numbered lists with sub-items — count sub-items
        totalTasks = subTasks.length;
        doneTasks = subTasks.filter(t => t.done).length;
      } else {
        // Flat list — count top-level bullets
        totalTasks = topBullets.length;
        doneTasks = topBullets.filter(t => t.done).length;
      }

      if (totalTasks === 0 && status === 'done') {
        totalTasks = 1;
        doneTasks = 1;
      }

      const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;

      // Build task HTML — use the same tasks we counted
      let tasksHtml = '';
      const displayTasks = subTasks.length > 0 ? subTasks : topBullets;

      if (displayTasks.length > 0) {
        tasksHtml = '<ul class="phase__tasks">';
        displayTasks.forEach(t => {
          tasksHtml += `<li class="${t.done ? 'task--done' : ''}">${escHtml(t.text)}</li>`;
        });
        tasksHtml += '</ul>';
      }

      // Goal: first bold paragraph
      const goalMatch = sectionText.match(/\*\*Цель:\*\*\s*(.+)/);
      const goalHtml = goalMatch ? `<div class="phase__goal">${escHtml(goalMatch[1].replace(/\*\*/g, ''))}</div>` : '';

      const card = document.createElement('div');
      card.className = `phase phase--${status}`;
      card.dataset.delay = idx * 100;
      card.innerHTML = `
        <div class="phase__dot"></div>
        <div class="phase__card">
          <div class="phase__head">
            <span class="phase__tag">${escHtml(tag)}</span>
            <span class="phase__status">${statusLabel}</span>
          </div>
          <h3 class="phase__title">${escHtml(displayTitle)}</h3>
          ${goalHtml}
          ${tasksHtml}
          <div class="phase__progress"><div class="phase__bar" data-width="${pct}"></div></div>
          <div class="phase__pct">${pct}%</div>
        </div>
      `;
      timelineEl.appendChild(card);
    });

    /* -- Extra content (risks, tools, etc.) — split by H2 and make collapsible -- */
    const extraMd = extraLines.join('\n').trim();
    if (extraMd) {
      const extraSections = extraMd.split(/^##\s+(.+)$/gm).slice(1); // [title, content, title, content, ...]
      for (let i = 0; i < extraSections.length; i += 2) {
        const title = extraSections[i]?.trim();
        const content = extraSections[i + 1]?.trim();
        if (!title) continue;

        const extraDiv = document.createElement('div');
        extraDiv.className = 'md-content';
        extraDiv.dataset.delay = (sections.length + 1 + i / 2) * 100;

        const arrowSvg = `<svg class="md-content__arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>`;

        extraDiv.innerHTML = `
          <div class="md-content__toggle">
            <h2>${escHtml(title)}</h2>
            ${arrowSvg}
          </div>
          <div class="md-content__body">
            ${marked.parse(content || '')}
          </div>
        `;

        // Toggle click handler
        extraDiv.querySelector('.md-content__toggle').addEventListener('click', () => {
          extraDiv.classList.toggle('md-content--open');
        });

        extraContentEl.appendChild(extraDiv);
      }
    }

    /* -- Init scroll animations -- */
    initAnimations();
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* -- Scroll animations -- */
  function initAnimations() {
    const phases = document.querySelectorAll('.phase');
    const bars = document.querySelectorAll('.phase__bar');
    const extras = document.querySelectorAll('.md-content');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const delay = parseInt(el.dataset.delay) || 0;
          setTimeout(() => el.classList.add('visible'), delay);
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.15 });

    phases.forEach(p => observer.observe(p));
    extras.forEach(e => observer.observe(e));

    const barObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const bar = entry.target;
          setTimeout(() => { bar.style.width = bar.dataset.width + '%'; }, 400);
          barObserver.unobserve(bar);
        }
      });
    }, { threshold: 0.3 });

    bars.forEach(b => barObserver.observe(b));
  }
})();
</script>
