<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Generator 3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
  }
  
  header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(22, 33, 62, 0.9);
    backdrop-filter: blur(8px);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 10;
    border-bottom: 1px solid #0f3460;
  }
  
  header h1 {
    color: #00d9ff;
    font-size: 15px;
    font-weight: 600;
  }
  
  .stats {
    font-size: 12px;
    color: #888;
  }
  
  .controls {
    position: absolute;
    left: 0;
    top: 60px;
    bottom: 0;
    width: 280px;
    padding: 16px;
    background: rgba(22, 33, 62, 0.85);
    backdrop-filter: blur(8px);
    overflow-y: auto;
    z-index: 10;
    border-right: 1px solid #0f3460;
  }

  @media (max-width: 767px) {
    .controls {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      width: 100%;
      max-height: 40vh;
      border-right: none;
      border-bottom: 1px solid #0f3460;
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
      transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
      overflow: hidden;
      max-height: 500px;
      opacity: 1;
    }

    .controls.collapsed {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      opacity: 0;
    }

    .controls h2 {
      width: 100%;
      margin-bottom: 6px;
      padding-bottom: 4px;
    }

    .control-group {
      flex: 1 1 calc(50% - 4px);
      min-width: 120px;
      margin-bottom: 0;
    }

    .control-group label {
      font-size: 9px;
    }

    .control-group .value {
      font-size: 9px;
    }

    .control-group input[type="range"] {
      height: 4px;
    }

    .buttons {
      flex: 1 1 100%;
      margin-top: 6px;
    }

    button {
      padding: 7px;
      font-size: 10px;
    }

    .info {
      display: none;
    }

    .hint {
      bottom: 8px;
      font-size: 9px;
    }
  }

  .toggle-btn {
    display: none;
  }

  @media (max-width: 767px) {
    .toggle-btn {
      display: block;
      position: fixed;
      top: 52px;
      right: 8px;
      z-index: 20;
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #0f3460;
      color: #00d9ff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background: #00d9ff;
      color: #0a0a1a;
    }
  }
  
  .controls h2 {
    color: #00d9ff;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #0f3460;
  }
  
  .control-group {
    margin-bottom: 12px;
  }
  
  .control-group label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #aaa;
    margin-bottom: 5px;
  }
  
  .control-group .value {
    color: #00d9ff;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  
  .control-group input[type="range"] {
    width: 100%;
    height: 5px;
    -webkit-appearance: none;
    background: #0f3460;
    border-radius: 3px;
  }
  
  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #00d9ff;
    border-radius: 50%;
    cursor: pointer;
  }
  
  .buttons {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  
  button {
    flex: 1;
    padding: 9px;
    background: #0f3460;
    color: #00d9ff;
    border: 1px solid #00d9ff;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  
  button:hover { background: #00d9ff; color: #0a0a1a; }
  
  .info {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid #0f3460;
    font-size: 10px;
    color: #666;
    line-height: 1.5;
  }
  
  canvas { 
    display: block;
    width: 100%;
    height: 100%;
  }
  
  .hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #555;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <h1>CLOUD GENERATOR 3D</h1>
  <span class="stats" id="stats">0 spheres</span>
</header>

<button class="toggle-btn" onclick="toggleControls()">Parameters</button>

<div class="controls">
  <h2>Parameters</h2>
  
  <div class="control-group">
    <label>Cloud Size <span class="value" id="cloudSizeVal">100</span></label>
    <input type="range" id="cloudSize" min="20" max="200" value="80">
  </div>
  
  <div class="control-group">
    <label>Density <span class="value" id="densityVal">0.60</span></label>
    <input type="range" id="density" min="5" max="95" value="60">
  </div>
  
  <div class="control-group">
    <label>Turbulence <span class="value" id="turbulenceVal">0.50</span></label>
    <input type="range" id="turbulence" min="0" max="100" value="50">
  </div>
  
  <div class="control-group">
    <label>Seed <span class="value" id="seedVal">42</span></label>
    <input type="range" id="seed" min="0" max="999" value="42">
  </div>

  <div class="control-group">
    <label>Cascade Depth <span class="value" id="cascadeDepthVal">3</span></label>
    <input type="range" id="cascadeDepth" min="1" max="5" value="3">
  </div>

  <div class="control-group">
    <label>Bumps per Level <span class="value" id="bumpsPerLevelVal">48</span></label>
    <input type="range" id="bumpsPerLevel" min="12" max="128" value="48">
  </div>

  <div class="control-group">
    <label>Child Ratio <span class="value" id="childRatioVal">0.30</span></label>
    <input type="range" id="childRatio" min="15" max="45" value="30">
  </div>
  
  <div class="buttons">
    <button onclick="generate()">Generate</button>
    <button onclick="exportCode()">Export</button>
  </div>
  
  <div class="info">
    Cascade: ellipsoid → bumps on surface → sub-bumps<br>
    Blue = dense, white = wispy<br>
    Fibonacci sphere sampling + FBM
  </div>
</div>

<div class="hint">Drag / swipe to orbit | Pinch to zoom | Double-tap to reset</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// NOISE UTILITIES — 3D Perlin + FBM + Worley + Domain Warping
// ============================================================

const hash3 = (x, y, z, seed) => {
  let n = (((x | 0) + ((y | 0) * 57) | 0) + ((z | 0) * 131) | 0) + ((seed | 0) * 123456789) | 0;
  n = (n << 13) ^ n;
  return (n * (n * n * 15731 + 789221) + 1376312589) & 0x7FFFFFFF;
};

const fade3 = t => t * t * t * (t * (t * 6 - 15) + 10);

const lerp3 = (a, b, t) => a + (b - a) * t;

const grad3 = (h, x, y, z) => {
  const g = h & 15;
  const u = g < 8 ? x : y;
  const v = g < 4 ? y : (g === 12 || g === 14 ? x : z);
  return ((g & 1) ? -u : u) + ((g & 2) ? -v : v);
};

const perlin3D = (x, y, z, seed) => {
  const xi = Math.floor(x) & 0xFF;
  const yi = Math.floor(y) & 0xFF;
  const zi = Math.floor(z) & 0xFF;
  const xf = x - Math.floor(x);
  const yf = y - Math.floor(y);
  const zf = z - Math.floor(z);
  const u = fade3(xf), v = fade3(yf), w = fade3(zf);
  const aaa = hash3(xi, yi, zi, seed) % 12;
  const aba = hash3(xi, yi + 1, zi, seed) % 12;
  const aab = hash3(xi, yi, zi + 1, seed) % 12;
  const abb = hash3(xi, yi + 1, zi + 1, seed) % 12;
  const baa = hash3(xi + 1, yi, zi, seed) % 12;
  const bba = hash3(xi + 1, yi + 1, zi, seed) % 12;
  const bab = hash3(xi + 1, yi, zi + 1, seed) % 12;
  const bbb = hash3(xi + 1, yi + 1, zi + 1, seed) % 12;
  const x1 = lerp3(grad3(aaa, xf, yf, zf), grad3(baa, xf - 1, yf, zf), u);
  const x2 = lerp3(grad3(aba, xf, yf - 1, zf), grad3(bba, xf - 1, yf - 1, zf), u);
  const y1 = lerp3(x1, x2, v);
  const x3 = lerp3(grad3(aab, xf, yf, zf - 1), grad3(bab, xf - 1, yf, zf - 1), u);
  const x4 = lerp3(grad3(abb, xf, yf - 1, zf - 1), grad3(bbb, xf - 1, yf - 1, zf - 1), u);
  const y2 = lerp3(x3, x4, v);
  return lerp3(y1, y2, w);
};

// FBM — fractional Brownian motion
const fbm = (x, y, z, octaves = 5, persistence = 0.5, lacunarity = 2.0, seed = 0) => {
  let value = 0, amplitude = 1, frequency = 1, maxValue = 0;
  for (let i = 0; i < octaves; i++) {
    value += amplitude * perlin3D(x * frequency, y * frequency, z * frequency, seed + i);
    maxValue += amplitude;
    amplitude *= persistence;
    frequency *= lacunarity;
  }
  return value / maxValue;
};

// --- 3D Worley (Cellular) Noise ---
const worley3D = (x, y, z, freq) => {
  const ix = Math.floor(x * freq);
  const iy = Math.floor(y * freq);
  const iz = Math.floor(z * freq);
  let minDist = 1e9;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      for (let dz = -1; dz <= 1; dz++) {
        const cx = ix + dx;
        const cy = iy + dy;
        const cz = iz + dz;
        const h = (((cx * 12345 ^ cy * 67890 ^ cz * 13579)) & 0x7FFFFFFF);
        const sx = (h % 1000) / 1000;
        const sy = ((h / 1000) % 1000) / 1000;
        const sz = ((h / 1000000) % 1000) / 1000;
        const dx2 = x * freq - (cx + sx);
        const dy2 = y * freq - (cy + sy);
        const dz2 = z * freq - (cz + sz);
        const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2 + dz2 * dz2);
        if (dist < minDist) minDist = dist;
      }
    }
  }
  return minDist;
};

// Inverted Worley: high at cell centers, low at edges
const invertedWorley = (x, y, z, freq) => 1.0 - Math.min(worley3D(x, y, z, freq), 1.0);

// ============================================================
// CASCADE CLOUD GENERATOR — Hierarchical Sphere Placement
// Algorithm: Fibonacci sphere sampling → noise-driven bump placement → recursive cascade
// ============================================================

// Fibonacci sphere points — uniform distribution on sphere surface
const fibonacciSphere = (cx, cy, cz, radius, numPoints) => {
  const points = [];
  const goldenRatio = (1 + Math.sqrt(5)) / 2;
  const angleInc = Math.PI * 2 * goldenRatio;
  for (let i = 0; i < numPoints; i++) {
    const t = i / numPoints;
    const inclination = Math.acos(1 - 2 * t);
    const azimuth = angleInc * i;
    const x = Math.sin(inclination) * Math.cos(azimuth);
    const y = Math.sin(inclination) * Math.sin(azimuth);
    const z = Math.cos(inclination);
    points.push({
      x: cx + x * radius,
      y: cy + y * radius,
      z: cz + z * radius
    });
  }
  return points;
};

// Perturb direction using noise (for organic variation)
const perturbDirection = (nx, ny, nz, px, py, pz, strength, seed) => {
  const angleA = perlin3D(px * 10 + seed, py * 10, pz * 10, 0) * strength;
  const angleB = perlin3D(px * 10, py * 10 + seed, pz * 10 + 50, 0) * strength;
  
  // Rotate around an arbitrary axis
  const cosA = Math.cos(angleA), sinA = Math.sin(angleA);
  const cosB = Math.cos(angleB), sinB = Math.sin(angleB);
  
  // Simplified perturbation: tilt x and y components
  const nx2 = nx * cosA - ny * sinA;
  const ny2 = nx * sinA + ny * cosA;
  const nz2 = nz;
  
  const nx3 = nx2 * cosB + nz2 * sinB;
  const ny3 = ny2;
  const nz3 = -nx2 * sinB + nz2 * cosB;
  
  const len = Math.sqrt(nx3*nx3 + ny3*ny3 + nz3*nz3);
  return { x: nx3/len, y: ny3/len, z: nz3/len };
};

// Main cascade cloud generator
const generateCascadeCloud = (params) => {
  const {
    cloudSize, density, turbulence, seed,
    cascadeDepth, bumpsPerLevel, childRatio
  } = params;

  const spheres = [];
  const minRadius = 0.5;
  const baseRadius = cloudSize * 0.5;
  
  // Start with one root ellipsoid
  const rootSpheres = [
    { x: 0, y: 0, z: 0, radius: baseRadius, depth: 0, density: 1.0 }
  ];
  spheres.push(rootSpheres[0]);

  // Ellipsoid ratios for cloud shape (flatter at bottom for cumulus look)
  const ellipsoidY = cloudSize * 0.45; // shorter Y axis

  // Recursive cascade
  const generateBumpsOnSphere = (parent) => {
    if (parent.depth >= cascadeDepth) return;
    if (parent.radius < minRadius * 2) return;

    // Sample points on parent sphere surface
    const numPoints = bumpsPerLevel;
    const surfacePoints = fibonacciSphere(parent.x, parent.y, parent.z, parent.radius, numPoints);

    for (const pt of surfacePoints) {
      // Normal from center to this surface point
      const nx = (pt.x - parent.x) / parent.radius;
      const ny = (pt.y - parent.y) / parent.radius;
      const nz = (pt.z - parent.z) / parent.radius;

      // Noise at this surface point — determines bump size
      // Use FBM for organic cauliflower-like distribution
      const noiseScale = 3.0 / parent.radius;
      const noiseVal = (fbm(pt.x * noiseScale, pt.y * noiseScale, pt.z * noiseScale, 4, 0.5, 2.0, seed + parent.depth * 10) + 1) * 0.5;

      // Worley adds cellular detail for cauliflower look
      const worleyVal = invertedWorley(pt.x * noiseScale * 2, pt.y * noiseScale * 2, pt.z * noiseScale * 2, 1.0);

      // Combined: noise decides bump existence and size
      const threshold = 1 - density;
      const bumpIntensity = noiseVal * 0.7 + worleyVal * 0.3;
      
      if (bumpIntensity < threshold) continue;

      // Child radius: proportional to parent, modulated by noise
      const childRadius = parent.radius * childRatio * (0.5 + bumpIntensity * 0.8);
      if (childRadius < minRadius) continue;

      // Perturb direction for organic feel
      const perturbed = perturbDirection(nx, ny, nz, pt.x, pt.y, pt.z, 0.2, seed + parent.depth);

      // Child position: slightly outside parent surface
      const offset = parent.radius * 0.02;
      const child = {
        x: pt.x + perturbed.x * offset,
        y: pt.y + perturbed.y * offset,
        z: pt.z + perturbed.z * offset,
        radius: childRadius,
        depth: parent.depth + 1,
        density: bumpIntensity
      };

      spheres.push(child);

      // Recurse — but with decreasing probability
      const continueChance = Math.max(0.2, 1 - parent.depth * 0.25);
      if (Math.random() < continueChance || parent.depth < 2) {
        generateBumpsOnSphere(child);
      }
    }
  };

  // Generate bumps starting from root sphere
  generateBumpsOnSphere(rootSpheres[0]);

  return spheres;
};

// ============================================================
// THREE.JS SCENE
// ============================================================

let scene, camera, renderer;
let cloudMeshes = [];
let currentSpheres = [];

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
  camera.position.set(80, 60, 120);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);
  
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(50, 100, 50);
  scene.add(dirLight);
  
  const backLight = new THREE.DirectionalLight(0x4488ff, 0.3);
  backLight.position.set(-50, -30, -50);
  scene.add(backLight);
  
  setupControls();
  
  const grid = new THREE.GridHelper(200, 20, 0x1a1a3a, 0x1a1a3a);
  grid.position.y = -10;
  scene.add(grid);
  
  const axes = new THREE.AxesHelper(30);
  scene.add(axes);
  
  window.addEventListener('resize', onResize);
  
  ['cloudSize', 'density', 'turbulence', 'seed', 'cascadeDepth', 'bumpsPerLevel', 'childRatio'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      const v = parseFloat(this.value);
      const isPercent = ['density', 'turbulence'].includes(id);
      const isInt = ['seed', 'cascadeDepth', 'bumpsPerLevel'].includes(id);
      document.getElementById(id + 'Val').textContent = 
        isInt ? v : (v / (isPercent ? 100 : 1)).toFixed(id === 'childRatio' ? 2 : 2);
    });
  });
  
  generate();
  animate();
}

function setupControls() {
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let theta = Math.PI / 4;
  let phi = Math.PI / 4;
  let radius = 150;
  const target = new THREE.Vector3(0, 0, 0);
  
  const canvas = renderer.domElement;
  
  const updateCamera = () => {
    camera.position.x = target.x + radius * Math.sin(phi) * Math.cos(theta);
    camera.position.y = target.y + radius * Math.cos(phi);
    camera.position.z = target.z + radius * Math.sin(phi) * Math.sin(theta);
    camera.lookAt(target);
  };
  
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
    canvas.style.cursor = 'grabbing';
  });
  
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    theta -= dx * 0.01;
    phi -= dy * 0.01;
    phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
    prevX = e.clientX;
    prevY = e.clientY;
    updateCamera();
  });
  
  canvas.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  canvas.addEventListener('mouseleave', () => {
    isDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    radius += e.deltaY * 0.5;
    radius = Math.max(30, Math.min(500, radius));
    updateCamera();
  }, { passive: false });

  let touchPrevDist = 0;
  let isPinching = false;
  let pinchOccurred = false;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      isPinching = false;
      pinchOccurred = false;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      isPinching = true;
      pinchOccurred = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchPrevDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && !isPinching) {
      const dx = e.touches[0].clientX - prevX;
      const dy = e.touches[0].clientY - prevY;
      theta -= dx * 0.01;
      phi -= dy * 0.01;
      phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
      updateCamera();
    } else if (e.touches.length === 2) {
      if (!isPinching) {
        isPinching = true;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchPrevDist = Math.sqrt(dx * dx + dy * dy);
      }
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const delta = dist - touchPrevDist;
      radius += delta * 0.8;
      radius = Math.max(30, Math.min(500, radius));
      touchPrevDist = dist;
      if (Math.abs(delta) > 1) pinchOccurred = true;
      updateCamera();
    }
  }, { passive: false });

  let lastTap = 0;
  canvas.addEventListener('touchend', e => {
    if (isPinching && e.touches.length === 1) {
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    }
    isPinching = false;

    if (e.touches.length === 0 && !pinchOccurred) {
      const now = Date.now();
      if (now - lastTap < 300) {
        theta = Math.PI / 4;
        phi = Math.PI / 4;
        radius = 150;
        updateCamera();
      }
      lastTap = now;
    }
  }, { passive: false });

  canvas.style.cursor = 'grab';
  updateCamera();

  window._orbitUpdate = updateCamera;
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function generate() {
  const params = {
    cloudSize: parseFloat(document.getElementById('cloudSize').value),
    density: parseFloat(document.getElementById('density').value) / 100,
    turbulence: parseFloat(document.getElementById('turbulence').value) / 100,
    seed: parseInt(document.getElementById('seed').value),
    cascadeDepth: parseInt(document.getElementById('cascadeDepth').value),
    bumpsPerLevel: parseInt(document.getElementById('bumpsPerLevel').value),
    childRatio: parseFloat(document.getElementById('childRatio').value) / 100
  };

  currentSpheres = generateCascadeCloud(params);
  document.getElementById('stats').textContent = `${currentSpheres.length} spheres`;
  
  rebuildMesh();
}

function rebuildMesh() {
  cloudMeshes.forEach(m => scene.remove(m));
  cloudMeshes = [];
  
  const geometry = new THREE.SphereGeometry(1, 12, 8);
  
  currentSpheres.forEach(s => {
    const d = s.density;
    const r = 0.2 + d * 0.6;
    const g = 0.4 + d * 0.4;
    const b = 1.0;
    const color = new THREE.Color(r, g, b);
    
    const material = new THREE.MeshLambertMaterial({
      color,
      transparent: true,
      opacity: 0.3 + d * 0.5,
      depthWrite: false
    });
    
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(s.x, s.y, s.z);
    mesh.scale.setScalar(s.radius);
    scene.add(mesh);
    cloudMeshes.push(mesh);
  });
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

function exportCode() {
  const params = {
    cloudSize: parseFloat(document.getElementById('cloudSize').value),
    density: parseFloat(document.getElementById('density').value) / 100,
    turbulence: parseFloat(document.getElementById('turbulence').value) / 100,
    seed: parseInt(document.getElementById('seed').value),
    cascadeDepth: parseInt(document.getElementById('cascadeDepth').value),
    bumpsPerLevel: parseInt(document.getElementById('bumpsPerLevel').value),
    childRatio: parseFloat(document.getElementById('childRatio').value) / 100
  };
  
  const code = `// CloudMath C# — Generated from visualizer v3 (Cascade)
// Sphere-based cloud generator: Fibonacci + FBM + Worley cascade
// ${currentSpheres.length} spheres

List<CloudSphere> spheres = GenerateCascadeCloud(
    cloudSize: ${params.cloudSize}f,
    density: ${params.density}f,
    turbulence: ${params.turbulence}f,
    seed: ${params.seed},
    cascadeDepth: ${params.cascadeDepth},
    bumpsPerLevel: ${params.bumpsPerLevel},
    childRatio: ${params.childRatio}f
);`;

  const blob = new Blob([code], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CloudMath_Export.cs';
  a.click();
}

function toggleControls() {
  const controls = document.querySelector('.controls');
  const btn = document.querySelector('.toggle-btn');
  controls.classList.toggle('collapsed');
  btn.textContent = controls.classList.contains('collapsed') ? 'Parameters' : 'Hide';
}

init();
</script>
