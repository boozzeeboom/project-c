// ============================================================
// MULTI-LAYER CLOUD GENERATOR v5 — Archetype Dispatcher
// ============================================================

// Fibonacci sphere тАФ uniform surface sampling
const fibonacciSphere = (cx, cy, cz, rx, ry, rz, numPoints) => {
  const points = [];
  const angleInc = Math.PI * 2 * PHI;
  for (let i = 0; i < numPoints; i++) {
    const t = i / numPoints;
    const inclination = Math.acos(1 - 2 * t);
    const azimuth = angleInc * i;
    const sx = Math.sin(inclination) * Math.cos(azimuth);
    const sy = Math.sin(inclination) * Math.sin(azimuth);
    const sz = Math.cos(inclination);
    points.push({
      x: cx + sx * rx,
      y: cy + sy * ry,
      z: cz + sz * rz
    });
  }
  return points;
};

// Perturb direction using noise
const perturbDir = (nx, ny, nz, px, py, pz, strength, seed) => {
  const a1 = perlin3D(px * 10, py * 10, pz * 10, seed) * strength;
  const a2 = perlin3D(px * 10, py * 10, pz * 10 + 50, seed + 1) * strength;
  const cos1 = Math.cos(a1), sin1 = Math.sin(a1);
  const cos2 = Math.cos(a2), sin2 = Math.sin(a2);
  const nx2 = nx * cos1 - ny * sin1;
  const ny2 = nx * sin1 + ny * cos1;
  const nz2 = nz;
  const nx3 = nx2 * cos2 + nz2 * sin2;
  const ny3 = ny2;
  const nz3 = -nx2 * sin2 + nz2 * cos2;
  const len = Math.sqrt(nx3*nx3 + ny3*ny3 + nz3*nz3) || 1;
  return { x: nx3/len, y: ny3/len, z: nz3/len };
};

// 2D Fibonacci spiral for platform interior
const fibonacciSpiral2D = (count) => {
  const points = [];
  const angleInc = Math.PI * 2 * PHI;
  for (let i = 0; i < count; i++) {
    const r = Math.sqrt(i / count);
    const theta = angleInc * i;
    points.push({ x: r * Math.cos(theta), z: r * Math.sin(theta) });
  }
  return points;
};

// Global unique ID for per-child noise seeding
let globalUniqueId = 0;

// ============================================================
// SPHERE ARCHETYPE тАФ existing cascade algorithm, refactored
// ============================================================

const generateSphereLayer = (layer, parentSpheres) => {
  const spheres = [];
  globalUniqueId = 0;

  const sphereCountScale = layer.sphereCountScale !== undefined ? layer.sphereCountScale : 1.0;
  const maxSphereCount = Math.floor((layer.maxSphereCount !== undefined ? layer.maxSphereCount : 5000) * sphereCountScale);

  const {
    cloudSize, density, seed,
    cascadeDepth, bumpsPerLevel, childRatio, sizeVariation,
    jitter, clustering, parentCount, ellipsoidY, ellipsoidXZ, sizeRange
  } = layer;

  const minRadius = sizeRange?.min || 0.5;
  const sizeMax = sizeRange?.max || 20;

  if (parentSpheres && parentSpheres.length > 0) {
    for (const parentSphere of parentSpheres) {
      const actualBumps = Math.floor(bumpsPerLevel * (0.4 + (perlin3D(parentSphere.x * 0.5, parentSphere.y * 0.5, parentSphere.z * 0.5, seed) + 1) * 0.5 * 0.8));
      const surfacePoints = fibonacciSphere(parentSphere.x, parentSphere.y, parentSphere.z, parentSphere.radius, parentSphere.radius, parentSphere.radius, actualBumps);

      for (const pt of surfacePoints) {
        const nx = (pt.x - parentSphere.x) / parentSphere.radius;
        const ny = (pt.y - parentSphere.y) / parentSphere.radius;
        const nz = (pt.z - parentSphere.z) / parentSphere.radius;

        const jitterStrength = jitter / 100;
        const jitX = perlin3D(pt.x * 15, pt.y * 15, pt.z * 15, seed) * jitterStrength;
        const jitY = perlin3D(pt.x * 15, pt.y * 15, pt.z * 15, seed + 1) * jitterStrength;
        const jitZ = perlin3D(pt.x * 15, pt.y * 15, pt.z * 15, seed + 2) * jitterStrength;
        const jpt = { x: pt.x + jitX * parentSphere.radius, y: pt.y + jitY * parentSphere.radius, z: pt.z + jitZ * parentSphere.radius };

        const noiseScale = 3.0 / parentSphere.radius;
        const worleyVal = invertedWorley(jpt.x * noiseScale * 2, jpt.y * noiseScale * 2, jpt.z * noiseScale * 2, 1.0, layer.noiseSalt);
        const clusterStrength = clustering / 100;
        const fbmVal = (fbm(jpt.x * noiseScale, jpt.y * noiseScale, jpt.z * noiseScale, 4, 0.5, 2.0, seed) + 1) * 0.5;
        const bumpIntensity = fbmVal * (1 - clusterStrength * 0.5) + worleyVal * clusterStrength * 0.5;

        const threshold = 1 - density;
        if (bumpIntensity < threshold) {
          if (!(worleyVal > 0.75 && Math.random() < 0.15)) {
            continue;
          }
        }

        const phiNoise = (perlin3D(jpt.x * noiseScale, jpt.y * noiseScale, jpt.z * noiseScale, seed + 100) + 1) * 0.5;
        const effectiveRatio = (PHI + (phiNoise - 0.5) * 0.6) * (childRatio / 100) * 0.4;

        const childUniqueId = globalUniqueId++;
        const sizeNoiseBase = Math.pow((perlin3D(jpt.x * noiseScale * 2, jpt.y * noiseScale * 2, jpt.z * noiseScale * 2, seed + childUniqueId) + 1) * 0.5, 1.5);
        const sizeNoiseMult = Math.pow((perlin3D(jpt.x * noiseScale * 2 + 100, jpt.y * noiseScale * 2 + 100, jpt.z * noiseScale * 2 + 100, seed + childUniqueId + 500) + 1) * 0.5, 1.5);
        const sizeBase = minRadius + sizeNoiseBase * (sizeMax - minRadius);
        const sizeMult = (0.05 + sizeNoiseMult * sizeVariation * 2.0 + effectiveRatio) * 0.3;
        const childRadius = sizeBase * sizeMult;

        if (childRadius < minRadius * 0.1) continue;

        const perturbed = perturbDir(nx, ny, nz, jpt.x, jpt.y, jpt.z, 0.25, seed);
        const posVariation = layer.positionVariation !== undefined ? layer.positionVariation : 0.5;
        const ox = (Math.random() - 0.5) * 12 * parentSphere.radius * posVariation;
        const oy = (Math.random() - 0.5) * 12 * parentSphere.radius * posVariation;
        const oz = (Math.random() - 0.5) * 12 * parentSphere.radius * posVariation;

        spheres.push({
          x: jpt.x + perturbed.x * parentSphere.radius * 0.02 + ox,
          y: jpt.y + perturbed.y * parentSphere.radius * 0.02 + oy,
          z: jpt.z + perturbed.z * parentSphere.radius * 0.02 + oz,
          radius: childRadius,
          depth: 0,
          density: bumpIntensity,
          archetype: 'sphere'
        });

        if (spheres.length >= maxSphereCount) break;
      }
      if (spheres.length >= maxSphereCount) break;
    }
    return spheres;
  }

  const baseRadius = cloudSize * 0.5;

  const rx = baseRadius * (ellipsoidXZ / 100);
  const ry = baseRadius * (ellipsoidY / 100);
  const rz = baseRadius * (ellipsoidXZ / 100);

  const parents = [];
  for (let p = 0; p < parentCount; p++) {
    const offsetAngle = (p / parentCount) * Math.PI * 2;
    const spread = parentCount > 1 ? (p % 3) * 0.15 : 0;
    const px = Math.cos(offsetAngle) * rx * spread;
    const py = (p % 2 === 0 ? 1 : -1) * ry * 0.1 * spread;
    const pz = Math.sin(offsetAngle) * rz * spread;
    const sphere = { x: px, y: py, z: pz, radius: baseRadius, depth: 0, density: 1.0, archetype: 'sphere' };
    parents.push(sphere);
    spheres.push(sphere);
  }

  const generateBumpsOnSphere = (parent) => {
    if (parent.depth >= cascadeDepth) return;
    if (parent.radius < minRadius * 1.5) return;

    const noiseForBumpCount = (perlin3D(parent.x * 0.5, parent.y * 0.5, parent.z * 0.5, seed + parent.depth * 7) + 1) * 0.5;
    const actualBumps = Math.floor(bumpsPerLevel * (0.4 + noiseForBumpCount * 0.8));

    const surfacePoints = fibonacciSphere(parent.x, parent.y, parent.z, parent.radius, parent.radius, parent.radius, actualBumps);

    for (const pt of surfacePoints) {
      const nx = (pt.x - parent.x) / parent.radius;
      const ny = (pt.y - parent.y) / parent.radius;
      const nz = (pt.z - parent.z) / parent.radius;

      const jitterStrength = jitter / 100;
      const jitX = perlin3D(pt.x * 15, pt.y * 15, pt.z * 15, seed) * jitterStrength;
      const jitY = perlin3D(pt.x * 15, pt.y * 15, pt.z * 15, seed + 1) * jitterStrength;
      const jitZ = perlin3D(pt.x * 15, pt.y * 15, pt.z * 15, seed + 2) * jitterStrength;
      const jpt = { x: pt.x + jitX * parent.radius, y: pt.y + jitY * parent.radius, z: pt.z + jitZ * parent.radius };

      const noiseScale = 3.0 / parent.radius;

      const worleyVal = invertedWorley(jpt.x * noiseScale * 2, jpt.y * noiseScale * 2, jpt.z * noiseScale * 2, 1.0, layer.noiseSalt);
      const clusterStrength = clustering / 100;

      const fbmVal = (fbm(jpt.x * noiseScale, jpt.y * noiseScale, jpt.z * noiseScale, 4, 0.5, 2.0, seed + parent.depth * 10) + 1) * 0.5;
      const bumpIntensity = fbmVal * (1 - clusterStrength * 0.5) + worleyVal * clusterStrength * 0.5;

      const threshold = 1 - density;
      if (bumpIntensity < threshold) {
        if (worleyVal > 0.75 && Math.random() < 0.15) {
        } else {
          continue;
        }
      }

      const phiNoise = (perlin3D(jpt.x * noiseScale, jpt.y * noiseScale, jpt.z * noiseScale, seed + 100) + 1) * 0.5;
      const effectiveRatio = (PHI + (phiNoise - 0.5) * 0.6) * (childRatio / 100) * 0.4;

      const childUniqueId = globalUniqueId++;
      const sizeNoiseBase = Math.pow((perlin3D(jpt.x * noiseScale * 2, jpt.y * noiseScale * 2, jpt.z * noiseScale * 2, seed + childUniqueId) + 1) * 0.5, 1.5);
      const sizeNoiseMult = Math.pow((perlin3D(jpt.x * noiseScale * 2 + 100, jpt.y * noiseScale * 2 + 100, jpt.z * noiseScale * 2 + 100, seed + childUniqueId + 500) + 1) * 0.5, 1.5);
      const sizeBase = minRadius + sizeNoiseBase * (sizeMax - minRadius);
      const sizeMult = (0.05 + sizeNoiseMult * sizeVariation * 2.0 + effectiveRatio) * 0.3;
      const childRadius = sizeBase * sizeMult;

      if (childRadius < minRadius * 0.1) continue;

      const perturbed = perturbDir(nx, ny, nz, jpt.x, jpt.y, jpt.z, 0.25, seed + parent.depth);
      const posVariation = layer.positionVariation !== undefined ? layer.positionVariation : 0.5;
      const ox = (Math.random() - 0.5) * 12 * parent.radius * posVariation;
      const oy = (Math.random() - 0.5) * 12 * parent.radius * posVariation;
      const oz = (Math.random() - 0.5) * 12 * parent.radius * posVariation;

      const child = {
        x: jpt.x + perturbed.x * parent.radius * 0.02 + ox,
        y: jpt.y + perturbed.y * parent.radius * 0.02 + oy,
        z: jpt.z + perturbed.z * parent.radius * 0.02 + oz,
        radius: childRadius,
        depth: parent.depth + 1,
        density: bumpIntensity,
        archetype: 'sphere'
      };

      spheres.push(child);
      if (spheres.length >= maxSphereCount) return;

      const continueChance = Math.max(0.15, 0.8 - parent.depth * 0.2);
      if ((Math.random() < continueChance || parent.depth < 2) && spheres.length < maxSphereCount) {
        generateBumpsOnSphere(child);
      }
    }
  };

  for (const parent of parents) {
    generateBumpsOnSphere(parent);
  }

  return spheres;
};

// ============================================================
// COLUMN ARCHETYPE тАФ vertical stacking
// ============================================================

const generateColumnLayer = (layer) => {
  const spheres = [];
  const p = layer.columnParams || {};

  const height = p.height || 30;
  const baseRadius = p.baseRadius || 8;
  const topRadius = p.topRadius || 2;
  const floors = p.floors || 8;
  const ringsPerFloor = p.ringsPerFloor || 5;
  const wobble = (p.wobble || 0.3) / 100;
  const floorSpacing = height / floors;
  const sizeRange = layer.sizeRange || { min: 3, max: 10 };
  const jitter = layer.jitter !== undefined ? layer.jitter : 0.3;
  const clustering = layer.clustering !== undefined ? layer.clustering : 0.5;

  for (let floor = 0; floor < floors; floor++) {
    const t = floor / (floors - 1 || 1);
    const floorRadius = baseRadius + (topRadius - baseRadius) * t;

    const y = floor * floorSpacing;
    const wobbleX = perlin3D(floor * 0.7, 0, 0, layer.seed) * wobble * floorRadius + jitter * baseRadius * 2 * perlin3D(floor, 0, 0, layer.seed + 1);
    const wobbleZ = perlin3D(floor * 0.7, 0, 0, layer.seed + 100) * wobble * floorRadius + jitter * baseRadius * 2 * perlin3D(floor, 0, 0, layer.seed + 2);

    for (let r = 0; r < ringsPerFloor; r++) {
      const angle = (r / ringsPerFloor) * Math.PI * 2 + perlin3D(floor * 0.3, r * 0.5, layer.seed, layer.seed) * 0.5 * (1 + jitter * 2);
      const distNoise = perlin3D(floor * 0.5, r * 0.7, layer.seed + 50, layer.seed);
      const distFromCenter = floorRadius * (0.3 + (distNoise + 1) * 0.5 * 0.7 + 0.5) * 0.5;
      const jitR = perlin3D(floor, r, layer.seed, layer.seed) * jitter * 0.5;
      const rNoiseBase = Math.pow((perlin3D(floor + r * 0.1, r + floor * 0.1, layer.seed + 200, layer.seed) + 1) * 0.5, 1.8);
      const rNoiseMult = Math.pow((perlin3D(floor + r * 0.1 + 50, r + floor * 0.1 + 50, layer.seed + 250, layer.seed) + 1) * 0.5, 1.5);
      const sizeBase = sizeRange.min + rNoiseBase * (sizeRange.max - sizeRange.min);
      const sphereRadius = baseRadius * sizeBase * 0.12 * (0.1 + rNoiseMult * 0.9);
      const posVariation = layer.positionVariation !== undefined ? layer.positionVariation : 0.5;
      const colOx = (Math.random() - 0.5) * 12 * sphereRadius * posVariation;
      const colOy = (Math.random() - 0.5) * 12 * sphereRadius * posVariation;
      const colOz = (Math.random() - 0.5) * 12 * sphereRadius * posVariation;

      spheres.push({
        x: Math.cos(angle) * distFromCenter + wobbleX + colOx,
        y: y + jitR * 0.3 + colOy,
        z: Math.sin(angle) * distFromCenter + wobbleZ + colOz,
        radius: Math.max(sphereRadius, 0.5),
        depth: 0,
        density: 0.6 + (1 - t) * 0.3,
        archetype: 'column'
      });
    }

    if (floor % 2 === 0) {
      spheres.push({
        x: wobbleX,
        y: y,
        z: wobbleZ,
        radius: floorRadius * 0.3,
        depth: 0,
        density: 0.8,
        archetype: 'column'
      });
    }
  }

  return spheres;
};

// ============================================================
// PLATFORM ARCHETYPE тАФ flat horizontal spread
// ============================================================

const generatePlatformLayer = (layer) => {
  const spheres = [];
  const p = layer.platformParams || {};

  const width = p.width || 40;
  const depth = p.depth || 40;
  const centerThickness = p.centerThickness || 3;
  const edgeThickness = p.edgeThickness || 0.5;
  const interiorDensity = p.interiorDensity || 40;
  const edgeRings = p.edgeRings || 3;
  const sizeRange = layer.sizeRange || { min: 3, max: 10 };
  const baseRadius = sizeRange.min;
  const jitter = layer.jitter !== undefined ? layer.jitter : 0.3;
  const clustering = layer.clustering !== undefined ? layer.clustering : 0.5;

  spheres.push({
    x: 0, y: 0, z: 0,
    radius: baseRadius,
    depth: 0, density: 1.0,
    archetype: 'platform'
  });

  const interiorPoints = fibonacciSpiral2D(interiorDensity);
  let spiralIdx = 0;

  for (const pt of interiorPoints) {
    const px = pt.x * width * 0.5;
    const pz = pt.z * depth * 0.5;
    const dist = Math.sqrt((px * px) / (width * width * 0.25) + (pz * pz) / (depth * depth * 0.25));
    const thickness = centerThickness * Math.exp(-dist * dist * 3) + edgeThickness * dist;
    if (thickness < 0.2) continue;

    const yNoise = perlin3D(px * 0.3, pz * 0.3, layer.seed + 500, layer.seed);
    const y = yNoise * thickness * 0.5 + jitter * baseRadius * perlin3D(px, pz, layer.seed, layer.seed + 1);
    const rNoiseBase = Math.pow((perlin3D(px * 0.5, pz * 0.5, layer.seed + 600 + spiralIdx, layer.seed) + 1) * 0.5, 1.8);
    const rNoiseMult = Math.pow((perlin3D(px * 0.5 + 70, pz * 0.5 + 70, layer.seed + 650 + spiralIdx, layer.seed + 1) + 1) * 0.5, 1.5);
    const sizeBase = sizeRange.min + rNoiseBase * (sizeRange.max - sizeRange.min);
    const jitterFactor = 1 + jitter * (1 - clustering);
    const radius = sizeBase * (0.1 + rNoiseMult * 0.9) * jitterFactor;
    const density = (0.3 + 0.7 * (1 - dist)) * (clustering > 0.5 ? (0.7 + rNoiseBase * 0.3) : 1);

    if (density < 0.1 || radius < 0.3) { spiralIdx++; continue; }
    const posVariation = layer.positionVariation !== undefined ? layer.positionVariation : 0.5;
    const platOx = (Math.random() - 0.5) * 12 * radius * posVariation;
    const platOy = (Math.random() - 0.5) * 12 * radius * posVariation;
    const platOz = (Math.random() - 0.5) * 12 * radius * posVariation;

    spheres.push({
      x: px + platOx, y: y + platOy, z: pz + platOz,
      radius, depth: 0, density,
      archetype: 'platform'
    });
    spiralIdx++;
  }

  return spheres;
};

// ============================================================
// TREE ARCHETYPE тАФ directional branching
// ============================================================

const generateTreeLayer = (layer) => {
  const spheres = [];
  const p = layer.treeParams || {};
  const seed = layer.seed;

  const baseRadius = p.baseRadius || 8;
  const maxDepth = p.maxDepth || 5;
  const branchElongation = p.branchElongation || 1.5;
  const taperRatio = p.taperRatio || 0.75;
  const branchAngle = ((p.branchAngle || 35) * Math.PI) / 180;
  const branchProbability = p.branchProbability || 0.4;
  const trunkUpBias = p.trunkUpBias || 0.3;
  const lengthFalloff = p.lengthFalloff || 0.7;
  const thicknessFalloff = p.thicknessFalloff || 0.7;
  const jitter = layer.jitter !== undefined ? layer.jitter : 0.3;
  const clustering = layer.clustering !== undefined ? layer.clustering : 0.5;
  const posVariation = layer.positionVariation !== undefined ? layer.positionVariation : 0.5;
  const sizeRange = layer.sizeRange || { min: 3, max: 10 };

  const root = {
    x: 0, y: 0, z: 0,
    radius: sizeRange.min,
    depth: 0, density: 1.0,
    archetype: 'tree'
  };
  spheres.push(root);

  const perturbDirDeterministic = (dir, px, py, pz, maxAngle, seedVal) => {
    const a1 = perlin3D(px * 3, py * 3, pz * 3, seedVal) * maxAngle;
    const a2 = perlin3D(px * 3, py * 3, pz * 3 + 50, seedVal + 1) * maxAngle;
    const cos1 = Math.cos(a1), sin1 = Math.sin(a1);
    const cos2 = Math.cos(a2), sin2 = Math.sin(a2);
    const nx2 = dir.x * cos1 - dir.y * sin1;
    const ny2 = dir.x * sin1 + dir.y * cos1;
    const nz2 = dir.z;
    const nx3 = nx2 * cos2 + nz2 * sin2;
    const ny3 = ny2;
    const nz3 = -nx2 * sin2 + nz2 * cos2;
    const len = Math.sqrt(nx3 * nx3 + ny3 * ny3 + nz3 * nz3) || 1;
    return { x: nx3 / len, y: ny3 / len, z: nz3 / len };
  };

  const sampleLateralCount = (parent, pathId) => {
    const val = (perlin3D(parent.x * 2, parent.y * 2, parent.z * 2, seed + pathId) + 1) * 0.5;
    if (val < 0.4) return 0;
    if (val < 0.75) return 1;
    if (val < 0.95) return 2;
    return 3;
  };

let globalPathId = 0;

  const stack = [{ parent: root, dir: { x: 0, y: 1, z: 0 }, pathId: 0, depth: 0, lengthMult: 1 }];

  while (stack.length > 0) {
    const { parent, dir, pathId, depth, lengthMult } = stack.pop();
    if (depth >= maxDepth) continue;
    if (parent.radius < 0.5) continue;

    const effectiveLengthMult = lengthMult || 1;
    const extension = parent.radius * branchElongation * effectiveLengthMult;

    const perturbedDir = perturbDirDeterministic(dir, parent.x, parent.y, parent.z, branchAngle, seed + pathId);

    const jitterAngle = jitter * Math.PI * perlin3D(parent.x, parent.y, pathId, seed);
    const jx = Math.cos(jitterAngle) * perturbedDir.x - Math.sin(jitterAngle) * perturbedDir.y;
    const jy = Math.cos(jitterAngle) * perturbedDir.y + Math.sin(jitterAngle) * perturbedDir.x;
    const jDir = { x: jx, y: jy, z: perturbedDir.z };

    const childPos = {
      x: parent.x + jDir.x * extension + jitter * baseRadius * perlin3D(depth, pathId, seed + 50, seed),
      y: parent.y + jDir.y * extension + jitter * baseRadius * perlin3D(depth, pathId, seed + 60, seed),
      z: parent.z + jDir.z * extension + jitter * baseRadius * perlin3D(depth, pathId, seed + 70, seed)
    };

    const sizeNoiseBase = Math.pow((perlin3D(depth, pathId, seed + 80, seed) + 1) * 0.5, 1.8);
    const sizeNoiseMult = Math.pow((perlin3D(depth, pathId, seed + 82, seed) + 1) * 0.5, 1.5);
    const radiusNoise = Math.pow((perlin3D(depth, pathId, seed + 81, seed) + 1) * 0.5, 2.0);
    const sizeBase = sizeRange.min + sizeNoiseBase * (sizeRange.max - sizeRange.min);
    const childRadius = sizeBase * taperRatio * thicknessFalloff * (0.1 + sizeNoiseMult * 0.9) * (0.3 + radiusNoise * 0.7);
    const childDensity = 1.0 - (depth / maxDepth) * 0.3;

    const treeOx = (Math.random() - 0.5) * 12 * childRadius * posVariation;
    const treeOy = (Math.random() - 0.5) * 12 * childRadius * posVariation;
    const treeOz = (Math.random() - 0.5) * 12 * childRadius * posVariation;

    const child = {
      x: childPos.x + treeOx, y: childPos.y + treeOy, z: childPos.z + treeOz,
      radius: childRadius,
      depth: depth + 1,
      density: childDensity,
      archetype: 'tree'
    };
    spheres.push(child);

    stack.push({ parent: child, dir: perturbedDir, pathId, depth: depth + 1, lengthMult: effectiveLengthMult * lengthFalloff });

    const lateralCount = sampleLateralCount(parent, pathId);
    for (let i = 0; i < lateralCount; i++) {
      const lateralPathId = ++globalPathId;
      const lateralAngle = ((i / Math.max(lateralCount, 1)) * Math.PI * 2) + perlin3D(pathId * 10, i * 5, seed, seed) * 0.5 * (1 + jitter);
      const perpX = -dir.z;
      const perpZ = dir.x;
      const lateralDir = {
        x: dir.x * Math.cos(branchAngle) + perpX * Math.sin(lateralAngle) * Math.sin(branchAngle),
        y: dir.y * Math.cos(branchAngle) + Math.sin(branchAngle) * 0.5,
        z: dir.z * Math.cos(branchAngle) + perpZ * Math.sin(lateralAngle) * Math.sin(branchAngle)
      };
      const len = Math.sqrt(lateralDir.x * lateralDir.x + lateralDir.y * lateralDir.y + lateralDir.z * lateralDir.z) || 1;
      lateralDir.x /= len;
      lateralDir.y /= len;
      lateralDir.z /= len;

      const lateralRadius = childRadius * 0.7;
      if (lateralRadius < 0.5) continue;

      const lateralPos = {
        x: parent.x + lateralDir.x * extension * 0.8,
        y: parent.y + lateralDir.y * extension * 0.8,
        z: parent.z + lateralDir.z * extension * 0.8
      };

      const latOx = (Math.random() - 0.5) * 12 * lateralRadius * posVariation;
      const latOy = (Math.random() - 0.5) * 12 * lateralRadius * posVariation;
      const latOz = (Math.random() - 0.5) * 12 * lateralRadius * posVariation;

      const lateralChild = {
        x: lateralPos.x + latOx, y: lateralPos.y + latOy, z: lateralPos.z + latOz,
        radius: lateralRadius,
        depth: depth + 1,
        density: childDensity * 0.8,
        archetype: 'tree'
      };
      spheres.push(lateralChild);
      if (depth + 1 < maxDepth - 1) {
        stack.push({ parent: lateralChild, dir: lateralDir, pathId: lateralPathId, depth: depth + 2, lengthMult: effectiveLengthMult * lengthFalloff * 0.8 });
      }
    }
  }

  return spheres;
};

// ====================================
// ARCHETYPE DISPATCHER
// ============================================================

const getArchetypeGenerator = (archetype) => {
  switch (archetype) {
    case 'sphere': return generateSphereLayer;
    case 'column': return generateColumnLayer;
    case 'platform': return generatePlatformLayer;
    case 'tree': return generateTreeLayer;
    default: return generateSphereLayer;
  }
};

// Check if generator supports parent mode
const generatorSupportsParent = (archetype) => {
  return archetype === 'sphere';
};

// ============================================================
// MAIN CLOUD GENERATOR тАФ Layer Stacking
// ============================================================

const generateCloud = (layers) => {
  const allSpheres = [];
  let cumulativeY = 0;
  let parentSpheres = [];
  let prevWasParent = false;

  for (let i = 0; i < layers.length; i++) {
    const layer = layers[i];
    if (!layer.enabled) continue;

    let rawSpheres;

    if (layer.isMerged) {
      if (layer.isParent && _mergedSpheres.length > 0) {
        const transformedMerged = applyMergedTransform(_mergedSpheres);
        parentSpheres = [...parentSpheres, ...transformedMerged];
      }
      prevWasParent = layer.isParent;
      continue;
    }

    const prevLayer = layers[i - 1];
    const hasCustomParentMesh = prevLayer && prevLayer.parentMeshFileName && _parentMeshPoints.length > 0;
    const hasParentSpheres = parentSpheres.length > 0;
    const isItselfAParentMeshCarrier = layer.parentMeshFileName && _parentMeshPoints.length > 0;

    // If this layer is a parent mesh carrier, skip sphere generation and store mesh points as parentSpheres
    if (isItselfAParentMeshCarrier) {
      rawSpheres = [];
      // _parentMeshPoints are already transformed by updateParentMeshTransform
      parentSpheres = [..._parentMeshPoints];
    } else if (prevWasParent && (hasCustomParentMesh || hasParentSpheres) && generatorSupportsParent(layer.archetype)) {
      const generator = getArchetypeGenerator(layer.archetype);
      if (hasCustomParentMesh) {
        // _parentMeshPoints are already transformed
        rawSpheres = generator(layer, _parentMeshPoints);
      } else {
        rawSpheres = generator(layer, parentSpheres);
      }
    } else {
      const generator = getArchetypeGenerator(layer.archetype);
      rawSpheres = generator(layer);
    }

    prevWasParent = layer.isParent;
    parentSpheres = [...parentSpheres, ...rawSpheres];

    let minY = Infinity, maxY = -Infinity;
    for (const s of rawSpheres) {
      if (s.y - s.radius < minY) minY = s.y - s.radius;
      if (s.y + s.radius > maxY) maxY = s.y + s.radius;
    }

    const layerHeight = maxY - minY;
    const gap = 2;
    const yOffset = layer.yOffset !== undefined ? layer.yOffset : cumulativeY - minY + gap;

    const condensationLevel = layer.condensationLevel;
    const hasCondensation = condensationLevel !== undefined && condensationLevel !== -999;

    for (const s of rawSpheres) {
      s.y += yOffset;
      s.layerIndex = i;
      if (hasCondensation && s.y - s.radius < condensationLevel) {
        s.cutByCondensation = true;
      } else {
        s.cutByCondensation = false;
      }
    }

    cumulativeY = yOffset + maxY + gap;
    allSpheres.push(...rawSpheres);
  }

  return allSpheres.filter(s => !s.cutByCondensation);
};

// ============================================================
// LAYER CONFIG BUILDER тАФ backward compatibility

    }

// ============================================================
// THREE.JS SCENE
// ============================================================

let scene, camera, renderer;
let cloudMeshes = [];
let currentSpheres = [];
let _isRemeshed = false;
let _remeshedGeometry = null;
let _visibleSpheres = [];

// MERGE state - объединённый слой (frozen)
let _isMerged = false;
let _mergedSpheres = []; // сферы до transform
let _mergedLayerData = null; // сохранённые данные для unmerge

// CUSTOM PARENT MESH state
let _parentMeshObject = null; // THREE.Mesh загруженный для parent mode
let _parentMeshPointsRaw = []; // оригинальные семплированные точки (не трансформированные)
let _parentMeshPoints = []; // трансформированные точки для использования
let _parentMeshFileName = ''; // имя файла для отображения
let _parentMeshTransform = {
  offsetX: 0, offsetY: 0, offsetZ: 0,
  sizeX: 1.0, sizeY: 1.0, sizeZ: 1.0,
  rotationX: 0, rotationY: 0, rotationZ: 0
};

function performMerge() {
  if (currentSpheres.length === 0) {
    alert('Generate clouds first');
    return;
  }

  const previousLayerData = _isMerged ? _mergedLayerData : null;
  const newLayersBeforeMerge = _isMerged ? window._advancedLayers.filter(l => !l.isMerged) : null;

  const visibleSpheres = currentSpheres
    .filter(s => {
      if (s._isNewLayer) {
        const newLayerIdx = s.layerIndex - 1;
        const layer = newLayersBeforeMerge && newLayersBeforeMerge[newLayerIdx]
          ? newLayersBeforeMerge[newLayerIdx]
          : window._advancedLayers[s.layerIndex];
        if (!layer || layer.isMerged) return false;
        if (layer.visible === false) return false;
        return true;
      } else if (_isMerged && previousLayerData) {
        const originalIdx = s._originalLayerIndex !== undefined ? s._originalLayerIndex : s.layerIndex;
        const layer = previousLayerData[originalIdx];
        if (!layer) return false;
        if (layer.isMerged) return false;
        if (layer.visible === false) return false;
        return true;
      } else {
        const layer = window._advancedLayers[s.layerIndex];
        if (!layer) return false;
        if (layer.isMerged) return false;
        if (layer.visible === false) return false;
        return true;
      }
    })
    .map(s => ({
      ...s,
      _originalLayerIndex: s._originalLayerIndex !== undefined ? s._originalLayerIndex : s.layerIndex
    }));

  if (visibleSpheres.length === 0) {
    alert('No visible layers to merge');
    return;
  }

  _mergedSpheres = visibleSpheres;
  _mergedLayerData = JSON.parse(JSON.stringify(window._advancedLayers));

  window._advancedLayers = [{
    name: 'Merged Layer',
    isMerged: true,
    enabled: true,
    visible: true,
    offsetX: 0,
    offsetY: 0,
    offsetZ: 0,
    sizeX: 1.0,
    sizeY: 1.0,
    sizeZ: 1.0,
    rotationX: 0,
    rotationY: 0,
    rotationZ: 0
  }];

  _isMerged = true;
  _isRemeshed = false;

  renderLayerList();
  rebuildMesh();

  document.getElementById('stats').textContent = `${_mergedSpheres.length} spheres (merged)`;
}

function applyMergedTransform(spheres) {
  if (!_isMerged || !spheres || spheres.length === 0) return spheres;

const layer = window._advancedLayers[0];
  if (!layer || !layer.isMerged) return spheres;

  return spheres.map(s => {
    // Apply scale
    let x = s.x * (layer.sizeX || 1);
    let y = s.y * (layer.sizeY || 1);
    let z = s.z * (layer.sizeZ || 1);

    // Apply rotation (simple Euler, Z->Y->X order)
    const rx = (layer.rotationX || 0) * Math.PI / 180;
    const ry = (layer.rotationY || 0) * Math.PI / 180;
    const rz = (layer.rotationZ || 0) * Math.PI / 180;

    // Rotate around Z
    const cosZ = Math.cos(rz), sinZ = Math.sin(rz);
    let x2 = x * cosZ - y * sinZ;
    let y2 = x * sinZ + y * cosZ;
    let z2 = z;

    // Rotate around Y
    const cosY = Math.cos(ry), sinY = Math.sin(ry);
    let x3 = x2 * cosY + z2 * sinY;
    let y3 = y2;
    let z3 = -x2 * sinY + z2 * cosY;

    // Rotate around X
    const cosX = Math.cos(rx), sinX = Math.sin(rx);
    let x4 = x3;
    let y4 = y3 * cosX - z3 * sinX;
    let z4 = y3 * sinX + z3 * cosX;

    return {
      ...s,
      x: x4 + (layer.offsetX || 0),
      y: y4 + (layer.offsetY || 0),
      z: z4 + (layer.offsetZ || 0)
    };
  });
}

// ============================================================
// CUSTOM PARENT MESH - Load external mesh as parent surface
// ============================================================

function loadParentMesh() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.obj';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (event) => {
      const contents = event.target.result;

      // Remove old parent mesh if exists
      if (_parentMeshObject) {
        scene.remove(_parentMeshObject);
        _parentMeshObject = null;
      }

      // Parse OBJ manually (simple parser for vertices and faces)
      const vertices = [];
      const indices = [];
      const lines = contents.split('\n');

      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('v ')) {
          const parts = trimmed.split(/\s+/);
          vertices.push({
            x: parseFloat(parts[1]),
            y: parseFloat(parts[2]),
            z: parseFloat(parts[3])
          });
        } else if (trimmed.startsWith('f ')) {
          const parts = trimmed.split(/\s+/);
          // OBJ faces can be v/vt/vn or just v
          const faceIndices = [];
          for (let i = 1; i < parts.length; i++) {
            const idx = parseInt(parts[i].split('/')[0]) - 1;
            if (idx >= 0) faceIndices.push(idx);
          }
          // Triangulate (assuming convex polygons)
          for (let i = 1; i < faceIndices.length - 1; i++) {
            indices.push(faceIndices[0], faceIndices[i], faceIndices[i + 1]);
          }
        }
      }

      if (vertices.length === 0) {
        alert('No vertices found in OBJ file');
        return;
      }

      // Create Three.js geometry
      const geometry = new THREE.BufferGeometry();
      const positionArray = new Float32Array(vertices.length * 3);
      for (let i = 0; i < vertices.length; i++) {
        positionArray[i * 3] = vertices[i].x;
        positionArray[i * 3 + 1] = vertices[i].y;
        positionArray[i * 3 + 2] = vertices[i].z;
      }
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positionArray, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();

      // Create mesh for rendering
      const material = new THREE.MeshLambertMaterial({
        color: 0x8866aa,
        transparent: true,
        opacity: 0.4,
        wireframe: false,
        side: THREE.DoubleSide
      });
      _parentMeshObject = new THREE.Mesh(geometry, material);
      _parentMeshObject.visible = true; // starts visible
      scene.add(_parentMeshObject);

      // Sample surface points using Monte Carlo on triangles
      _parentMeshPointsRaw = sampleMeshSurface(vertices, indices, 2000);
      _parentMeshPoints = [..._parentMeshPointsRaw]; // copy for transformation
      _parentMeshFileName = file.name;

      // Reset transform
      _parentMeshTransform = {
        offsetX: 0, offsetY: 0, offsetZ: 0,
        sizeX: 1.0, sizeY: 1.0, sizeZ: 1.0,
        rotationX: 0, rotationY: 0, rotationZ: 0
      };

      // Create layer if none exist, or mark existing as parent
      if (window._advancedLayers.length === 0) {
        // Create a new layer for the parent mesh
        const newLayer = getDefaultLayer('sphere');
        newLayer.isParent = true;
        newLayer.parentMeshFileName = file.name;
        newLayer.enabled = true;
        newLayer.visible = true;
        window._advancedLayers = [newLayer];
        saveHistory();
        renderLayerList();
        generate();
      } else {
        // Mark existing layer as parent
        const targetIdx = window._advancedLayers.findIndex(l => !l.isMerged);
        if (targetIdx >= 0) {
          saveHistory();
          window._advancedLayers[targetIdx].isParent = true;
          window._advancedLayers[targetIdx].parentMeshFileName = file.name;
          renderLayerList();
          generate();
        }
      }

      // Show parent mesh section
      document.getElementById('parent-mesh-section').style.display = 'block';
      document.getElementById('parent-mesh-name').textContent = file.name;

      // Reset transform inputs
      document.getElementById('pm-offset-x').value = 0;
      document.getElementById('pm-offset-y').value = 0;
      document.getElementById('pm-offset-z').value = 0;
      document.getElementById('pm-size-x').value = 1;
      document.getElementById('pm-size-y').value = 1;
      document.getElementById('pm-size-z').value = 1;
      document.getElementById('pm-rot-x').value = 0;
      document.getElementById('pm-rot-y').value = 0;
      document.getElementById('pm-rot-z').value = 0;

      alert(`Loaded parent mesh: ${file.name}\n${vertices.length} vertices, ${indices.length / 3} triangles\n${_parentMeshPoints.length} surface points sampled`);
    };
    reader.readAsText(file);
  };
  input.click();
}

function sampleMeshSurface(vertices, indices, numPoints) {
  const points = [];

  // Group vertices by triangle
  const triangles = [];
  for (let i = 0; i < indices.length; i += 3) {
    const i0 = indices[i];
    const i1 = indices[i + 1];
    const i2 = indices[i + 2];
    const v0 = vertices[i0];
    const v1 = vertices[i1];
    const v2 = vertices[i2];
    // Calculate triangle area using cross product
    const ax = v1.x - v0.x, ay = v1.y - v0.y, az = v1.z - v0.z;
    const bx = v2.x - v0.x, by = v2.y - v0.y, bz = v2.z - v0.z;
    const cx = ay * bz - az * by;
    const cy = az * bx - ax * bz;
    const cz = ax * by - ay * bx;
    const area = Math.sqrt(cx * cx + cy * cy + cz * cz) * 0.5;
    if (area > 0.001) { // filter degenerate triangles
      triangles.push({ v0, v1, v2, area });
    }
  }

  if (triangles.length === 0) return points;

  // Calculate total area for weighted random selection
  let totalArea = 0;
  for (const tri of triangles) {
    totalArea += tri.area;
  }

  // Monte Carlo sampling
  for (let i = 0; i < numPoints; i++) {
    // Weighted random triangle selection
    let r = Math.random() * totalArea;
    let tri = triangles[0];
    for (const t of triangles) {
      r -= t.area;
      if (r <= 0) {
        tri = t;
        break;
      }
    }

    // Barycentric coordinates
    const u = Math.random();
    const v = Math.random();
    const w = 1 - u - v;
    const sqrtW = Math.sqrt(w);

    // Use sqrt for uniform distribution on triangle surface
    const a = 1 - Math.sqrt(u);
    const b = Math.sqrt(u) * (1 - v);
    const c = Math.sqrt(u) * v;

    points.push({
      x: tri.v0.x * a + tri.v1.x * b + tri.v2.x * c,
      y: tri.v0.y * a + tri.v1.y * b + tri.v2.y * c,
      z: tri.v0.z * a + tri.v1.z * b + tri.v2.z * c,
      radius: 1.0 // placeholder, will be scaled during generation
    });
  }

  return points;
}

function applyParentMeshTransform(point) {
  let x = point.x * _parentMeshTransform.sizeX;
  let y = point.y * _parentMeshTransform.sizeY;
  let z = point.z * _parentMeshTransform.sizeZ;

  const rx = (_parentMeshTransform.rotationX || 0) * Math.PI / 180;
  const ry = (_parentMeshTransform.rotationY || 0) * Math.PI / 180;
  const rz = (_parentMeshTransform.rotationZ || 0) * Math.PI / 180;

  const cosZ = Math.cos(rz), sinZ = Math.sin(rz);
  let x2 = x * cosZ - y * sinZ;
  let y2 = x * sinZ + y * cosZ;
  let z2 = z;

  const cosY = Math.cos(ry), sinY = Math.sin(ry);
  let x3 = x2 * cosY + z2 * sinY;
  let y3 = y2;
  let z3 = -x2 * sinY + z2 * cosY;

  const cosX = Math.cos(rx), sinX = Math.sin(rx);
  let x4 = x3;
  let y4 = y3 * cosX - z3 * sinX;
  let z4 = y3 * sinX + z3 * cosX;

  return {
    x: x4 + _parentMeshTransform.offsetX,
    y: y4 + _parentMeshTransform.offsetY,
    z: z4 + _parentMeshTransform.offsetZ,
    radius: point.radius * ((_parentMeshTransform.sizeX + _parentMeshTransform.sizeY + _parentMeshTransform.sizeZ) / 3)
  };
}

function updateParentMeshTransform(field, value) {
  _parentMeshTransform[field] = parseFloat(value);

  if (_parentMeshObject) {
    _parentMeshObject.position.set(_parentMeshTransform.offsetX, _parentMeshTransform.offsetY, _parentMeshTransform.offsetZ);
    _parentMeshObject.scale.set(_parentMeshTransform.sizeX, _parentMeshTransform.sizeY, _parentMeshTransform.sizeZ);
    _parentMeshObject.rotation.set(
      _parentMeshTransform.rotationX * Math.PI / 180,
      _parentMeshTransform.rotationY * Math.PI / 180,
      _parentMeshTransform.rotationZ * Math.PI / 180
    );
  }

  // Re-calculate transformed points from original raw points
  if (_parentMeshPointsRaw.length > 0) {
    _parentMeshPoints = _parentMeshPointsRaw.map(p => applyParentMeshTransform(p));
  }

  renderLayerList();
  generate();
}

function updateMergedLayerField(field, value) {
  if (!_isMerged) return;

  saveHistory();
  const layer = window._advancedLayers[0];
  layer[field] = parseFloat(value);

  // Применяем transform и рендерим
  const transformed = applyMergedTransform(_mergedSpheres);

  // Пересоздаём geometry с transformed positions
  const positions = [];
  const colors = [];
  const indices = [];

  transformed.forEach((s, idx) => {
    const latSegments = 16;
    const lonSegments = 16;

    const d = Math.min(Math.max(s.density, 0), 1);
    const r = 0.2 + d * 0.6;
    const g = 0.4 + d * 0.4;
    const b = 1.0;

    const baseVertex = positions.length / 3;

    for (let lat = 0; lat <= latSegments; lat++) {
      const theta = (lat * Math.PI) / latSegments;
      const sinTheta = Math.sin(theta);
      const cosTheta = Math.cos(theta);

      for (let lon = 0; lon <= lonSegments; lon++) {
        const phi = (lon * 2 * Math.PI) / lonSegments;
        const x = s.x + s.radius * sinTheta * Math.cos(phi);
        const y = s.y + s.radius * cosTheta;
        const z = s.z + s.radius * sinTheta * Math.sin(phi);
        positions.push(x, y, z);
        colors.push(r, g, b);
      }
    }

    for (let lat = 0; lat < latSegments; lat++) {
      for (let lon = 0; lon < lonSegments; lon++) {
        const p1 = baseVertex + lat * (lonSegments + 1) + lon;
        const p2 = p1 + lonSegments + 1;
        const p3 = p2 + 1;
        const p4 = p1 + 1;
        indices.push(p1, p2, p3);
        indices.push(p1, p3, p4);
      }
    }
  });

  const mergedGeometry = new THREE.BufferGeometry();
  mergedGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  mergedGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  mergedGeometry.setIndex(indices);
  mergedGeometry.computeVertexNormals();

  // Обновляем рендеринг
  const material = new THREE.MeshLambertMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.85,
    side: THREE.DoubleSide
  });

  cloudMeshes.forEach(m => scene.remove(m));
  cloudMeshes = [];
  const mesh = new THREE.Mesh(mergedGeometry, material);
  scene.add(mesh);
  cloudMeshes.push(mesh);

  document.getElementById('stats').textContent = `${_mergedSpheres.length} spheres (merged)`;
}

function init() {

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);
  
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(50, 100, 50);
  scene.add(dirLight);

function setupControls() {
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let theta = Math.PI / 4;
  let phi = Math.PI / 4;
  let radius = 150;
  const target = new THREE.Vector3(0, 0, 0);
  
  const canvas = renderer.domElement;
  
  const updateCamera = () => {
    camera.position.x = target.x + radius * Math.sin(phi) * Math.cos(theta);
    camera.position.y = target.y + radius * Math.cos(phi);
    camera.position.z = target.z + radius * Math.sin(phi) * Math.sin(theta);
    camera.lookAt(target);
  };
  
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    prevX = e.clientX;
    prevY = e.clientY;
    canvas.style.cursor = 'grabbing';
  });
  
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevX;
    const dy = e.clientY - prevY;
    theta -= dx * 0.01;
    phi -= dy * 0.01;
    phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
    prevX = e.clientX;
    prevY = e.clientY;
    updateCamera();
  });
  
  canvas.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  canvas.addEventListener('mouseleave', () => {
    isDragging = false;
    canvas.style.cursor = 'grab';
  });
  
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    radius += e.deltaY * 0.5;
    radius = Math.max(30, Math.min(500, radius));
    updateCamera();
  }, { passive: false });

  let touchPrevDist = 0;
  let isPinching = false;
  let pinchOccurred = false;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      isPinching = false;
      pinchOccurred = false;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      isPinching = true;
      pinchOccurred = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchPrevDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && !isPinching) {
      const dx = e.touches[0].clientX - prevX;
      const dy = e.touches[0].clientY - prevY;
      theta -= dx * 0.01;
      phi -= dy * 0.01;
      phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
      updateCamera();
    } else if (e.touches.length === 2) {
      if (!isPinching) {
        isPinching = true;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchPrevDist = Math.sqrt(dx * dx + dy * dy);
      }
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const delta = dist - touchPrevDist;
      radius += delta * 0.8;
      radius = Math.max(30, Math.min(500, radius));
      touchPrevDist = dist;
      if (Math.abs(delta) > 1) pinchOccurred = true;
      updateCamera();
    }
  }, { passive: false });

  let lastTap = 0;
  canvas.addEventListener('touchend', e => {
    if (isPinching && e.touches.length === 1) {
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    }
    isPinching = false;

    if (e.touches.length === 0 && !pinchOccurred) {
      const now = Date.now();
      if (now - lastTap < 300) {
        theta = Math.PI / 4;
        phi = Math.PI / 4;
        radius = 150;
        updateCamera();
      }
      lastTap = now;
    }
  }, { passive: false });

  canvas.style.cursor = 'grab';
  updateCamera();

  window._orbitUpdate = updateCamera;
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function generate() {
  try {
    let layers = resolveLayers();

    const hasParentMerged = _isMerged && window._advancedLayers.some(l => l.isMerged && l.isParent);
    if (_isMerged && !hasParentMerged) {
      layers = layers.filter(l => !l.isMerged);
    }

    if (layers.length === 0) {
      return;
    }

    const randomSeed = Math.floor(Math.random() * 999999);
    const epoch = Math.floor(Math.random() * 99999999);
    for (const layer of layers) {
      layer.seed = randomSeed;
      layer.noiseSalt = randomSeed * 1000000 + epoch;
    }

    const newSpheres = generateCloud(layers);

    if (_isMerged && !hasParentMerged) {
      newSpheres.forEach(s => {
        if (s.layerIndex !== undefined) {
          s.layerIndex += 1;
        }
      });
    }

    if (_isMerged && _mergedSpheres.length > 0) {
      currentSpheres = [..._mergedSpheres, ...newSpheres.map(s => ({ ...s, _isNewLayer: true }))];
    } else {
      currentSpheres = newSpheres;
    }

    _isRemeshed = false;
    _remeshedGeometry = null;
    _visibleSpheres = [];
    document.getElementById('stats').textContent = `${currentSpheres.length} spheres (${layers.length + (_isMerged ? 1 : 0)} layer${layers.length + (_isMerged ? 1 : 0) !== 1 ? 's' : ''})`;
    rebuildMesh();
  } catch (e) {
    console.error('Generate error:', e);
    alert('Generate error: ' + e.message);
  }
}

function rebuildMesh() {
  cloudMeshes.forEach(m => scene.remove(m));
  cloudMeshes = [];

  if (_isRemeshed && _remeshedGeometry) {
    _rebuildRemeshedMesh();
    return;
  }

  const visibleSpheres = getVisibleSpheresForRender();

  const geometry = new THREE.SphereGeometry(1, 12, 8);

  visibleSpheres.forEach(s => {
    const d = Math.min(Math.max(s.density, 0), 1);
    const r = 0.2 + d * 0.6;
    const g = 0.4 + d * 0.4;
    const b = 1.0;
    const color = new THREE.Color(r, g, b);

    const material = new THREE.MeshLambertMaterial({
      color,
      transparent: true,
      opacity: 0.3 + d * 0.5,
      depthWrite: false
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(s.x, s.y, s.z);
    mesh.scale.setScalar(s.radius);
    scene.add(mesh);
    cloudMeshes.push(mesh);
  });
}

function getVisibleSpheresForRender() {
  if (_isMerged && _mergedSpheres.length > 0) {
    const mergedLayer = window._advancedLayers[0];
    const mergedVisible = mergedLayer && mergedLayer.visible !== false;

    const newLayerSpheres = currentSpheres.filter(s => s._isNewLayer);
    const newLayerVisible = newLayerSpheres.filter(s => {
      const layerIdx = s.layerIndex;
      const layer = layerIdx < window._advancedLayers.length ? window._advancedLayers[layerIdx] : null;
      return layer && layer.visible !== false;
    });

    if (!mergedVisible) {
      return newLayerVisible;
    }

    const transformedMerged = applyMergedTransform(_mergedSpheres);
    return [...transformedMerged, ...newLayerVisible];
  }

  return currentSpheres.filter(s => {
    const layerConfig = s._originalLayerIndex !== undefined && _mergedLayerData
      ? _mergedLayerData[s._originalLayerIndex]
      : window._advancedLayers[s.layerIndex];
    if (!layerConfig) return false;
    if (layerConfig.visible === false) return false;
    if (layerConfig.isMerged) return false;
    return true;
  });
}

function _rebuildRemeshedMesh() {
  const material = new THREE.MeshLambertMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.85,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(_remeshedGeometry, material);
  scene.add(mesh);
  cloudMeshes.push(mesh);
}

function isSphereFullyInternal(sphere, allSpheres, epsilon = 0.1) {
  for (let i = 0; i < allSpheres.length; i++) {
    const other = allSpheres[i];
    if (other === sphere) continue;

    const dx = sphere.x - other.x;
    const dy = sphere.y - other.y;
    const dz = sphere.z - other.z;
    const distSq = dx * dx + dy * dy + dz * dz;
    const dist = Math.sqrt(distSq);

    if (dist + sphere.radius <= other.radius + epsilon) {
      return true;
    }
  }
  return false;
}

function getVisibleSpheres(allSpheres) {
  return allSpheres.filter(s => !isSphereFullyInternal(s, allSpheres));
}

function computeCloudDensity(x, y, z, spheres) {
  let maxDensity = 0;
  for (let i = 0; i < spheres.length; i++) {
    const s = spheres[i];
    const dx = x - s.x;
    const dy = y - s.y;
    const dz = z - s.z;
    const distSq = dx * dx + dy * dy + dz * dz;
    const dist = Math.sqrt(distSq);
    if (dist < s.radius) {
      const localDensity = 1.0 - (dist / s.radius);
      if (localDensity > maxDensity) maxDensity = localDensity;
    }
  }
  return maxDensity;
}

function getVisibleSpheresForExport() {
  if (_isMerged && _mergedSpheres.length > 0) {
    const mergedLayer = window._advancedLayers[0];
    if (!mergedLayer || mergedLayer.visible === false) {
      return [];
    }
    return applyMergedTransform(_mergedSpheres);
  }

  return currentSpheres.filter(s => {
    const layerConfig = s._originalLayerIndex !== undefined && _mergedLayerData
      ? _mergedLayerData[s._originalLayerIndex]
      : window._advancedLayers[s.layerIndex];
    if (!layerConfig) return false;
    if (layerConfig.visible === false) return false;
    if (layerConfig.isMerged) return false;
    return true;
  });
}

function performRemesh(segments = 16) {
  if (currentSpheres.length === 0) {
    alert('Generate clouds first');
    return;
  }

  const startTime = performance.now();

  let spheresToRemesh = [];

  if (_isMerged && _mergedSpheres.length > 0) {
    const mergedLayer = window._advancedLayers[0];
    if (mergedLayer && mergedLayer.visible !== false) {
      const transformedMerged = applyMergedTransform(_mergedSpheres);
      transformedMerged.forEach(s => { s._isMergedSphere = true; });
      spheresToRemesh = [...spheresToRemesh, ...transformedMerged];
    }
    const editableSpheres = currentSpheres.filter(s =>
      !_mergedSpheres.some(ms =>
        ms.x === s.x && ms.y === s.y && ms.z === s.z && ms.radius === s.radius
      )
    );
    spheresToRemesh = [...spheresToRemesh, ...editableSpheres];
  } else {
    spheresToRemesh = [...currentSpheres];
  }

  spheresToRemesh = spheresToRemesh.filter(s => {
    if (s._isMergedSphere) {
      return true;
    }
    const layerConfig = s._originalLayerIndex !== undefined && _mergedLayerData
      ? _mergedLayerData[s._originalLayerIndex]
      : window._advancedLayers[s.layerIndex];
    if (!layerConfig) return false;
    if (layerConfig.visible === false) return false;
    return true;
  });

  const visibleSpheres = getVisibleSpheres(spheresToRemesh);

  const positions = [];
  const colors = [];
  const indices = [];

  visibleSpheres.forEach(s => {
    const latSegments = segments;
    const lonSegments = segments;

    const d = Math.min(Math.max(s.density, 0), 1);
    const r = 0.2 + d * 0.6;
    const g = 0.4 + d * 0.4;
    const b = 1.0;

    const baseVertex = positions.length / 3;

    for (let lat = 0; lat <= latSegments; lat++) {
      const theta = (lat * Math.PI) / latSegments;
      const sinTheta = Math.sin(theta);
      const cosTheta = Math.cos(theta);

      for (let lon = 0; lon <= lonSegments; lon++) {
        const phi = (lon * 2 * Math.PI) / lonSegments;
        const x = s.x + s.radius * sinTheta * Math.cos(phi);
        const y = s.y + s.radius * cosTheta;
        const z = s.z + s.radius * sinTheta * Math.sin(phi);
        positions.push(x, y, z);
        colors.push(r, g, b);
      }
    }

    for (let lat = 0; lat < latSegments; lat++) {
      for (let lon = 0; lon < lonSegments; lon++) {
        const p1 = baseVertex + lat * (lonSegments + 1) + lon;
        const p2 = p1 + lonSegments + 1;
        const p3 = p2 + 1;
        const p4 = p1 + 1;
        indices.push(p1, p2, p3);
        indices.push(p1, p3, p4);
      }
    }
  });

  _remeshedGeometry = new THREE.BufferGeometry();
  _remeshedGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  _remeshedGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  _remeshedGeometry.setIndex(indices);
  _remeshedGeometry.computeVertexNormals();

  _isRemeshed = true;
  _visibleSpheres = visibleSpheres;

  rebuildMesh();

  const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
  document.getElementById('stats').textContent = `${visibleSpheres.length} spheres (${indices.length / 3} tris) remeshed in ${elapsed}s`;
}

function exportCode() {
  const layers = resolveLayers();
  
  let code = `// CloudMath v5.7 тАФ Multi-layer export
// ${currentSpheres.length} spheres, ${layers.length} layer(s)

List<CloudLayerConfig> layers = new List<CloudLayerConfig> {
`;

  layers.forEach((layer, i) => {
    code += `    new CloudLayerConfig {\n`;
    code += `        Archetype = CloudArchetype.${layer.archetype.charAt(0).toUpperCase() + layer.archetype.slice(1)},\n`;
    code += `        YOffset = ${layer.yOffset}f,\n`;
    code += `        Seed = ${layer.seed},\n`;
    code += `        Density = ${layer.density}f,\n`;
    code += `        Jitter = ${layer.jitter}f,\n`;
    code += `        Clustering = ${layer.clustering}f,\n`;
    
    if (layer.archetype === 'sphere') {
      code += `        CloudSize = ${layer.cloudSize}f,\n`;
      code += `        CascadeDepth = ${layer.cascadeDepth},\n`;
      code += `        BumpsPerLevel = ${layer.bumpsPerLevel},\n`;
      code += `        ChildRatio = ${layer.childRatio}f,\n`;
      code += `        SizeVariation = ${layer.sizeVariation}f,\n`;
      code += `        ParentCount = ${layer.parentCount},\n`;
      code += `        EllipsoidY = ${layer.ellipsoidY}f,\n`;
      code += `        EllipsoidXZ = ${layer.ellipsoidXZ}f,\n`;
    } else if (layer.archetype === 'column') {
      const p = layer.columnParams;
      code += `        ColumnParams = new ColumnParams {\n`;
      code += `            Height = ${p.height}f, BaseRadius = ${p.baseRadius}f,\n`;
      code += `            TopRadius = ${p.topRadius}f, Floors = ${p.floors},\n`;
      code += `            RingsPerFloor = ${p.ringsPerFloor}, Wobble = ${p.wobble}f\n`;
      code += `        },\n`;
    } else if (layer.archetype === 'platform') {
      const p = layer.platformParams;
      code += `        PlatformParams = new PlatformParams {\n`;
      code += `            Width = ${p.width}f, Depth = ${p.depth}f,\n`;
      code += `            CenterThickness = ${p.centerThickness}f, InteriorDensity = ${p.interiorDensity}\n`;
      code += `        },\n`;
    } else if (layer.archetype === 'tree') {
      const p = layer.treeParams;
      code += `        TreeParams = new TreeParams {\n`;
      code += `            MaxDepth = ${p.maxDepth}, BranchElongation = ${p.branchElongation}f,\n`;
      code += `            BranchAngle = ${p.branchAngle}f, BranchProbability = ${p.branchProbability}f,\n`;
      code += `            TrunkUpBias = ${p.trunkUpBias}f\n`;
      code += `        },\n`;
    }
    
    code += `    },\n`;
  });

  code += `};

var spheres = CloudGenerator.Generate(layers);\n`;

  const blob = new Blob([code], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'CloudMath_Export.cs';
  a.click();
}

window._advancedLayers = [];
window._history = [];
window._historyIndex = -1;
const MAX_HISTORY = 20;

function saveHistory() {
  const snapshot = JSON.parse(JSON.stringify(window._advancedLayers));
  window._history = window._history.slice(0, window._historyIndex + 1);
  window._history.push(snapshot);
  if (window._history.length > MAX_HISTORY) {
    window._history.shift();
  }
  window._historyIndex = window._history.length - 1;
  updateUndoRedoButtons();
}

function undo() {
  if (window._historyIndex > 0) {
    window._historyIndex--;
    window._advancedLayers = JSON.parse(JSON.stringify(window._history[window._historyIndex]));
    renderLayerList();
    generate();
    updateUndoRedoButtons();
  }
}

function redo() {
  if (window._historyIndex < window._history.length - 1) {
    window._historyIndex++;
    window._advancedLayers = JSON.parse(JSON.stringify(window._history[window._historyIndex]));
    renderLayerList();
    generate();
    updateUndoRedoButtons();
  }
}

function updateUndoRedoButtons() {
  const undoBtn = document.getElementById('undo-btn');
  const redoBtn = document.getElementById('redo-btn');
  const historyInfo = document.getElementById('history-info');
  if (undoBtn) undoBtn.disabled = window._historyIndex <= 0;
  if (redoBtn) redoBtn.disabled = window._historyIndex >= window._history.length - 1;
  if (historyInfo) {
    if (window._history.length > 0) {
      historyInfo.textContent = `${window._historyIndex + 1}/${window._history.length}`;
    } else {
      historyInfo.textContent = '';
    }
  }
}

function getDefaultLayer(archetype) {

    jitter: 0.3,
    clustering: 0.5,
    sizeRange: { min: 5, max: 20 },
    condensationLevel: -999,
    positionVariation: 0.5,
    noiseSalt: 0
  };

  if (archetype === 'column') {
    base.sizeRange = { min: 3, max: 10 };
    base.columnParams = {
      height: 40,
      baseRadius: 8,
      topRadius: 3,
      floors: 12,
      ringsPerFloor: 8,
      wobble: 0.3
    };
  } else if (archetype === 'platform') {
    base.sizeRange = { min: 3, max: 10 };
    base.platformParams = {
      width: 50,
      depth: 50,
      centerThickness: 5,
      edgeThickness: 1,
      interiorDensity: 120,
      edgeRings: 4
    };
  } else if (archetype === 'tree') {
    base.sizeRange = { min: 3, max: 10 };
    base.treeParams = {
      baseRadius: 8,
      maxDepth: 5,
      branchElongation: 1.8,
      taperRatio: 0.8,
      branchAngle: 40,
      branchProbability: 0.5,
      trunkUpBias: 0.4,
      lengthFalloff: 0.75,
      thicknessFalloff: 0.85
    };
  } else {

    base.childRatio = 30;
    base.sizeVariation = 0.5;
    base.parentCount = 1;
    base.ellipsoidY = 50;
    base.ellipsoidXZ = 100;
  }

  return base;
}

function cloneLayer(index) {

  if (item) item.classList.add('expanded');

function setParentLayer() {
  const mergedLayer = window._advancedLayers.find(l => l.isMerged);
  const hasRegularLayers = window._advancedLayers.some(l => !l.isMerged);

  if (mergedLayer && !hasRegularLayers) {
    saveHistory();
    mergedLayer.isParent = !mergedLayer.isParent;
    renderLayerList();
    generate();
    return;
  }

  const layers = window._advancedLayers;
  if (layers.length === 0) {
    alert('No layers to set as parent');
    return;
  }

  if (layers.length === 1) {
    saveHistory();
    // Don't toggle OFF if this layer has a custom parent mesh loaded
    if (layers[0].isParent && layers[0].parentMeshFileName) {
      // Keep parent mode ON, just regenerate
    } else {
      layers[0].isParent = !layers[0].isParent;
    }
    renderLayerList();
    generate();
    return;
  }

  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  `;
  modal.onclick = (e) => { if (e.target === modal) document.body.removeChild(modal); };

  const dialog = document.createElement('div');
  dialog.style.cssText = `
    background: #12121a; border: 1px solid #1e1e2e;
    border-radius: 12px; padding: 24px; min-width: 300px;
    color: #c8c8d4; font-family: 'Inter', sans-serif;
  `;

  dialog.innerHTML = `
    <h2 style="color: #f87171; margin: 0 0 16px 0; font-size: 14px;">Select Parent Layer</h2>
    <div id="parent-layer-list" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px;"></div>
    <button onclick="this.parentElement.parentElement.remove()" style="width: 100%; padding: 8px;
           background: #333; color: #888; border: none; border-radius: 6px; cursor: pointer;">
      Cancel
    </button>
  `;

  modal.appendChild(dialog);
  document.body.appendChild(modal);

  const list = document.getElementById('parent-layer-list');
  layers.forEach((layer, idx) => {
    const actualIdx = window._advancedLayers.indexOf(layer);
    const btn = document.createElement('button');
    const isMerged = layer.isMerged;
    const layerType = isMerged ? 'merged' : layer.archetype;
    btn.style.cssText = `
      padding: 10px 12px; background: rgba(248,113,113,0.1); border: 1px solid #f87171;
      color: #f87171; border-radius: 6px; cursor: pointer; text-align: left; font-size: 12px;
    `;
    if (layer.isParent) {
      btn.style.background = 'rgba(248,113,113,0.3)';
      btn.innerHTML = `<span style="color:#f87171;font-weight:bold;">P</span> Layer ${actualIdx} (${layerType}) - Click to remove parent`;
    } else {
      btn.innerHTML = `Layer ${actualIdx} (${layerType}) - Click to set as parent`;
    }
    btn.onclick = () => {
      saveHistory();
      // Don't toggle OFF if this layer has a custom parent mesh loaded
      if (layer.isParent && layer.parentMeshFileName) {
        // Keep parent mode ON
      } else {
        layer.isParent = !layer.isParent;
      }
      document.body.removeChild(modal);
      renderLayerList();
      generate();
    };
    list.appendChild(btn);
  });
}

function toggleLayerVisibility(index) {
  saveHistory();

  if (_isMerged) {
    const mergedLayer = window._advancedLayers[0];
    if (index === 0) {
      mergedLayer.visible = mergedLayer.visible === false ? true : false;
    } else if (index > 0) {
      const layer = window._advancedLayers[index];
      if (layer && !layer.isMerged) {
        layer.visible = layer.visible === false ? true : false;
      }
    }
  } else {
    const layer = window._advancedLayers[index];
    if (layer) {
      layer.visible = layer.visible === false ? true : false;
    }
  }

  renderLayerList();
  rebuildMesh();
  const visibleCount = getVisibleSpheresForRender().length;
  document.getElementById('stats').textContent = `${visibleCount} spheres visible`;
}

  saveHistory();
  const layer = getDefaultLayer(archetype || 'sphere');
  window._advancedLayers.push(layer);
  renderLayerList();
  const idx = window._advancedLayers.length - 1;
  const item = document.getElementById('layer-item-' + idx);

}

  saveHistory();

  if (_isMerged && window._advancedLayers.length === 1 && window._advancedLayers[0].isMerged) {
    unmergeLayers();
    return;
  }

  renderLayerList();

function updateLayerArchetype(index, value) {
  saveHistory();
  const oldLayer = window._advancedLayers[index];
  const newLayer = getDefaultLayer(value);
  newLayer.enabled = oldLayer.enabled;
  newLayer.yOffset = oldLayer.yOffset;
  newLayer.seed = oldLayer.seed;
  newLayer.density = oldLayer.density;
  newLayer.jitter = oldLayer.jitter;
  newLayer.clustering = oldLayer.clustering;
  newLayer.sizeRange = oldLayer.sizeRange;
  newLayer.condensationLevel = oldLayer.condensationLevel;
  window._advancedLayers[index] = newLayer;
  renderLayerList();
  generate();
}

function updateLayerField(index, field, value) {
  saveHistory();
  const layer = window._advancedLayers[index];
  if (field.includes('.')) {
    const parts = field.split('.');
    let obj = layer;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = parseFloat(value);
  } else {
    layer[field] = parseFloat(value);
  }
  generate();
}

function moveLayer(fromIndex, toIndex) {
  if (fromIndex === toIndex) return;
  saveHistory();
  const [moved] = window._advancedLayers.splice(fromIndex, 1);
  window._advancedLayers.splice(toIndex, 0, moved);
  renderLayerList();
  generate();
}
