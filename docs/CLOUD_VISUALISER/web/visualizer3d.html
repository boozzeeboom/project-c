    }

    const item = document.createElement('div');
    item.className = 'layer-item' + (layer.isParent ? ' is-parent' : '');
    item.onclick = function(e) {
        const header = item.querySelector('.layer-header');
        const arrow = item.querySelector('.expand-arrow');
        if (header && (header.contains(e.target) || arrow === e.target)) {
          toggleLayerExpanded(index);
        }
      };
    item.id = 'layer-item-' + index;

    const archetypeNames = { sphere: 'Sphere', column: 'Column', platform: 'Platform', tree: 'Tree' };

    let shapeSection = '';
    let cascadeSection = '';
    let chaosSection = '';
    let archetypeSection = '';

    if (layer.archetype === 'sphere') {
      const countScale = layer.sphereCountScale || 1.0;
      const countScalePct = Math.round((layer.sphereCountScale || 1.0) * 100);
      shapeSection = `
        <div class="section-title">Shape</div>
        <div class="control-group">
          <label>Cloud Size <span class="value">${layer.cloudSize || 80}</span></label>
          <input type="range" min="20" max="200" value="${layer.cloudSize || 80}" onchange="updateLayerField(${index}, 'cloudSize', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Sphere Count <span class="value">${countScalePct}%</span></label>
          <input type="range" min="1" max="400" value="${countScalePct}" onchange="updateLayerField(${index}, 'sphereCountScale', this.value / 100); this.previousElementSibling.querySelector('.value').textContent = this.value + '%'">
        </div>
        <div class="control-group">
          <label>Parent Count <span class="value">${layer.parentCount || 1}</span></label>
          <input type="range" min="1" max="12" value="${layer.parentCount || 1}" onchange="updateLayerField(${index}, 'parentCount', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Ellipsoid Y <span class="value">${((layer.ellipsoidY || 50) / 100).toFixed(2)}</span></label>
          <input type="range" min="20" max="150" value="${layer.ellipsoidY || 50}" onchange="updateLayerField(${index}, 'ellipsoidY', this.value); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
        </div>
        <div class="control-group">
          <label>Ellipsoid XZ <span class="value">${((layer.ellipsoidXZ || 100) / 100).toFixed(2)}</span></label>
          <input type="range" min="50" max="150" value="${layer.ellipsoidXZ || 100}" onchange="updateLayerField(${index}, 'ellipsoidXZ', this.value); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
        </div>
        <div class="control-group">
          <label>Size Min <span class="value">${layer.sizeRange?.min || 5}</span></label>
          <input type="range" min="1" max="30" value="${layer.sizeRange?.min || 5}" onchange="updateLayerField(${index}, 'sizeRange.min', parseInt(this.value)); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Size Max <span class="value">${layer.sizeRange?.max || 20}</span></label>
          <input type="range" min="5" max="60" value="${layer.sizeRange?.max || 20}" onchange="updateLayerField(${index}, 'sizeRange.max', parseInt(this.value)); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
      `;
      cascadeSection = `
        <div class="section-title">Cascade</div>
        <div class="control-group">
          <label>Cascade Depth <span class="value">${layer.cascadeDepth || 3}</span></label>
          <input type="range" min="1" max="5" value="${layer.cascadeDepth || 3}" onchange="updateLayerField(${index}, 'cascadeDepth', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Bumps/Level <span class="value">${layer.bumpsPerLevel || 24}</span></label>
          <input type="range" min="12" max="128" value="${layer.bumpsPerLevel || 24}" onchange="updateLayerField(${index}, 'bumpsPerLevel', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Child Ratio <span class="value">${layer.childRatio || 30}</span></label>
          <input type="range" min="10" max="200" value="${layer.childRatio || 30}" onchange="updateLayerField(${index}, 'childRatio', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Size Variation <span class="value">${(layer.sizeVariation || 1.0).toFixed(2)}</span></label>
          <input type="range" min="0" max="150" value="${(layer.sizeVariation || 1.0) * 100}" onchange="updateLayerField(${index}, 'sizeVariation', this.value / 100); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
        </div>
      `;
    } else if (layer.archetype === 'column') {
      const p = layer.columnParams || {};
      archetypeSection = `
        <div class="section-title">Column</div>
        <div class="control-group">
          <label>Height <span class="value">${p.height || 30}</span></label>
          <input type="range" min="10" max="100" value="${p.height || 30}" onchange="updateLayerField(${index}, 'columnParams.height', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Base Radius <span class="value">${p.baseRadius || 8}</span></label>
          <input type="range" min="3" max="30" value="${p.baseRadius || 8}" onchange="updateLayerField(${index}, 'columnParams.baseRadius', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Top Radius <span class="value">${p.topRadius || 2}</span></label>
          <input type="range" min="0" max="15" value="${p.topRadius || 2}" onchange="updateLayerField(${index}, 'columnParams.topRadius', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Floors <span class="value">${p.floors || 8}</span></label>
          <input type="range" min="3" max="20" value="${p.floors || 8}" onchange="updateLayerField(${index}, 'columnParams.floors', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Rings/Floor <span class="value">${p.ringsPerFloor || 5}</span></label>
          <input type="range" min="3" max="12" value="${p.ringsPerFloor || 5}" onchange="updateLayerField(${index}, 'columnParams.ringsPerFloor', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Size Min <span class="value">${layer.sizeRange?.min || 3}</span></label>
          <input type="range" min="1" max="20" value="${layer.sizeRange?.min || 3}" onchange="updateLayerField(${index}, 'sizeRange.min', parseInt(this.value)); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Size Max <span class="value">${layer.sizeRange?.max || 10}</span></label>
          <input type="range" min="5" max="40" value="${layer.sizeRange?.max || 10}" onchange="updateLayerField(${index}, 'sizeRange.max', parseInt(this.value)); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
      `;
    } else if (layer.archetype === 'platform') {
      const p = layer.platformParams || {};
      archetypeSection = `
        <div class="section-title">Platform</div>
        <div class="control-group">
          <label>Width <span class="value">${p.width || 40}</span></label>
          <input type="range" min="20" max="200" value="${p.width || 40}" onchange="updateLayerField(${index}, 'platformParams.width', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Depth <span class="value">${p.depth || 40}</span></label>
          <input type="range" min="20" max="200" value="${p.depth || 40}" onchange="updateLayerField(${index}, 'platformParams.depth', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Center Thickness <span class="value">${p.centerThickness || 3}</span></label>
          <input type="range" min="1" max="10" value="${p.centerThickness || 3}" onchange="updateLayerField(${index}, 'platformParams.centerThickness', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Interior Density <span class="value">${p.interiorDensity || 40}</span></label>
          <input type="range" min="10" max="100" value="${p.interiorDensity || 40}" onchange="updateLayerField(${index}, 'platformParams.interiorDensity', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Size Min <span class="value">${layer.sizeRange?.min || 3}</span></label>
          <input type="range" min="1" max="20" value="${layer.sizeRange?.min || 3}" onchange="updateLayerField(${index}, 'sizeRange.min', parseInt(this.value)); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Size Max <span class="value">${layer.sizeRange?.max || 10}</span></label>
          <input type="range" min="5" max="40" value="${layer.sizeRange?.max || 10}" onchange="updateLayerField(${index}, 'sizeRange.max', parseInt(this.value)); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
      `;
    } else if (layer.archetype === 'tree') {
      const p = layer.treeParams || {};
      archetypeSection = `
        <div class="section-title">Tree</div>
        <div class="control-group">
          <label>Max Depth <span class="value">${p.maxDepth || 5}</span></label>
          <input type="range" min="2" max="8" value="${p.maxDepth || 5}" onchange="updateLayerField(${index}, 'treeParams.maxDepth', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Branch Elongation <span class="value">${(p.branchElongation || 1.5).toFixed(2)}</span></label>
          <input type="range" min="50" max="300" value="${(p.branchElongation || 1.5) * 100}" onchange="updateLayerField(${index}, 'treeParams.branchElongation', this.value / 100); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
        </div>
        <div class="control-group">
          <label>Branch Angle <span class="value">${p.branchAngle || 35}┬░</span></label>
          <input type="range" min="15" max="60" value="${p.branchAngle || 35}" onchange="updateLayerField(${index}, 'treeParams.branchAngle', this.value); this.previousElementSibling.querySelector('.value').textContent = this.value + '┬░'">
        </div>
        <div class="control-group">
          <label>Branch Probability <span class="value">${(p.branchProbability || 0.4).toFixed(2)}</span></label>
          <input type="range" min="20" max="80" value="${(p.branchProbability || 0.4) * 100}" onchange="updateLayerField(${index}, 'treeParams.branchProbability', this.value / 100); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
        </div>
        <div class="control-group">
          <label>Trunk Up Bias <span class="value">${(p.trunkUpBias || 0.3).toFixed(2)}</span></label>
          <input type="range" min="0" max="100" value="${(p.trunkUpBias || 0.3) * 100}" onchange="updateLayerField(${index}, 'treeParams.trunkUpBias', this.value / 100); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
        </div>
        <div class="control-group">
          <label>Size Min <span class="value">${layer.sizeRange?.min || 3}</span></label>
          <input type="range" min="1" max="20" value="${layer.sizeRange?.min || 3}" onchange="updateLayerField(${index}, 'sizeRange.min', parseInt(this.value)); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
        <div class="control-group">
          <label>Size Max <span class="value">${layer.sizeRange?.max || 10}</span></label>
          <input type="range" min="5" max="40" value="${layer.sizeRange?.max || 10}" onchange="updateLayerField(${index}, 'sizeRange.max', parseInt(this.value)); this.previousElementSibling.querySelector('.value').textContent = this.value">
        </div>
      `;
    }

    chaosSection = `
      <div class="section-title">Chaos</div>
      <div class="control-group">
        <label>Jitter <span class="value">${((layer.jitter || 0.3)).toFixed(2)}</span></label>
        <input type="range" min="0" max="50" value="${(layer.jitter || 0.3) * 100}" onchange="updateLayerField(${index}, 'jitter', this.value / 100); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
      </div>
      <div class="control-group">
        <label>Clustering <span class="value">${(layer.clustering || 0.5).toFixed(2)}</span></label>
        <input type="range" min="0" max="100" value="${(layer.clustering || 0.5) * 100}" onchange="updateLayerField(${index}, 'clustering', this.value / 100); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
      </div>
      <div class="control-group">
        <label>Position Variation <span class="value">${(layer.positionVariation !== undefined ? layer.positionVariation : 0.5).toFixed(2)}</span></label>
        <input type="range" min="0" max="500" value="${(layer.positionVariation !== undefined ? layer.positionVariation : 0.5) * 100}" onchange="updateLayerField(${index}, 'positionVariation', this.value / 100); this.previousElementSibling.querySelector('.value').textContent = (this.value / 100).toFixed(2)">
      </div>
      <div class="section-title" style="margin-top:12px;">Condensation</div>
      <div class="control-group">
        <label>Flat Bottom Y <span class="value">${layer.condensationLevel === undefined || layer.condensationLevel === -999 ? 'Off' : layer.condensationLevel}</span></label>
        <input type="range" min="-50" max="100" value="${layer.condensationLevel === undefined || layer.condensationLevel === -999 ? -50 : layer.condensationLevel}" onchange="updateLayerField(${index}, 'condensationLevel', this.value); this.previousElementSibling.querySelector('.value').textContent = (parseInt(this.value) === -50 ? 'Off' : this.value)">
      </div>
    `;

    item.innerHTML = `
      <div class="layer-header" draggable="true" data-index="${index}">
        ${layer.isParent ? '<span class="parent-badge">P</span>' : ''}
        <button class="visibility-btn ${layer.visible !== false ? 'visible' : 'hidden'}" onclick="event.stopPropagation(); toggleLayerVisibility(${index})" title="${layer.visible !== false ? 'Hide' : 'Show'}">${layer.visible !== false ? '&#128065;' : '&#128064;'}</button>
        <span class="drag-handle" title="Drag to reorder">&#9776;</span>
        <span class="expand-arrow">&#9658;</span>
        <select class="layer-archetype-select" onchange="updateLayerArchetype(${index}, this.value)">
          <option value="sphere" ${layer.archetype === 'sphere' ? 'selected' : ''}>Sphere</option>
          <option value="column" ${layer.archetype === 'column' ? 'selected' : ''}>Column</option>
          <option value="platform" ${layer.archetype === 'platform' ? 'selected' : ''}>Platform</option>
          <option value="tree" ${layer.archetype === 'tree' ? 'selected' : ''}>Tree</option>
        </select>
        <input type="number" class="layer-yoffset" value="${layer.yOffset || 0}" placeholder="Y" onchange="updateLayerField(${index}, 'yOffset', this.value)" onclick="event.stopPropagation()">
        <button class="clone-btn" onclick="event.stopPropagation(); cloneLayer(${index})" title="Clone">&#10697;</button>
        <button class="layer-remove-btn" onclick="event.stopPropagation(); removeLayer(${index})">X</button>
      </div>
      <div class="layer-params">
        ${shapeSection}
        ${cascadeSection}
        ${archetypeSection}
        ${chaosSection}
      </div>
    `;

    container.appendChild(item);

    item.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('text/plain', index);
      item.classList.add('dragging');
    });

    item.addEventListener('dragend', function(e) {
      item.classList.remove('dragging');
      document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('drag-over'));
    });

    item.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (!item.classList.contains('dragging')) {
        item.classList.add('drag-over');
      }
    });

    item.addEventListener('dragleave', function(e) {
      item.classList.remove('drag-over');
    });

    item.addEventListener('drop', function(e) {
      e.preventDefault();
      item.classList.remove('drag-over');
      const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
      const toIndex = index;
      if (!isNaN(fromIndex) && fromIndex !== toIndex) {
        moveLayer(fromIndex, toIndex);
      }
    });
  });
}

init();
</script>
</body>
</html>
